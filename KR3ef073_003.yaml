body:
  text: 卷三辨太陽病脈證並治法下第三按此篇承上篇桂枝之變與中篇麻黃之變及與小柴胡湯之變而發之者也而今篇中於所輯也如柴胡桂枝湯柴胡桂枝幹薑湯大柴胡湯之在於少陽正位則固矣結胸痞硬之於證十棗瓜蒂之於方皆出於少陽之變黃芩湯黃連湯之與於少陽若續之中篇而不別之篇則皆自歸於小柴胡湯之變而於有桂枝麻黃之變之及於此者終不可以見焉於是乎今尚系之太陽而題篇以太陽下篇以示桂枝麻黃柴胡之三變隨意與此篇之轉機者也是乃所以起下篇之由也問曰病有結胸有藏結其狀如何答曰按之痛寸脈浮關脈沉名曰結胸也何謂藏結答曰如結胸狀飲食如故時時下利寸脈浮開脈小細沉緊名曰藏結舌上白胎滑者難治按問答為體者全是素問家常言也而意義亦泥矣豈足可據以論乎哉藏結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也藏結蓋結胸之據精虛者而名之耶雖然今無明文矣適論之者亦皆非古義且也論中無治之之方法則亦不知所適從矣措而徯後考病發於陽而反下之熱入因作結胸病發並陰而反下之因作痞所以成結胸者以下之太早故也發於陽發於陰大似正文之辭氣而推之文意則尚配之於榮衛氣血者也且說痞結胸之因來者亦膠柱甚矣不可從也結胸者項亦強如柔痙狀下之則和宜大陷胸丸若結胸證悉具而及於項亦強如柔痙狀則病勢既已縱橫而活氣敗走之候也豈大陷胸丸之所克治乎哉若夫項亦強如柔痙狀於無結胸證則亦如何處於大陷胸丸之為乎可謂暴矣大陷胸丸方大黃半斤葶藶半升芒硝半升杏仁半升上四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升頓服之一宿乃下如不下更服取下為效禁如藥法按此方亦無體度恐出於後之杜撰乎當擯斥之耳結胸證其脈浮大者不可下下之則死此條例於太陽病之歸於結胸者而論於證有主客之分方有先後之略者也蓋太陽病之變於結胸也若脈沉緊則假於如外證尚不解者必主結胸而客太陽也其治當先在於結胸矣今也其脈浮大則假於如結胸證具備者亦必主太陽而客結胸也其治當先在於太陽矣是為之治法之式也不可下者不可與陷胸湯之謂也下之則死者下之之變雖不但必死而重戒之之式例也結胸證悉具煩躁者亦死按煩躁或有結胸之始與終也始則可治矣終則必死矣不可不辨別焉若乃在其始也出於胸中將新受邪之動勢也是故邪氣既安著於胸中則煩躁乃止矣即後條所謂短氣躁煩者是也若乃在其終也出於以結實之甚精氣將謝之動勢也是故結胸證悉具而後復發煩躁也即此條之所論是也悉具言悉皆具備也又按以上二條當移敘於後條之下太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也此條論於太陽之變於結胸若變於發黃者也夫既脈浮而數頭痛發熱之於太陽則固矣而微盜汗出則此邪氣有欲歸於心胸之機者也然則如其表證則似可解而尚反惡寒故曰表未解也是乃桂枝麻黃之所宜也而今誤下之故曰醫曰反也已而數變遲是明於表邪歸於里也蓋數之為脈以邪勢顯著於外言之也遲之為脈以邪勢潛淪於內言之也拒痛拒格而痛也膈內新受邪之所致也短氣出於邪氣支於胸膈也躁煩煩躁互其所言也解已見於上條矣心中懊憹心憂悶之狀也因親因也蓋心下硬之為證固與諸變者也而今歸之於結胸者必以餘證決焉故親因於上之諸證而曰因硬也夫既心下硬之親因於膈門拒痛短氣躁煩心中懊憹則為之結胸也結胸者水熱凝結於胸脅之名也若雖均出於水熱之變而不結胸脅而滯於表裡間者不得必不為發黃也故曰若不結胸但頭汗出余處無汗小便不利身必發黃也按動數之動及浮則以下至為虛四句胃中空虛客氣動膈二句陽氣內陷一句劑頸而還一句皆後人所旁註混入正文也乎大陷胸湯方大黃六兩芒硝一升甘遂一線上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之傷寒六七日承小柴胡湯之傷寒中風五六日而示有彼少陽正位之歸於此少陽變位者也熱實對寒實而言之也夫蓋水熱結實於胸脅而為結胸也有熱實寒實之分也是故熱多水少者單呼之熱實也水多熱少者單呼之寒實也然則寒實而尚不能無熱熱實而復不能無水惟是欲指水熱之多少與主客之別而使人標識修治之有別也脈沉而緊對於少陽正位之浮弦或浮緊而示邪氣內結之義也心下痛以胸中結實之勢專壓於腹之所令也石硬言硬之殊甚也傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒十餘日錯綜示義者凡三焉一則以太陽病言之二則以少陽病言之三則以自太陽轉於少陽者言之也熱結在裡里斥胸脅之裡也然則與曰結胸者大同而少異矣蓋結胸者具其證之名也熱結在裡者呼其因之言也復還也顧十餘日曰復也夫既傷寒十餘日之於熱結在裡也應有結胸證而尚不然復往來寒熱者是為仍在於少陽本位也故與大柴胡湯也但結胸無大熱者亦承傷寒十餘日熱結在裡而論之也但也者無他事之辭也無大熱者熱綱不備也顧往來寒熱而駁之也此為水結在胸脅也此說結胸之因而欲以別於彼大柴胡湯之熱在胸脅者也故今雖但曰水結而受上文熱結在裡而論之則水結而尚有熱自可知矣頭微汗出者以明邪氣之在胸脅而不注走於表裡也頭汗解具柴胡桂枝幹薑湯之註腳太陽病重發汗而復下之不大便五六日舌上燥而渴日哺所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之按此條論結胸之變而大類於大承氣湯者也是故先殊其初曰太陽病重發汗而復下之也夫既太陽病之不解遂結實胸脅乎據於重發汗之虛表氣與復下之之虛里氣則其勢不得必不侵於表裡之虛也既侵其里乎不大便五六日從心下至少腹硬滿而痛不可近之候出焉既侵其表乎舌上燥而渴日晡所小有潮熱之候出焉蓋曰小有者可以徵潮熱之不出於陽明而出於結胸之變矣若夫潮熱之在於陽明而冠日晡所則殊為其極地也豈得曰小有潮熱乎哉讀人熟察焉小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之小猶少以微少漸微言之也非大小之義也正中也言病但在心下而胸腹不然也病正在心下指氣液不和言之也夫既不和之在於心下而發此脈證乎夙治之以是湯則不必致結胸之機變也固矣若乃不和之或釀熱乎此為之熱實結胸也復或湊飲乎此為之寒實結胸也然則此湯之於方意也有欲終為結胸之機而未成結胸者也此所以曰小結胸也脈浮滑其義有二焉一則對大陷胸湯之沉而緊而示未成結胸也二則明於雖氣液不和而是尚在實位而未至虛位者也又按今標此條於斯而次大陷胸湯及桔梗白散者欲示有於各位之初起必與於是湯者也小陷胸湯方黃連一兩半夏半升栝蔞實大者一個上三味以水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫三服太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也後人即桂枝人參湯為之論說者耳太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血此蓋後世脈家之所論也乎豈本論之意乎哉病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散此後人據於中篇所謂五苓散而復發論說者也夫蓋以文蛤散易彼以水者之別而已且也文蛤散之唯於令胃氣和則不如用水之便而且簡矣於是乎知文蛤散之非古方矣然則此條之雖如不可廢而亦暫廢之可矣寒實結胸無熱證者與三物小陷胸湯白散亦可服此條當屬傷寒六七日結胸熱實之章也蓋撰次之誤也寒實對熱實而名於胸脅結實之主飲而波及於熱者也是故曰寒實結胸者提其病因之名義也以是今雖不亦論其諸證而因其名義而繹之諸證則所謂短氣躁煩心中懊憹及心下硬痛等自籠罩於茲可准知焉然則為之熱實為之寒實者惟是歸熱證之有無故曰無熱證者也無熱證者有寒證之謂也蓋結實之得以認主熱者謂之熱證得以認主寒者謂之寒證也按與三物小陷胸湯白散亦可服當作與白散三物小陷胸湯亦可服蓋傳寫為倒置者也乎醫宗金鑑以三物字冠白散小陷胸湯四字亦可服三字共為衍文文蛤散方文蛤五兩上一味為散以沸湯和一錢匕服湯用五合白散方桔梗三分巴豆一分貝母三分上件三味為末內巴豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水潠之洗之益令熱劫不得出當汗而不汗則煩假令汗出已腹中痛加芍藥三兩如上法按三分一分之分猶等分之分不以分釐言之也瓜蒂之於一分亦然矣強羸以勝藥與不勝言之不以其質言之也身熱皮粟以下全是文蛤五苓之註文耳豈預白散之腳下乎矣太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語脈弦五六日讝語不止當刺期門此條雖似得合併之治例而失其正義者也凡病名以合併者皆言各位正證之合併者也若於各位在於變證者不名以合併而不必論修治之先後或歸其治於一端或兼其治於兩端此為之式例也故今以頭項強痛狀太陽者尤得其式法何則頭項強痛之以為太陽正證也至於以時如結胸心下痞硬狀少陽則大背其式法何則心下痞硬之以為少陽變位也若代心下痞硬以胸滿或胸痛之比其義可初以足法矣乎婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀讝語者此為熱血入室也當刺期門隨其實而瀉之凡病男婦均其脈證固矣是故於其修治亦不異男婦也以是乎不更問男婦但是脈證之審醫之事務也雖然惟於經水之一事也不可不姑以婦人論焉故標曰婦人也夫經水之惟在於婦人而不豫男子也後世論之紛紛擾擾未聞其確論不可不究論矣蓋經水者余血而即精血也取義於經歷而名經水也豈強之經絡之為哉夫血之生於人身也精之化熟於氣之由矣是故役氣於外者無餘血藏氣於內者有餘血蓋婦人之含羞情乎氣自藏於內而以多血少氣為之態也男子之縱情欲乎氣自役於外而以多氣少血為之態也此所以婦人而有經水男子而無經水也且夫女子期二七二八而初來經水者以羞情之萌於此也既已至其晚暮乎羞情漸止則經水復亦從而自止矣可益以徵經水之來由於多血少氣也此為之經水之辨也當參考傷寒奧旨矣中風發熱惡寒對後條傷寒發熱而異之初而亦差今之輕重也夫既發熱惡寒之在太陽乎其勢會犯血氣遂使經水適來也適者不期之言也既使經水適來則血分不得不益擾亂而生空隙矣於是乎表邪直侵入於血道也得之七八日呼於自初至於今日數也熱除而脈遲言表熱潛血道而數脈反變遲也身涼示於邪氣專潛血道而不激於表裡也胸脅下滿如結胸狀讝語者此邪氣並血氣迫於心之所為也蓋血之於心也血常從心之號令猶君臣然矣今也血中以有邪氣之故不唯不從心之號令而已反欲襲心之機用此所以出於胸脅下滿如結胸狀也既襲之之益篤乎終至使心昏晦也所以為讝語也熱入血室言邪氣入血道也室猶刀室之室弘指血道言之也後世以子宮論之者殊不知本論之意趣也不可從矣當刺以下十字後人之所追加矣婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之此條承上條論其輕重之異也七八日之上略發熱惡寒經水適來八字者也蓋均在七八日也彼則論於熱除而脈遲以下之重者也此則論續得寒熱發作有時經水適斷之輕者也續得寒熱發作有時此於其熱位也在於發熱惡寒與往來寒熱之中位者也是之熱狀舉以對熱除而脈遲身涼而示熱氣未盡歸於血道也經水適斷顧經水適來而發之也夫蓋經水之來與斷共均熱之入血道則亦均名以熱入血室也既以熱入血室名之則以為與柴胡湯之式也故今揭小柴胡湯以式其治法不是啻式於此條而已取準據於此而弘照之於上下之條則自足知乎上條之在大柴胡湯下條之在柴胡加芒硝湯也且夫熱入血室之於治方也必以柴胡湯者不可無辨焉蓋於其證也以血道客邪氣故血氣都搖動而其勢必湊於心邊遂使心氣昏濛而失其政令也以是乎先即其標而與小柴胡湯以疏和其心胸則心氣必得舒暢政令必得漸復也既如此則終至使血熱分別亦必矣是為之既治其標則其本自從之治方也不可不考矣後世謂柴胡湯為血劑者亦泥矣其血必結三句亦後人所追加矣婦人傷寒發熱經水適來晝日明瞭暮則讝語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈此於其初位也以在於傷寒熱多之重故不見惡寒也經水適來其義如前條之所言矣晝日明瞭暮則讝語如見鬼狀者此邪氣潛伏於血道而時劫奪於心之機用之所致也故均名以熱入血室也夫既雖一於熱入血室而於其候法則有差等如此者何哉曰此不但因於邪氣之輕重而已於其血室亦有淺深之別也須審辨焉蓋皮肉間與藏肉間都以為血室也以是如上二證則邪氣主著於皮肉間而直襲心者也如此條則邪氣主著於藏肉間而終劫奪心之機用者也然則邪氣之輕乎主著於皮肉間邪氣之重乎主著於藏肉間固無論焉時或輕而主著於藏肉間重而主著於皮肉間者亦有之乎矣惟是可錯綜活讀而以供施用也晝暮字不可拘泥矣假以示時發作之不數也明瞭者聰明慧了之意而言如無病患之狀也是可以益徵於藏肉間之遠而不易遽以露於表亦廣而未易遽以徹於藏腑也無犯以下十一字亦後人之註文耳傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之此條論太陽少陽相交之變證而變治例者也傷寒包裹於太陽少陽兩位言之也六七日對結胸而示其機變之不一端也夫蓋如發熱惡寒之於太陽與嘔之於少陽則不固俟論矣雖然今惡寒而曰微嘔而亦曰微二微字相對以明於太陽少陽之狀態互不專也支節煩疼者身疼痛之變而其出之也以專於太陽而少陽之勢並之也心下支結者心下痞之變而其出之也以專於少陽而太陽之勢並之也支結者結滯遮支之謂也外證未去者對心下支結之裡證而且顧六七日發之也凡太陽少陽之於治方也先治少陽而後太陽是其常式也今也雖在於太陽少陽之兩位而支節煩疼與心下支結不皆出於一部位而出於據兩位交勢如上之所言則不可敢以常式治之者也於是乎制兩位兼治之略而所以設柴胡桂枝湯之方也此豈非太陽少陽之變證而變治例乎按是方柴胡桂枝合方而當稱柴胡桂枝湯爾加字衍矣柴胡桂枝湯方折半於小柴胡湯桂枝湯而各合其一半以為一劑水量煎煮皆依桂枝法傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之傷寒五六日對小柴胡湯而差其輕重異同也蓋於小柴胡湯則桂枝麻黃之變漸歸於少陽之輕者也於此湯則已發汗而復下之之變遽歸於少陽之重者也胸脅滿熱與水壅滯之所令也微結微結胸之略文而即謂胸脅滿之裡也小便不利以徵熱之並滯水也蓋結胸者水熱凝結之名也如微結則言雖有水熱而未至凝結而遂有欲成結胸之機者也微讀如微緩微浮之微然矣渴而不嘔是狀乎在於少陽而不似於少陽也蓋如渴則由於熱之郁壅於裡也如嘔則由於熱之搖動於上也是故今標渴而不嘔以明熱氣主郁壅而不主搖動也豈非在於少陽而不似於少陽乎但頭汗出於其全身則無汗故曰但也凡頭汗之為證也邪氣主在於胸脅而其勢弗注於表裡者必為之也何則以郁壅之邪勢無所寫也如大陷胸湯梔子豉湯茵陳蒿湯即是也是故表裡往來之熱狀現見則以不必為頭汗出為式也此條媲舉頭汗出與往來寒熱者義似矛盾矣不可不明辨矣蓋今標往來寒熱者惟要標其本位者而不必具其情狀者尤居多矣是乃欲使人不具其情狀者亦歸之於本位於此也於是乎發其式例曰此為未解也以斷尚在於少陽本位也且讎對渴而不嘔但頭汗出之義復應往來寒熱之意也學者勿草草看過矣柴胡桂枝幹薑湯方柴胡半斤桂枝三兩乾薑三兩栝蔞根四兩黃芩三兩牡蠣三兩甘草二兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈按初服以下三句其義泥矣豈期之乎恐附後之所試者矣乎傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解此後人誤讀前條者之徒復發其義而及於此者也奚足徵哉傷寒五六日嘔發熱者柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯傷寒五六日復對小柴胡湯且異其變於前條者也嘔而發熱者言主嘔而客熱也凡嘔之勢勝於發熱則雖未至往來寒熱而於其式法也為柴胡湯證具也而醫者不察以他藥下之若柴胡證仍在則不可不復與柴胡湯也於是乎曰此雖已下之不為逆以丁寧於雖既以他藥下之而幸而不為逆尚在於柴胡之場也今也雖尚在於柴胡之場而歷下攻之不常乎其邪氣縱令不為反逆而亦其勢必屈曲矣是故今於其解亦不如常法必瞑眩而解者也必蒸蒸振卻發熱汗出而解是即暝眩狀也瞑眩解已具中篇若夫以他藥下之之為反逆也或於結胸或於痞硬故繼陷胸瀉心於後以弘其機變者也心下滿而硬痛者此舉結胸之概也但滿而不痛者此承心下滿發之則滿之在心下可知矣不痛者別於結胸也痞並硬言之也不中猶不可也半夏瀉心湯方半夏半升黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草三兩上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩蓋後人漫說並病之機變者也不可從矣脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳蓋亦後人據於大黃黃連瀉心湯而為之說者耳矣太陽中風下利嘔逆表解者乃可攻之其人縶縶汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之太陽中風其義有二焉一則以前起言之二則以治例言之也下利嘔逆以狀腹中充實之極者而乃十棗之重證也醫宗金鑑作不利嘔逆為說未達其所達之言也不可從矣其人以下至乾嘔短氣此為十棗之定證也表解者乃可攻之及汗出不惡寒者此表解里未和也皆為式之辭也蓋十棗之於證也元是少陽之變則有自其少陽正證來者固矣而太陽傷寒之變亦能至於此也蓋太陽傷寒對之十棗則亦為中風也故今標曰太陽中風也夫既太陽中風之狀尚未謝則縱令十棗在其重證而尚未可攻之須以發汗為宜此為之其式也故曰表解者乃可攻之也縶縶汗出與頭痛於太陽中風或嘗有之矣今也以為十棗之證挾於發作有時一句以示汗出頭痛之有休作而異於太陽也是乃所以更端曰其人也心下痞硬滿氣水凝結之所為也與結胸之熱飲凝結者最為親近也不可不別矣若夫結胸則熱飲主在於胸中而及心下如此湯則氣水主在於心下而及脅下然則雖均因水飲而彼則以並熱此則以並氣此為之其別也乾嘔短氣氣輻湊於心胸之所令也汗出不惡寒者顧縶縶汗出又應表解者乃可攻之也里未和者即里未解之言也欲包示表亦不和故不曰里未解而曰里未和也十棗湯方芫花甘遂大戟大棗十枚上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平且服若下少病不除者明曰更服加半錢得快下利後糜粥自養強人羸人說具自散方後溫服之以下蓋後人之所補也太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈此蓋後人據心下痞而為之說者耳矣心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之痞否塞之義也濡硬之反言濡弱而氣不護也此於是心下痞也非結熱之所令而但由氣屈伏於心下也若夫痞之由結熱乎脈不得必不潛伏也今也其脈浮則可以徵不由結熱而由伏氣也且也曰其脈更端之者欲使讀人眼於證與脈不倫出於常例而錯出於變例也行文之妙處不可不熟視矣關上二字後世脈家之所補也豈正論之謂乎哉醫宗金鑑濡上補不字是深泥大黃之言也未知麻沸湯漬之須臾絞去滓用其淡薄之氣味而已矣可謂惑乎矣大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服心下痞而復惡寒汗出者附子瀉心湯主之此即承大黃黃連瀉心湯論之也故如心下痞則尚在前位也雖既在前位而其勢遂令裡氣衰弱以致惡寒汗出也夫既惡寒汗出之雖從痞而來而今復據於裡氣衰弱之虛則豈暇但用前方療痞乎哉於是乎所以備於兩端兼治之法製附子瀉心湯也而猶如而惡寒之而也復對較於陽位言之也篇末載方作三黃湯中加附子汁者恐非矣即大黃黃連瀉心湯中加附子汁者也蓋附子待煎煮全其效用奚為麻沸湯漬之之能奏功耶以是乎加之煎汁也而今闕煎煮之法將無奈之何乎於是乎取其準據於白通四逆通脈之類則皆以三升水煮或取一升或一升二合今取概於茲以水量煎煮三分之一充煎煮附子之法則庶乎無大過耶然則以水一升煮附子一枚取三合余和二味汁服之雖然是惟無已之概法耳矣豈為強之於大方哉本以下之故心下痞與瀉心湯痞不解其人渴而口躁煩小便不利者五苓散主之此於其心下痞也不既下之則不必至於此矣故冒曰本以下之也然則此其痞也上盛下虛而裡氣不和之所為而與彼瀉心湯之熱凝於心下為痞者大不同矣且也渴而口躁煩小便不利則可知於裡氣之不和遂至並添於水氣也於是乎今不拘痞與不痞與五苓散使之腠理順利則不解痞而痞自解此為之治痞之變治法也按此條當敘旋覆代赭石湯後耳傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之此條與大柴胡湯之傷寒發熱汗出不解互發之以示少陽正變之別者也是故雖均於下利與心下痞硬而彼尚未離熱綱所以為正位也此已無大熱所以為變位也傷寒以太陽之重證言之也夫既於太陽之重證乎以發汗之其表頗解故曰後也雖然其汗出之變遂致使胃氣澀滯於是乎餘邪終侵入於心下而亦益使胃氣澀滯也故曰胃中不和心下痞硬也乾噫食臭即胃中不和之狀也脅下有水氣者心下痞硬之勢亙於脅下而亦及澀滯其機用而懸水氣焉者也夫蓋脅下水氣之漸多乎不得不歸於胃中也雖既歸於胃中而胃亦固失其常則不能化而為液其勢必下陷矣此所以雷鳴下利也雷鳴不調和之候也按生薑瀉心湯之於方意也亦猶半夏瀉心湯然矣唯以胃中不和之出於乾噫食臭故殊有生薑之略而已生薑瀉心湯方於半夏瀉心湯方中加生薑四兩傷寒中風醫反下之其人下利日數十行谷不和腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之此條與小柴胡湯之傷寒中風五六日互發之亦示少陽正變之轉機者也故均之冒首曰傷寒中風也夫傷寒之於麻黃乎中風之於桂枝乎皆不可下之也固矣而醫者不察而反下之使裡氣不和卒使表邪趣於心下此所以為心下痞硬也既為心下痞硬則裡氣尚彌不和於是乎誤下之利遂亦誘自然之利而至日數十行穀不化也然則心下痞硬之句當在下利之上而卻次之腹中雷鳴之下者此欲使人知於其下利之續出於誤下也此為之行文之活也心下痞硬而滿之滿字應照腹中雷鳴以證有水氣也蓋水氣之乘心下痞硬也不但下陷而為下利而已其勢亦不得必不襲心胸也此乃乾嘔心煩不得安之因也按甘草瀉心湯之證蓋止於此焉醫見心下痞以下七句恐後人謾說方意者也旨趣大背不可從矣又按穀不化與下利清穀其狀大同而其因頗異矣谷不和者以心下痞硬之故至阻隔其運用而使穀不化也是故以此湯尚療心下痞硬則谷自和也下利清穀者氣液已衰弱而胃腹失其運用之所令也豈瀉心輩之任乎哉不可不辨也且夫甘草瀉心湯之於方意也亦猶半夏瀉心湯然矣唯以心煩不得安之證故殊有甘草之略而已甘草瀉心湯方於半夏瀉心湯方中加甘草一兩傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之複利不止者當利其小便此條論治心下痞硬之變式法者也醫以理中以下四句複利不止者當利其小便二句皆後人之所攙入也宜祛之耳湯藥弘斥下劑也此以其既下之乎遂至使下焦不和而亦更令水氣乘焉其勢必迫而為下利者也而今其下利之不一旦而止乎腠理不得不益失其開闔於是乎鬱氣結心下為痞硬也然則與彼瀉心湯之於熱內結心下為痞硬者固異其因也以是雖服瀉心湯畢復以他藥下之而下利尚不止不唯下利之不止而已於心下痞硬亦不為解也是故今與赤石脂禹餘糧湯以利其宿水則下利必自愈腠理開闔亦從而必復矣既如此則於其心下痞硬亦何為得特稽留哉其本亡而末存者未之有矣此豈不治痞之變式法乎不可不察也赤石脂禹餘糧湯方赤石脂一斤禹餘糧一斤已上二味以水六升煮取二升去滓三服傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此蓋後人論梔子豉及十棗之機變者也豈足據乎傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之此條亦論治心下痞之變式法者也夫蓋病在於太表而發汗之若在於心胸而吐之若在於腹中而下之而今無有前證故曰解後也夫既於解後也精氣生虧隙機活為弛怠於是乎痰飲滯在乎心下遂成痞硬也然則與彼瀉心湯之熱內結心下者亦固異矣噫氣以心下痞之故胃內不和之所令也不除者示不於一旦也旋覆代赭石湯方旋覆花三兩人參二兩生薑五兩半夏半升代赭石一兩大棗十二枚甘草三兩上件七味以水一斗煮取六升去滓再煎取三升溫服一升日三服下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯中篇既以發汗後標之無若字有主之二字雖此條之如可論其義不可雙通矣且也不如以發汗後標之之的當也太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之按此湯之為證也跨虛實者也今系以太陽病者惟標其前位耳外證與表證大同而少異矣外證者所斥廣而不必期其狀也表證者所斥狹而必期於發熱惡寒也蓋今外證之未除則縱令有里證而發汗之所宜也例曰外證未解者不可下下之為逆即是也而不察下之不唯一再也故曰數下之也已而數下之之變遂呼外熱乎外熱之協裡虛乎至利下益不止也是為之協熱利也心下痞硬者雖如瀉心湯乎特不然矣此其表熱之應於裡虛與裡虛之應干表熱其勢互先交會於心下之所為也與彼瀉心湯之熱結心下而為痞硬者果異矣不可不別論也表裡不解者式之辭也以斷於利下不止與心下痞硬皆非是一位一端之所為而出於表裡兩端相交之變也是故於其治法亦設表裡兼治之方而制桂枝人參湯者也豈可不審辨乎哉桂枝人參湯方桂枝四兩甘草四兩白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升內桂更煮取三升溫服一升日再夜一服傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯太陽傷寒之勢既亙於裡乎於是大下之而里邪之勢已拔矣故曰後也雖然其表尚不解所以復發汗也雖既復發汗而不啻表證之不解更作心下痞者也蓋今於其心下痞也徵之於上之所謂大黃黃連瀉心湯則其脈浮而惡寒者也故式之曰表未解也不可攻痞當先解表表解乃可攻痞也若夫心下痞之於脈沉而惡寒則為之附子瀉心湯也此條辭氣雖大似附子瀉心湯而精論之則有其別也加此矣不可不辨也傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之傷寒通於太陽少陽而標之也發熱汗出不解此論於帶太陽之餘響而駸少陽極地之狀者也蓋發熱惡寒汗出為之太陽也今無惡寒而發熱汗出此豈非太陽之餘響乎且夫少陽之於往來寒熱也此為之其本面也而其勢之專迫於陽明而不專衝於表則必當無惡寒今也無惡寒而發熱汗出此豈非少陽之極地乎心下痞硬少陽極地之勢迫於腹中之所令也此即所謂心下急之一變態也嘔吐而下利者胸中之邪勢聳於上下之所致也醫宗金鑑下利作不利者可謂膠柱矣病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散難遽以辨其病位故曰病也如桂枝證以氣上衝脈微浮肌熱之比言之也今雖不標肌熱而瓜蒂散之因心胸有寒飲則其動不能必無肌熱也雖然見於頭不痛項不強則復非太陽桂枝證可知焉脈微浮微不以其本面言之讀如微緩之微也言帶浮也寸字後之所加也胸中痞硬即胸中實之標也須即胸膈外之皮膚而察之矣氣上衝咽喉者此寒飲並精氣而充實於上部之狀也夫精氣之在人身也浩然軀谷平等此其常也苟失其常乎精氣初偏頗專湊於所失其常也今以寒飲在於上部之故精氣輻湊而與寒飲結實也此所以至不得息也於是乎髮式之辭曰此為胸有寒也以斷與瓜蒂散而非要快吐則不能矣且別夫十棗湯之寒飲在心胸下而不可吐者也瓜蒂散方瓜蒂一分赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散諸亡血以下二句蓋後人之識見耳病脅下素有痞連在臍傍痛引少腹入陰筋者此名藏結死此後人誤解藏結者耳奚足可以徵乎哉傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒當太陽誤此既太陽病而發可吐下之機者也於是吐下之而其機一旦而去故曰後也雖然於其邪氣則沉潛不解七八日遂致熱結在裡也里斥肉裡言之也是即表裡俱熱之因也大陷胸湯之與熱結在裡文同而義異矣表裡俱熱者言其熱跋扈於表裡也此乃身熱之一變態也於是乎知身熱為綱表裡俱熱為目也時時惡風以裡熱激於表而太表之餘邪復得之勢之所為也大渴舌上乾燥而煩者為裡熱上騰之候也蓋裡熱之欲發於表也其勢必先達於心胸喉嚨也此所以為大渴舌上乾燥而煩也大盛也以別他部位之渴也欲飲水數升者此狀寫渴之殊盛大也傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之標曰傷寒者其義有二焉一則對前條太陽病而示之重也二則以其部位之不易察言之也此於其證也雖尚在於白虎之場而以既至其極地而急於欲為內實也此所以身無大熱也無大熱解已具於乾薑附子湯條下口燥渴較之於前條之大渴舌上乾燥而煩則頗虧於熱氣上騰之勢者也何則其熱以專湊於裡也心煩欲為內實之動勢徹於心之所為也與前條之以渴寢察煩者亦自異矣背微惡寒對承氣湯言之也蓋白虎之為證也縱至其重地而尚有欲聳於表之機於是乎出若背微惡寒者也若此而背微惡寒止則直為之承氣湯也論曰不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀即是也又按白虎湯而加人參者以有煩也然則自知若此而無煩則為白虎湯也是乃標加人參而白虎湯亦自偶其中也手段之活豈可不於戲乎哉傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之蓋上條所謂時時惡風背微惡寒之於白虎加人參湯也嫌弘行之於有表證者故今發此條而明辨於表裡之邪各備其根柢如此則治法非必如上條所例必應歸之於合併通治之式法者也太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞慎勿下之按太陽少陽之於合併病也先治少陽而後治太陽此為之式例也夫蓋少陽之在於柴胡太陽之在於桂枝麻黃也各位不與下攻固矣今發曰慎勿下之者尤為無謂也然則此條雖似可論而亦豈正文之意哉太陽與少陽合病自下利者與黃芩湯苦嘔者黃芩加半夏生薑湯主之此條論於太陽與少陽合病之變證而變治例者也與論正證正治例者自異矣不可混同矣蓋於太陽少陽合病也各發其正證則治之也必在柴胡湯而不與黃芩湯也若夫太陽少陽合病而下利為之主證如此則其治之也必在黃芩湯而不與柴胡湯也何則柴胡治外正證黃芩療下利若專發其外正證者勢必不下陷矣此所以於不下利也若專為下利則勢必不揚越矣此所以於不備其正證也以是乎知縱令二陽發其正證者亦適下利為之主證則不得亦遂不失其正證也此乃所以於二陽不備其正證者而今尚以太陽與少陽合病標之之意也此為之醫聖之微意也學者其致思焉若嘔者下利之餘勢尚犯於上之所為也葛根湯之與不下利但嘔者大異矣黃芩湯方黃芩三兩甘草二兩芍藥二兩大棗十二枚上四味以水一斗煮取三升去滓溫服一升若嘔者加半夏半升生薑三兩傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之以部位之不在於太陽而在於少陽變位曰傷寒也胸中有熱有者一有一無也言漸按而知有熱也蓋胸中之熱不專外透則其熱必迫於胃腹而其機活必弛怠於是乎致胃中有邪氣也今斥曰邪氣者亦不一矣或以食不化或於飲或於氣也腹中痛此即腹中有滯物之所為也故乃添欲嘔吐者之一句以益徵有滯物之義也黃連湯方黃連甘草乾薑桂枝各三兩人參二兩半夏半斤大棗十二枚上七味以水一斗煮取六升去滓溫服一升日三服夜二服傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之傷寒八九日以太陽之並於裡虛言之也風濕相搏四字後人評論之證者也豈足論乎哉身體疼煩不能自轉側此表熱裡虛相交而為之也若夫身體疼之在於太陽及陰位乎不必至不能自轉側矣今也壹待他人之扶助而漸遂其轉側者此豈不表里互交而其勢相牽之所為乎是故標之脈曰浮虛而澀也浮之不於滑實而並於虛澀虛澀之不於沉而出於浮足益以知於陰陽兩位相交也於是乎制桂枝附子湯之方以並療於表熱裡虛者也是乃異於夫陰陽合併病之先陰後陽之通治例可知焉不嘔不渴猶如乾薑附子湯之例顧於柴胡加龍骨牡蠣湯與白虎湯言之也柴胡加龍骨牡蠣湯曰一身盡重不可轉側者白虎湯曰腹滿身重難以轉側若其人大便硬小便自利者此承身體疼煩不能自轉側而復論欲畜水氣之候也蓋水氣之於初萌也畜之於不可知不可候者尤居多矣然則縱令小便自利而大便之於硬固非其常則豈得謂無水氣乎哉是故今認水氣不以小便不利而以大便硬此要認其難認之活式也於是乎先以去桂枝加白朮湯療於其水氣於微而後欲復與桂枝附子湯以療表熱裡虛者也夫既後於桂枝附子湯之交於表熱裡虛之重者而先於去桂枝加白朮湯之於水氣初萌之輕者何哉曰如桂枝附子湯則固重矣重則雖如不可忽而至療之則必難澀矣故後之也如去桂枝加白朮湯則固輕矣輕其雖如不可速而至療之則必容易矣故先之也且也如去桂枝加白朮湯則以為其初萌未交表熱裡虛故其勢孤矣此豈治之之不益容易耶若夫水氣之不一旦而謝則其勢交於表熱裡虛必矣豈得以序治之乎哉是乃後條所謂寸草附子湯之所與也桂枝附子湯方桂枝四兩附子三枚生薑三兩甘草二兩大棗十二枚上五味以水六升煮取二升去滓分溫三服桂枝附子去桂枝加白朮湯方於桂枝附子湯方內去桂枝加白朮曰兩余依桂枝附子湯法風濕相摶骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之是乃前條一步之變而表熱裡虛水氣之三因相交而為之證者也身體疼煩與骨節煩疼自是表裡輕重之意尤足察焉且也云骨節煩疼則身體疼煩自備其中也掣痛不得屈伸比之不能自轉側則復加之劇者也近之則痛劇汗出短氣者此三因之邪勢無處不注故觸近之則其勢激動之所為也小便不利證於其里已畜水氣也惡風不欲去衣但以不欲去衣而認惡風者也凡惡風寒之於證也或出於陽實或出於陰虛者也今也不一所以其出而表實裡虛水氣之三因皆與焉故反不備其狀態如此矣或身微腫者言滯水之太多或有至於此者也風濕相摶四字當效上條削之耳甘草附子湯方甘草二兩附子二枚白朮二兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙按初服以下所言不必是矣恐後人之所補入耶傷寒脈浮滑此表有熱里有寒白虎湯主之此條承桂枝附子湯所謂八九日身體疼煩不能自轉側而曰傷寒也然則是雖尚如桂枝附子湯而其脈浮滑則亦為之白虎湯之變態也故今釋於所以現其變態之義以曰表有熱里有寒也寒即虛寒之謂而斥實中之寒也王三陽解曰熱也贊論作表有寒里有熱者皆失其本旨矣蓋白虎之為證也論其正證則如身熱潮熱表裡俱熱之比此雖皆不能無虛寒而不俟敢稱虛寒者也故偏為之熱實也今也雖尚在白虎湯境內而不備其正證者以專俟虛寒也故偏曰里有寒也是故實中有虛乎則尚為之陽也虛中有熱乎則已為之陰也此於是陰陽也求之於證候必殊易混淆者也於是乎今發之脈式曰脈浮虛而澀曰脈浮滑此欲明斷於其易混淆者也可見於澀之既備於虛寒而對滑滑之尚屬於熱實而顧澀乎矣凡論中標滑澀者亦皆效此又按以此條結下篇者也而亦為繼論陽明篇之張本也乎白虎湯方知母六兩石膏一斤甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒脈結代心動悸炙甘草湯主之炙甘草湯方甘草四兩炙生薑三兩桂枝三兩人參二兩生地黃一斤阿膠二兩麥門冬半斤麻子仁半升大棗十二枚上九味以清酒七升水八升先煮八味取三升去滓內膠烊消盡溫服一升日三服一名復脈湯按脈證與方劑共背本論之旨蓋後人之所偽撰矣乎脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而又動名曰代陰也得此脈者必難治此亦後人因前條而附後世之脈法者也豈可論焉乎哉
