body:
  text: 卷六辨太陰病脈證並治第六按陰也者取義於陰晦也以象病勢之陰晦於內也蓋病勢之陰晦於內者乃是以精氣負於邪氣故也夫精氣之負於邪氣乎不固一其態不能必無多少之異別也此即所以有三陰之設也蓋太陰也者陰之初而精氣負於邪氣之始也故以虛寒為之態而以胃之上口為之位也是雖既均據於胃而與夫陽明之精氣勝於邪氣而以實熱為其態者自有別也豈敢為混同乎耶夫蓋太陰之於名義也據所謂四象論之則太陰即少陰之所歸趣而其序必在於少陰之後者也此書雖假用之而至取其義則異矣故今添四象以陽明厥陰而六之以應乾坤六爻之象而盛陽不求之於太陽而系之於陽明老陰不求之於太陰而系之於厥陰是故陽之為陽特於陽明乎見之矣陰之為陰特於厥陰乎見之矣以是乎太陽非陽實之極惟是陽位之標也太陰亦非陰虛之極惟是陰位之標也是故於太陽則以桂枝麻黃發之於表之未重也於太陰則以建中理中制之於里之未深也故以其對應論之則太陰自反對太陽可知矣豈唯是乎如少陰之反對少陽厥陰之反對陽明亦復可准知矣今也假用六經之大旨為然矣夫然故太陰之為虛為寒比之少陰厥陰則抑淺而少矣故於其候法尚帶實候而未盡偏虛候但以若自利腹滿腹時痛認之太陰者也故曰自利不渴者屬太陰也又曰腹滿時痛者屬太陰也太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之則脅下結硬太陰之為證也為之陰位之始也以是乎其證尚顧陽位是所以為腹滿而吐也蓋腹滿而吐之雖似於實候而不媲不大便難硬之比而據於食不下自利益甚則可知既虛滿而不實滿也食不下食不下口腹也以食少言之也自利即下利也益甚對食不下言之以別陽位之下利也蓋陽位之於下利也飲食為邪驅逐矣故食少則利自少食多則利亦多矣陰位之於下利也津液自為耗散矣故食不下則自利反益甚矣且也於陽位則以不可利為常故謂之下利也於陰位則以可利為常故謂之自利也雖然往往通下利自利而互言之者亦有之矣不可必拘泥矣時腹自痛此邪氣克津液之所為也時者言腹痛有間斷也以別夫少陰之於腹痛無間斷者也乃是太陰少陰深淺輕重之分可思諸若下之已下二句文義不續恐是後人之附說耳醫宗金鑑自利益甚一句序之於胸下結硬下豈不牽強矣乎太陰中風四肢煩疼陽微陰澀而長者為欲愈蓋此拘泥脈法而期愈者大似叔和之家言奚足徵乎太陰病欲解時從亥至醜上說見於前太陰病脈浮者可發汗宜桂枝湯此條斥曰太陰病者以殊在其初地而尤輕者言之也是故雖有一二之裡證而未備於本位之定候者也若夫既備於本位之定候則脈當沉固矣今也其脈反浮此豈不殊在其初地而尤輕者乎耶夫既雖有一二之裡證而但令脈浮則知是太陰之邪勢尤淺而為激於表者也於是乎導之於汗於表者也故曰可發汗宜桂枝湯也夫蓋本篇及少陰與有發汗之略於本篇則以桂枝湯發汗之於少陰則以麻黃附子細辛湯及麻黃附子甘草湯微發汗之此其雖均為發汗而異之方法者不可不辨矣夫太陰之於證為之陰之始也故於其輕者則病勢有尚顧陽地者也此乃所以令脈浮也於是乎於其治法亦欲化之陽邪而導於汗於表者也是所以以桂枝湯也於少陰則既已絶粹於陰地者也是故縱令其不重者不必得化之於陽邪惟是微發之餘勢耳是乃所以以麻黃附子細辛湯及麻黃附子甘草湯也自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩此當合前條為一條豈髮圈別之哉蓋自利不渴者為之太陰定證也而今曰屬太陰也者不能無疑焉雖然此於其意趣也前以對桂枝湯之脈浮者後以對少陰之自利而渴者要使太陰之位地弘之於前後也故曰屬太陰也以顧之前後者也又按以其已下六字及當溫已下八字疑後人之旁注誤混正文者矣乎傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也此既舉之陽明篇惟至七八日以下異其文彼則作至七八日大便硬者為陽明病也此則以至七八日之變期之太陰之下利然則就不能發黃之變一歸之內實一歸之內虛雖其義似可論豈不膠柱乎且也誤發黃之來由復失其位地亦胡可據以徵乎哉說已具於陽明篇則今又不贅矣本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之此其於冒首也欲協篇法故以一本字冠太陽病也蓋太陽之為證不可固下之而誤下之故曰醫反也此以其下之之耗裡氣而俄現腹滿時痛者也故曰因爾也爾而通若夫假令太陽證尚不解而發若腹滿時痛則為之邪氣已駸於太陰也況於太陽證已解者乎修治應皆在於太陰耳故曰屬太陰也且夫桂枝加芍藥湯之於方也與建中湯聊有淺深之分故今雖為腹滿時痛而未必及腹中拘急拘攣可知矣若此而備拘急拘攣之比則直為之建中湯可亦准知矣大實痛者桂枝加大黃湯主之此直屬上條而言之者也何圈而域之為乎大實言大便不通也千金翼作大便實可以徵矣痛即上之所謂時痛之言也夫既雖腹滿時痛之均上之所論而以大便不通為之別者也然則較之於桂枝加芍藥湯則尚據實者也雖既據實而無熱候之從之則不得不協精虛亦復可知矣故今取之於虛實間而行桂枝加芍藥加大黃湯者也桂枝加芍藥湯方於桂枝湯方內加芍藥三兩余依桂枝湯法桂枝加大黃湯方於桂枝加芍藥湯方內加大黃一兩余依桂枝湯法太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也此條解桂枝加芍藥加大黃湯者也而其意義與本條背馳矣恐是後人之撰次耳
