body:
  text: 卷七辨少陰病脈證並治第七少陰也者陰之中而亦以胃之中央為其位也而比之太陰則既已深矣太陰尚且以虛寒為之態況於少陰乎蓋少陰之於候既見虛寒之機於脈與形狀者也是乃所以提頭曰脈微細但欲寐也此為之少陰之標也自利而渴腹滿腹痛身體疼重手足寒者即為之少陰之正證也如反發熱脈沉及口中和其背惡寒者少陰之始也如利不止厥逆無脈乾嘔煩者少陰之終也甘草湯桔梗湯豬膚湯之出於一時之權法乎四逆散豬苓湯大承氣湯之象於本位乎四逆湯通脈四逆湯之論之歸趣乎錯綜具列而差其轉機者也豈其可不推弘乎哉少陰之為病脈微細但欲寐也蓋少陰之為候也以邪氣之故專致精氣衰敗也是故先舉於精氣衰敗之脈與形狀於提頭於此而以標式於少陰之通篇者也凡脈之於微細精液虛耗之由矣夫既三陽以浮為經脈則自知三陰亦以沉為經脈也然則此於是微細也為沉微細自可准知焉而今略沉而唯標微細者此欲使人知於未沉之場亦將有少陰之機也但欲寐是即活氣不充之狀也凡人之機密得其常者無他以活氣充滿也而今精液虛耗則活氣隨而衰敗雖欲無寐得乎已如此則精液活氣之於衰敗如洞視然矣是豈非論少陰之標式乎且夫少陰之於定證也固夥矣而今約之脈微細但欲寐者猶陽明之於提頭但標胃家實而略之諸證矣乎概但異虛實內外主客之分耳蓋陽位之於候自專於外故若臨外候之不輕則未及陽明者亦或眩惑者當有之矣以是乎唯標胃家實之裡而略凡之外候以要不遽斷之於外候而必應徵胃家實於裡而後以斷之於陽明也蓋陰位之於候自專於裡故若臨里證之不輕則未及少陰者亦或眩惑者亦當有之矣以是乎唯標脈微細但欲寐之外候而略凡之裡證以要不遽斷之於里證而必應徵其脈與形狀之出於精氣衰敗於外而後以斷之於少陰也此為之論之活意也學士其察諸少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也此條論少陰之初中終三等者也欲吐不吐心煩但欲寐者此陰邪未縱橫之動勢為之者也乾薑附子湯及茯苓四逆湯之所任也而為之少陰之初也過之以往五六日自利而渴者已接彼厥陰之自利消渴者也故曰屬少陰以對厥陰者也是乃真武湯白通湯之所主也而為之少陰之終也夫既初於欲吐不吐心煩但欲寐而終於五六日自利而渴者則其五六日之間不可必徒然而過矣當有附子湯等之證候可亦以准知焉而為之少陰之中也可見少陰初中終之三等備得而盡焉虛故已下七句蓋後人之腳注耳病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利按陰陽不以通義言之觀之於曰此屬少陰則所謂營衛浮沉之意耳且也以咽痛歸於少陰者亦失通義矣少陰病咳而下利讝語者被火氣劫故也小便必難以強責少陰汗也此蓋後人據真武湯或豬苓湯而發之臆斷者也少陰病脈細沉數病為在裡不可發汗此蓋後人據後條脈微不可發汗而附其所窺也未知少陰之皆儘裡而發汗之之有故者也豈其足論乎哉少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之此條為麻黃附子細辛湯及甘草湯發之例者也不可發汗者言不可與麻黃附子細辛湯及麻黃附子甘草湯也夫少陰之於微發汗也應於脈未微之場也若脈已微則為之專精液衰耗也即真武附子之所與也豈得導之於表於汗乎哉亡陽已下四句亦後之附說耳少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈下利脈暴微豈其緩證乎而期其自欲解聊以手足溫與脈緊反去者可謂殊不知機活者也少陰病下利若利自止惡寒而踡臥手足溫者可治少陰病惡寒而踡時自煩欲去衣被者可治按皆是極陰轉陽之口氣大背本論之旨者也少陰中風脈陽微陰浮者為欲愈措證候而拘泥脈法者蓋似叔和之家說矣少陰病欲解時從子至寅上說已見於前篇少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯此亦極陰轉陽之言耳脈不至所謂陰氣有餘之意也少陰病八九日一身手足盡熱者以熱在膀胱必便血也按此為桃核承氣湯抵當湯等論之者乎而今標之此篇冒少陰病者尤為無謂也是當有所誤矣少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治按口鼻目中出血者病道壞亂之變或為之乎是乃由於元精虛竭則曰名下厥上竭為難治者蓋有以乎哉雖然辭氣非正文豈其足究論焉乎少陰病惡寒身踡而利手足逆冷者不治此對所謂惡寒而踡臥手足溫者可治而論其不治者也蓋亦陰有餘之辭氣耳少陰病吐利躁煩四逆者死按雖吐利渴之在於少陰而如躁煩四逆則已為之厥陰極地也然則此於其吐利亦非其舊已歸吐利消渴之場必矣而今標之此篇曰少陰病者欲使人知少陰之轉機如是迅速也此於是煩躁也與乾薑附子湯及茯苓四逆湯之煩躁自異矣彼則出於陰邪欲駸於重地之動勢也故必先於諸證焉此則精神將謝之動勢之所為也故必後於諸證焉是故先諸證者證備則反自止後諸證者直接死地故曰躁煩四逆者死也以是乎知四逆湯通脈四逆湯之不論及躁煩者宜也乎矣少陰病下利止而頭眩時時自冒者死少陰病四逆惡寒而身踡脈不至不煩而躁者死二條皆後人效上條而發臆見者也乎豈其足據而論乎哉少陰病六七日息高者死少陰之於六七日也精虛之場矣是故氣息細少者固其處矣而今氣息高大者何哉蓋津液之於虛極也元氣失所御必湊其源終使氣息高大也是乃所以發一大息於終焉之階也故曰死也少陰病脈微細沉但欲寐汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死按此條之所論已備於吐利躁煩四逆者死條則亦胡贅之乎後人之辭氣明矣乎少陰病始得之反發熱脈沉者麻黃附子細辛湯主之凡發少陰病證者以歷三陽一陰之轉機為常矣此條所論特不然矣以直始少陰者論之也故曰始得之也夫既病始萌於茲也雖其精氣固虛而較之彼歷三陽一陰來者則其虛尚未甚者也故今聊有精邪相競於裡之變也蓋精氣之滿軀殼乎表裡固一於其機是故里氣搖動則表氣亦隨播動是乃所以出發熱之由也以是乎標脈沉示邪氣已位於少陰以異之發熱之出於邪氣揚達者也然則與所謂外熱者有大同小異之差也彼則精氣耗散之勢所令然也此則但表氣搖動之所出也不可不辨別矣夫蓋雖邪氣位於少陰而以精氣搖動之變現若發熱則足察裡氣之透表也於是乎以麻黃附子細辛湯導里邪於表於微發汗者也是即導之於其有路之一活法也今不曰微發汗者蓋讓之後條而略於此也反也者對少陰本位又顧脈沉言之也麻黃附子細辛湯方麻黃二兩細辛二兩附子一枚上三味以水一斗先煮麻黃減二升去上沫內藥煮取三升去滓溫服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也此乃前條一步之變而證與治法皆效前條之式者也是故為讓其脈證於彼而略於此也夫既觀於略其脈證而但標得之二三日則彼所謂反發熱脈沉之狀態不嚴然而全備自可知矣雖然今復以此湯微發汗則知尚在於反發熱脈沉之郭內也始得之之全備發熱脈沉與得之二三日之不全備發熱脈沉亦是自然之勢也不可不察矣又按上條但舉脈證而讓微發汗於此條此條但舉微發汗而讓脈證於上條互略而全其意為之互文之活法也以二三日以下十一字後人未辨於少陰為微發汗之義謾屬注文者也麻黃附子甘草湯方麻黃二兩甘草二兩附子一枚上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之此於其二三日也既與麻黃附子細辛湯及麻黃附子甘草湯而挽回陰邪於此者也以上猶以後也夫雖既邪氣翻於心胸而精虛何為得卒復乎於是乎邪勢必通徹於心里此所以出心中煩也心中煩之據精虛乎徐側身而堪之所以曰不得臥也然則於是證方也陰陽互不偏者而於虛實間者也小柴胡湯之心煩及胸中煩之偏在於實地者與小建中湯之心中悸而煩之偏在於虛地者豈可混同乎不可不參考以知其異別矣按臥下恐脫者字黃連阿膠湯方黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服少陰病得之一二日口中和其背惡寒者當灸之附子湯主之按此條對麻黃附子細辛湯及麻黃附子甘草湯而欲異之初故曰得之一二日也夫附子湯之於證也本於津液凝滯也蓋津液之於凝滯有虛實之分矣實熱為之證者於白虎湯乎見之虛寒為之證者於此湯乎見之今也所論最在於附子湯之初位而未悉備其面目者也是故易大疑似於實熱為之證者於是乎先標口中和以示無燥實之候也和也者調和之謂也其背惡寒者以邪未縱橫於少陰地位之故其勢自聳於肩背之所為也以是乎可益知是湯之殊在其初位而未悉備其面目也然則比之後條之津液凝滯於內外者則尚未專於內者乎矣當灸之三字蓋後人備試用者誤混正文者也附子湯方附子二枚茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服少陰病身體痛手足寒骨節痛脈沉者附子湯主之此承前條而復論附子湯之在正中者也夫附子湯之於正中也表裡之津液為邪凝滯者也是故舉身體痛手足寒以證表之凝滯舉骨節痛脈沉以證里之凝滯者也夫蓋身體痛骨節痛之為證也有陰陽虛實之分而存矣不可不辨也其於陽實乎必有熱候及脈浮之隨焉其於陰虛乎必有寒候及脈沉之隨焉以是乎今屬身體痛以手足寒屬骨節痛以脈沉此乃欲別之於彼身體痛骨節痛之於頭痛發熱脈浮無汗之比者也手足寒病者自覺其寒冷而已與厥冷厥逆之以外候謂之者自異矣又按附子湯之於證方也對應於真武湯而但異岐流耳然則為以正變輕重論之乎曰否此是二湯相與少陰之正脈證而唯有邪氣之緩急與精氣之剛柔之異耳是故於真武湯則邪氣雖不急而精氣已柔弱矣於附子湯則邪氣雖不緩而精氣尚剛強矣緩之於柔與急之於剛參考以揆度於所其對應則惟是異岐流耳豈容正變輕重之論耶少陰病下利便膿血者桃花湯主之此條論桃花湯之方意者也蓋桃花之於方也惟是止便膿血耳豈與及於少陰病之下利乎矣而今冠少陰病下利而以論便膿血者何哉曰便道出血者殊為急徵矣是故先棄少陰之下利而一但療便膿血膿血既止而後復當投少陰之治耳方後所謂若一服愈余勿服是足以益徵於桃花湯之方略於一時也夫既少陰之並便膿血者尚然矣況於三陽及太陰之若並便膿血者療之必在於是湯也亦可准知焉矣桃花湯方赤石脂一斤乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合內赤石脂末方寸匕日三服若一服愈余勿服按赤石脂一斤非謂一劑之量數但所備之大概耳如其量數則方後所謂內赤石脂末方寸匕者即是也方寸匕概三兩餘也曰上三味者凡數之也猶白散之曰件三味也所其煎煮但乾薑粳米二味已溫服當作分溫少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之此條論桃花湯之所置也腹痛小便不利下利不止此即真武湯之候而不固與桃花湯而今有便膿血之不可忽者則先與桃花湯以療便膿血為式矣既而便膿血止則更與真武湯之為式也亦可知矣真武湯之解具於本條可即以稽矣少陰病下利便膿血者可刺後人據桃花湯論之試用者誤出於此者也乎小陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之按以少陰病標之者非以本位言之但以外候之似於少陰言之也蓋吳茱萸湯之為證也邪氣鬱於心胃間而為之諸證者也以是乎表裡上下之氣卒然而不和此所以為吐利以下之諸變也夫然故手足厥冷以狀乎表氣孤而不舒也煩躁欲死以狀乎裡氣鬱而不瀉也是故問之病位則為虛實間也抑虛實間之於位也有象實候者又有像虛候者今也論像虛候者以對彼陽明篇所謂像實候者弘之變者也若夫徒採收之諸證於陰虛之本位則所謂少陰病吐利躁煩四逆者死即是也豈吳茱萸湯之所任乎哉又按手足厥冷宋板作手足逆冷千金翼作手足厥逆義各通矣少陰病下利咽痛胸滿心煩者豬膚湯主之豬膚湯之於證方也邪氣既謝而本於津液涸竭者也是故今曰少陰病下利者專過去而言之也不曰後者以或連及於今也夫既下利之專於過去也精液必不得不隨而涸渴矣以是乎虛氣湊上部遂為咽痛以下之諸證也然則此於是諸證也非邪氣位於心胸之所令也彰彰而明哉是故今設之治方也惟在潤其涸渴涸渴既潤則虛氣何為得不謝耶是乃所以處置是湯於茲也豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服膚謂肌膚也油膩之所聚故取用之白粉湯液本草曰白米粉也得之矣少陰病二三日咽痛者可與甘草湯不差者與桔梗湯標曰少陰病二三日者猶如麻黃附子甘草湯曰少陰病得之二三日也皆以少陰證未具備者言之也是故彼則論精氣相競之變以為發熱者此則論寒邪上攻之變以為咽痛者也蓋咽痛之為證也其所由有寒熱之分矣由於熱者必當陽候從焉三陽未論及咽痛者蓋略之也由於寒者必當陰候從焉此條之所論即是也然則雖均為咽痛而異寒熱之分也如此矣雖然凡為咽痛者職由於氣液不和則一也故今謀之治也暫措其寒熱之不易治者而先治氣液不和之易治者此即先標後本之權法也所以有甘草湯桔梗湯之設也夫既與甘草湯桔梗湯治其咽痛而後直即少陰之面目而治之亦為之法也咽痛之於少陰病尚且然矣況於三陽及太陰者乎亦猶如桃花湯之以少陰病下利便膿血而准於三陽一陰之下利便膿血也今也舉咽痛一證而期以甘草桔梗之二湯而不論之異別者何哉蓋咽喉之不可洞視固矣故先與藥而稍足酌知其消息也是乃所以先與甘草湯也夫蓋甘草湯之於方意也但在舒緩於氣液也若夫於氣液不和之遂不瀉乎或釀成微腫則固非甘草湯之所奏效也故曰不差者與桔梗湯也由是推之則自知桔梗湯之排達於津液擁滯成腫者也甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升去滓分溫再服少陰病咽中傷生瘡能不語言聲不出者苦酒湯主之此即甘草湯桔梗湯之所漸及也蓋津液擁腫之為膿化者即瘡也傷傷爛也此文當云咽中生瘡傷而曰咽中傷生瘡者以診候書之也夫咽喉之生瘡也應以咽中傷爛而噴血膿徵之耳故及之也不能語言聲不出者二句是可以察生瘡腫之輕重緩急爾必非一病人而備之之謂也苦酒湯方半夏十四枚雞子一枚上二味內半夏著苦酒中以雞子殼置刀鐶中安火上令三沸去滓少少含咽之不差更作三劑以雞子殼置刀鐶中以易應草卒言之也本邦俗不常貯刀鐶豈為得草卒之便耶不如以陶器作之之便而且容易耳苦酒酢也苦酒一合盛之陶器漬銼細半夏三兩須臾投雞子白令相得安火上令三沸漉去半夏頻頻含咽之少陰病咽中痛半夏散及湯主之半夏散及湯方半夏桂枝甘草各等分已上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之按證方恐非本論之舊矣後人對甘草湯桔梗湯而備之試用者混出於茲耶然今適與試之咽痛之本於痰飲者奏效驗者亦有之矣然則雖方之不古而暫存而供使用亦胡不可乎哉少陰病下利白通湯主之病在少陰之地位而下利為之主證者為之白通湯也故曰少陰病下利白通湯主之也蓋白通湯之於證也以其輕者論之則無論於下利一證者尚且在真武湯附子湯之面目而下利已勝餘證者亦為之白通湯初也以其重者論之則無論於白通加豬膽汁湯之證脈微而下利不止者即白通湯之終也今也此條標下利一證而不舉餘證者將欲包裹輕重初終而全白通湯之方意也白通湯方蔥白四莖乾薑一兩附子一枚上三味以水三升煮取一升去滓分溫再服少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生以為下利故脈已及於微者為之白通湯也蓋脈之於微四逆湯亦有之矣雖然彼則裡虛平等而其脈微者也此則以被劫下利故使脈及於微者也以是乎四逆為清穀白通於溏泄亦可足以推精虛之多少與邪氣之輕重也乃今下利脈微者而與白通湯乎其勢堪其任者與之則必愈矣若於其勢之已不堪其任者則下利不啻不止必遂成以下之變也厥逆無脈乾嘔煩者此皆精氣一旦而凌劫於下利之所為也其既至於此乎餘證盡根起乎利不止則與夫四逆湯之精氣既耗散於上下四表者大異矣此乃所以尚不移白通之方而加以人尿豬膽汁也夫蓋白通加豬膽汁湯之於證方也問之於外則如與厥陰無別然矣雖然推之於內則未及厥陰尚在少陰之極地也如前之所論矣豈可不辨別哉抑白通加豬膽汁湯之於證也尤為篤危之極也故不待轉厥陰而有死生大機之兆矣於是發之脈式曰脈暴出者死微續者生也暴出略暴斷微續略微出互文法相得而全矣按千金翼與作服亦通白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚人尿五合豬膽汁一合已上三味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽亦可用人尿童男者良余屢試用人尿滋潤降伏之功殊最於諸品矣朱震亨云滋潤降火甚速辭氣雖不古而足克充人尿之功也若無膽亦可用六字後人之所附録也少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之此承麻黃附子細辛湯及麻黃附子甘草湯發之也夫既四五日之於今也津液為邪氣凝滯其勢欲益張大此所以為腹痛也津液虛而機活弛矣水道必當不利此乃小便不利之由也小便不利之既有滯水乎必當先充之四肢所以出於四肢沉重疼痛也夫既水之憑精虛乎先充之外而後壓里是其必然也可知自下利之出焉今也欲論下利之主出水氣而異之於厥陰之精奪下利者故髮式之辭曰此為有水氣也蓋真武湯之定候止於此以下所論皆是兼證耳咳者由於膈里畜痰飲也小便利即以是湯之初地言之或下利可疑定候既舉之豈復贅之哉謹推文意或下利或嘔者二句合為一句補不字削下或字代而字作或不下利而嘔者其義可法矣何則此欲論水氣內壓之不下陷而上攻者也蓋下陷上攻之異別自歸水氣內壓之輕重多少復亦可思諸真武湯方茯苓三兩芍藥三兩生薑三兩白朮二兩附子一枚上五味以水八升煮取三升去滓溫服七合日三服後加減法若咳者加五味子半斤細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤後加減法以下蓋後人之所録說已見小青龍湯條下少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之是之證方在於厥陰者也而今舉之此篇標以少陰病者欲示少陰之轉機駿速而無餘裕也然則本篇所論之真武附子亦有卒爾歸於茲者自可察知焉下利清穀解已詳於前裡寒言腹裡有虛寒也蓋腹裡之於虛寒也雖固臨而不可視之而推之以下利清穀則如洞視然矣故清穀裡寒以接文也外熱者精氣奔命之所為也當於頭面心腹診之也後之所謂散陽是也厥逆者言厥冷之溯逆也脈微欲絶者精液耗散之殊太甚也欲如清便欲自可之欲也身反不惡寒凡惡寒之為證雖皆本精虛而今既至精奪之極故精神無覺惡寒之活也故曰反也是之諸證為之脈通四逆湯之定證也其人以下亦皆兼證耳面上疑脫或字面赤色亦外熱之一狀態耳宋板作面色赤亦通或腹痛以是湯之初地言之也或乾嘔或咽痛皆虛氣上騰之所為也蓋咽痛之為證於少陰則先與甘草湯桔梗湯而後治其本證今也病既迫篤危豈暇先治咽痛乎哉是乃所以不移本劑也或利止脈不出者此以用通脈之未足者言之且復對白通加豬膽汁湯而駁之也夫通脈之於方也挽回於精液耗虛活氣微乏也以是乎雖下利止而其脈不出則須連用本劑耳矣與彼白通湯之主制下利一證而談病之進退者果異矣通脈四逆湯方甘草二兩附子一枚乾薑三兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈後加減法面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩附子一枚宋板作大者一枚若不然則與四逆湯無差別通脈之稱才歸於乾薑之多已豈其然乎可知宋板是矣大者一枚概准三枚通脈之稱於是乎可見焉即出者言即出連續也乃微出微續之義而與彼暴出暴斷者固不同矣後加減法亦當效上之所言耳少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之斥曰少陰病者非以本位言之唯以外候之象於少陰言之也蓋逆散之為證也病位心胃之間而據精虛者也是故論之位則為虛實間也夫然故雖有虛而未至為內陷矣雖有實而復不為揚達矣虛實互相待而壅塞乎心胃間遂使上下內外阻隔其運用也是乃所以現四逆之由也蓋四逆者與厥逆同而亦厥之所歸趣也今舉其歸趣者以欲包之比類也不可必拘泥四逆耳矣其人以下皆復兼證也或咳或悸出於胸膈畜飲也或小便不利或腹中痛由於水氣失分利也或泄利下重者腹中不和之所為也夫蓋下利之於泄利與下重也固異其分也泄利溏泄之謂而乃取之虛候下重後重之謂而乃取之實候此為之其式例也而今連之一句混論其分者是即將欲以四逆散之位於虛實間故使知其候法亦跨於虛實如此也四逆散方甘草枳實柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服後加減法咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服或人謂四逆散是直散服四逆湯者也云云是殊不知本論之讀法也凡論中證方如不相從者豈唯此而已哉往往有之矣雖然照臨之證方則病位自不得不辨病位既辨則其因來亦從而明矣於是乎證之正變治之主客可曉然而指點之矣奚為拘泥於一證候於一因來焉乎哉按以散服為法者亦猶五苓散之方意也後加減法亦當效前之所言耳矣少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之斥曰少陰病者與四逆散曰少陰病正同其義亦唯以候法之象於少陰言之也蓋豬苓湯之於證也水氣在於虛實間者也於是乎或有象實候者或有象虛候者陽明篇既舉象實候者而詳悉之今復舉象虛候者於此以全虛實間之意也下利六七日下焦有滯水之所令也雖既滯水之為不利而以未事虛耗故為現其動勢於陽地者也咳以下之證即是也若夫其動勢之於陰地乎即為之真武湯可以准知焉咳者水熱迫於上部之所為也嘔渴出於咳之動勢故曰而也心煩不得眠者水熱之勢郁心之所為也是之心煩未備其情狀但以不得眠認之者也正與乾薑附子湯曰煩躁不得眠同之文意也少陰病得之二三日口燥咽乾者急下之宜大承氣湯此於是病位也尚在陽明者也而今以少陰病標之者亦唯以其外候言之也以下二條冒少陰病者亦皆效之此於是證也以其始論之則邪氣實於表裡而見陽明本證者也既而至此乎以精氣生隙故邪氣悉湊於裡候之於外表則其可見者但虛態而已是豈非似於少陰耶雖然以其未專精虛乎裡氣尚有所振也是乃所以未歸於虛地而尚系在於實地也是故舉口燥咽乾以證其里之在於實地也夫蓋咽口者里之竅口也今為窺內實於茲者以無由以他證窺之也可知此條之機變亙於不常矣急下之對續至不可下者也以下二條所謂急下之亦當效之耳少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此承上條論一步之劇者也是故其里有實邪也如上之所論也邪氣雖深乎精氣雖虛乎以其未歸於虛地邪勢尚上攻焉與彼飲食之新入者必分爭於心下於是乎為心下必痛也必字有意致不可忽視矣夫既飲食之為邪氣腐於心下乎雖入胃而不能化為液矣直下流而為自利清水色純青也清圊也自利清水者謂無糞而利純青水也純青者水液為熱毒所被化也今也所序之證候皆雖在實地而但臨之外貌則如在虛地然矣故復舉口乾燥者以斷之於實地者也口乾燥與口燥咽乾無異矣文唯有精粗耳精粗之間亦可自求病證有等級也耶少陰病六七日腹脹不大便者急下之宜大承氣湯此條之所論雖均在表虛里實比之上二條則其虛寢少者也故雖其外有虛候而尚為腹脹不大便者也是乃帶陽明之餘響者也夫既此條之輕尚以腹脹不大便徵之內實彼條之重才以竅口徵之內實輕重難易之分須探尋矣且夫論至六七日之輕者以對彼在二三日之重者錯綜示之義以要使人莫膠柱於診察之間也以上三條所論皆大承氣湯之權法也故皆曰宜也何混之論其定證者之為乎哉少陰病脈沉者急溫之宜四逆湯牽引上三條來而曰少陰病也於彼則以似本位言之於此則以已歸本位言之是乃欲示似與歸之際迅速不容發故及之也脈沉以本位言之也是故以或微或細及澀勢當斷之裡虛也於上三條則脈沉亦不得謂無之雖然以或緊或弦及滑勢當斷之裡實也急溫之顧急下之也蓋溫之於裡虛下之於裡實固異其分雖然實之終殆接虛虛之始亦果接實則虛乎實乎轉機迅速而如不可視然矣故曰急溫之也且也四逆湯而曰宜者明非其定候也既知非其定候而亦復足知諸凡附子劑自有與於茲者也少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯標曰少陰病者以手足寒言之也飲食入口則吐心中溫溫欲吐復不能吐是皆內實之候也若夫並之以腹中之諸證則不得不直為承氣湯也雖然手足寒脈弦遲從始存今則彰然明哉實之在胸中者而非在腹中者也故曰不可下也當吐之也是即與瓜蒂散之言也若膈上有寒飲者此顧實飲而論虛飲也蓋飲之雖一而或瓜蒂以吐之或四逆以溫之其分唯在病者之虛實而已豈問飲之如何而左右之為乎哉乾嘔者虛氣迫於上部之所為也其候雖大類心中溫溫欲吐復不能吐而無有飲食人入口則吐之實候也胡其混之哉故曰不可吐也急溫之也曰急曰宜者亦當效上條之所言耳矣少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之此蓋後人據四逆湯而發臆見者謬傳於此乎矣
