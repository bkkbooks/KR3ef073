body:
  text: 卷五辨少陽病脈證並治第五少陽也者斥邪氣位於心胸及表裡間而言之也蓋邪氣之在是位也有正變之分而存焉是故邪氣主心胸而亙表裡間者為之正證也邪氣主表裡間而亙心胸者為之變證也夫既主心胸者其勢必衝於表裡故備熱位也所謂發往來寒熱者是也主表裡間者其勢必潛於心胸故下備熱位也所謂無大熱者是也以是乎少陽之於證方也殊固不少矣而今本篇僅止三四條者大似有脫簡而特不然矣是乃示機活之妙處也宜精尋焉夫少陽之以心胸表裡間為之位也或不接頭項太表則必接分肉胃腹是故太陽表證之深者與陽明裡證之淺者必為易混淆於是位也故既以少陽之證方配序之太陽篇與陽明篇而以質其易混淆者也夫既少陽之於證方錯綜之表裡各位而以訖轉遷令屬之變則縱令本篇不為標題於此而於其證其方既已無有所殘矣雖然不張之本篇則必嫌使少陽畢屬於表裡各位之變也故今標本篇於此以欲使人知少陽元是供於一部位也是乃所以不厭其短篇而但止三四條也且也少陽之於證也出於太陽而入於陽明則其位地亦當篇之陽明之上而次太陽而今序之此者不可無辨也蓋少陽之於位也以在心胸表裡間乎至論其轉機則自有順逆之別矣將轉裡實者順也將轉裡虛者逆也是於其裡實與裡虛也皆是均里而但有虛實之分耳是故二里虛實之變一系於轉機順逆之差也可知矣於是乎篇少陽於逆於此而以使知有直轉三陰之裡虛者也而如其轉於陽之裡實者則固不俟論焉當就篇題之順列而推鑑其義爾矣少陽之病口苦咽乾目眩也夫少陽之於脈證也既已論究之於太陽三篇及陽明篇似無所殘矣雖然少陽之位於心脅及表裡間也有象於表證者又有象於裡證者於是乎今標此條於茲以欲使少陽泛然於表與里之微意也何謂泛然於裡乎曰熱勢之達於口中也動則易認以歸之陽明之口舌乾燥之域雖然其尚在於茲也取之於口苦咽乾之域而歸之於少陽者亦不可無之矣是豈非使少陽泛然於裡之意耶何謂泛然於表乎曰熱之達於頭上也動則易認以歸之太陽之頭痛上氣之域雖然其尚在於茲也取之於頭目眩暈之域而歸之於少陽者亦不可無之矣是豈非使少陽泛然於表耶以是乎今措少陽數多之定證而僅舉口苦咽乾目眩以示其義者也學士其察知焉條辨病上有為字可從矣也字有法矣少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚此條意義錯雜恐非本論之辭氣豈足論乎傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則讝語此屬胃胃和則愈胃不和則煩悸按此對上條舉目眩之意以論有認少陽如於表證尚不解之域者也傷寒亙太陽少陽言之脈弦細對前位太陽之浮大言之也頭痛發熱是即太陽之餘響也今也雖尚頭痛發熱而脈已弦細而不惡寒則不得不為少陽故曰屬少陽也既已屬少陽則雖如頭痛發熱之在於太陽而不可發汗也固矣故亦曰少陽不可發汗也發汗則以下四句後人之補添耳本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯此條雖辭氣像正論而推之意趣則不得無所背馳矣乾嘔之不於不欲食而於不能食往來寒熱之不於脈若浮緊而於沉緊序次不倫此豈本論之旨哉知是出於後人之手段矣已吐下發汗溫針讝語柴胡湯證罷此為壞病知犯何逆以法治之此以少陽柴胡證之不常態而象可吐下發汗之狀言之也夫既吐下發汗溫針之不得其宜也邪氣不唯不解而已遂出一個之讝語者也此於是讝語也非固少陽之所與不亦必轉陽明之所為者而已或有本於鄭聲者或有因於瘀血者或有出於心精劫動者是故如柴胡證亦自罷而其病道如破壞然矣故曰柴胡湯證罷此為壞病也乃今治之也當察之犯證逆治而以主客用舍之法治之者也太陽上篇所謂與觀其脈證知犯何逆隨證治之正同其意也三陽合病脈浮大上關上但欲眠睡目合則汗冒首與脈證不相愜恐有脫簡耳豈可據以論之乎哉傷寒六七日無大熱其人躁煩者此為陽去人陰故也傷寒以少陽之重者言之旁包太陽陽明也六七日承小柴胡湯之五六日發之旁承太陽陽明之轉機也無大熱主無往來寒熱而通亙無發熱惡寒及身熱潮熱也夫蓋少陽之於六七日也既無有往來寒熱者發若躁煩者或有之矣此於是躁煩也陰位已受邪之所令也與茯苓四逆湯所謂病仍不解煩躁者正同其意矣故曰此為陽去入陰故也陽主少陽而包二陽也陰通亙三陰言之也以是此條不唯論少陽之奔於陰者而已亦欲示擎太陽陽明以均入陰之機也是即所以標此條於陽篇之終以接於陰篇也此為之醫聖之微意矣讀者須留意焉傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也後人據上條謾論意見者也豈愜本論之旨哉傷寒三日少陽脈小者欲已也此所謂少陽膽經之口氣豈其可從乎少陽病欲解時從寅至辰上經絡配當之言耳亦何足徵乎哉
