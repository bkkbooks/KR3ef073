body:
  text: 緒言傷寒之書不知成何時代矣世傳云後漢長沙太守張機仲景著傷寒論雖然後漢書及三國志並不載焉或晉唐宋元明之諸書適及此者亦皆所追考而不更聽有明證矣蓋斷之後漢者特以其自序文徵之耳矣抑自序之於撰意趣失要契字句不雅馴較之本論豈啻天壤而已哉恐後人據千金方藝文志等為之篇者乎矣且也書其名姓題漢字者卻見後人之手痕明矣哉要之吾儕所矜式唯其論與方而已如其時與人則邈乎不可的斷也無己則措而不論亦無害大義耳矣今謹稽本論之作意蓋取其規矩於易經者也乎太一肇生陰陽而八卦位焉邪氣備虛實而六經定焉卦爻系彖象部位配脈證此雖固異其道而豈非有所似乎耶且其辭句之韞古齒之於文言繁辭亦為敢不大誣乎耶以是觀之則其時與人既已於上古亦不可知矣然是余之所私淑也胡其強之人為乎哉傷寒之名載在史傳及醫籍然皆以為嚴寒所傷為之義者耳仲景氏之所旨特不然矣說者率以其不然而強之史傳醫籍之通言難哉窺其面目也蓋傷也者傷戕傷害之義也寒也者寒熱之寒而虛寒之謂也是故傷之者非寒適為四時氣候所傷也夫蓋四時氣候之於人也以常論之則必畢於生育之一道耳爾豈敢為且戕焉且傷焉乎哉雖然人苟失其常之調度則四時之氣直透徹於軀內而使血液心氣紊亂其政令於是乎病脈證出焉矣故病與不病我自取焉亦胡強之四時氣候為乎耶然則彰明哉傷者以四時氣候言之寒者以病之情狀言之也何謂病之情狀乎精氣虛寒之生於內是之為情也惡寒厥寒之顯於外是之為狀也可知寒之情狀而非嚴寒之寒也夫既寒之內外乎情狀也不得固一其態矣病輕則寒亦淺焉寒既深則病亦自重焉輕重淺深出入去住皆無有所漏於茲者矣此即所以統名於疾病曰傷寒也或人曰傷寒之統名於疾病其言照亮矣然是之小冊子所論其方才不過一百以不過一百而欲充之疾病之千態萬變則牽強附會亦尚不及焉吾則不信矣曰有是哉問也後人舉翳膜於如吾子所言莫更開眼於二千載之後者往往稱古方家之徒劃方於傷寒金匱而大羞用唐宋元明之方斷然不顧矣仲景氏旨不然矣凡疾病之在人乎萬焉而不止億焉而不盡猶如人之各異其面貌也然矣然則籍使藥方億萬豈得盡而不殘哉是故本論繫於證方以三陽三陰及傷寒中風者也此於其證方則雖如劃於茲而於其三陽三陰及傷寒中風則固不止於茲宜以漁獵於億萬之疾病焉矣夫既知以三陽三陰及傷寒中風而普漁獵於億萬之疾病則亦自於證方之如劃於茲者不啻縱橫其馳驅於茲而已亦復取謨範於茲而應為擇唐宋元明諸家之證方以供之施用焉矣是故余所謂以傷寒論治眾病者非劃證方於此之謂矣惟是以三陽三陰及傷寒中風而普漁獵於億萬之證方之謂也然故縱方劑之成於今者亦不氾濫於三陽三陰之謨範者採而以用之況於唐宋元明之方劑乎惡能為劃方於傷寒金匱哉可謂世稱古方家者未知古方也豈其可不思諸乎哉辨脈法平脈法疑是宋高繼沖當時編錄進奏之舊而孫奇等削去之遺文也如論其陰陽表裡氣血營衛臟腑虛實也不繫之以病證而單斷之於脈又論其五行配當四季不同尺寸參差呼吸出入也推之漏刻正之菽數等概比類乎素問難經者也豈敢配之於本論之脈式哉夫蓋本論之於脈式也有以狀言之者又有以勢言之者不可不精論矣浮為三陽之經脈沉為三陰之經脈遲數弱弦細微之緯於浮沉疾與促之反於表裡洪大之亙於內外此為之脈之狀也如緩緊滑澀則皆以脈之勢言之者也故不可固期之於一狀一態者也蓋緩緊之於勢也以察邪力之駿劇與平易焉滑澀之於勢也以察精氣之主虛與不主虛焉緩也者以其勢之安舒言之緊也者以其勢之怒力言之滑勢之於有膩油澀勢之於為枯槁互參伍之則輕重虛實之分界須確然而指點也是故緩緊滑澀之於四勢也必胚胎於浮沉之經脈又必含畜於遲數弱弦細微之緯脈也以是乎辨病位於當今者乃浮沉遲數弱弦細微是也察轉變於未然者乃緩緊滑澀是也後世不通此等義縷縷費之解而皆如曲直不相容者蓋有故乎爾傷寒例即王叔和之所例而固非本論之例蓋繼沖採抄之於此也所謂今搜採仲景舊論錄其證候診脈聲色對病真方有神驗者擬防世急也之言可以徵矣痙濕暍蓋出於後世病名岐流之撰者也亦繼沖之所採抄焉按此篇並上二篇及自序共四篇以冠之提頭者大氛昏乎本論之旨歸恰如玉石同櫃連貫乎魚眼珠璣也宜一掃而復之古已爾蓋傷寒論之遠古也晉唐宋元明之諸家祖述之者若干輩暨吾邦從事於此者往往雖不匱其人或不免五行生剋配當引經之說或膠漆字句而饜飫乎管窺錐指或夙建家言而甘心乎牽強附會之徒未窺其淵奧者也夫蓋學此書也固無他唯以脈證耳以脈證有道矣曰脈有形勢證有奇正不辨形勢奇正則脈證亦何足據乎哉宜以辨形勢奇正為務也是故雖假脈證之一於其字句而系之以虛實陰陽則其脈果異分寸高低其證果異輕重緩急既辨分寸高低之差而形勢之脈可察矣既辨輕重緩急之別而奇正之證可識矣而後奇正據形勢而察其機焉形勢待奇正而備其態焉以是奇正者形勢之式也形勢者亦奇正之式也式也者言所憑依而取法也診按之精施用之活莫不一出於茲也矣苟志醫者豈其可忽諸乎哉是余之所以以脈證式命於是書也又化甲子冬至日川越正淑志
