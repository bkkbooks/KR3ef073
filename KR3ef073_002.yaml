body:
  text: 卷二辨太陽病脈證並治法中第二按此篇為麻黃湯起之者也蓋麻黃湯之為證較之於桂枝湯則雖均在太陽而於其證候不為無異矣故若不別其篇而續論之於桂枝輩則必恐使人謂桂枝為太陽之正證麻黃為太陽之變證也乎於是更題中篇而揭舉麻黃青龍及葛根欲以明各自在於太陽之正位正證也此即所以中篇之起也夫中篇之於撰也當提頭之以麻黃湯而今以葛根湯者何哉曰葛根之於證方也非固出於麻黃之變者復非轉於麻黃者也若夫提頭之以麻黃湯而次以葛根湯則葛根自似歸麻黃之變也而是殊不然矣葛根則自終始於葛根而必直接里證者也故先於麻黃而揭之也且也論太陽與陽明合病以期於接陽明又論葛根黃連黃芩湯以期於接少陽以一連結之於茲也然則以葛根較之於麻黃則不能無疑於異輕重之分矣是故今標之是篇並之麻黃湯以欲示邪力相等而無輕重之分也夫既邪力相等而無輕重之分則葛根何為特接里乎邪請譬之以軍陳之配勢乎蓋麻黃之勢猶葛根葛根之勢又猶麻黃然矣雖然至配其勢則大有異別也麻黃乃弘配其勢於通身之內外故為頭痛發熱身疼腰痛骨節疼痛也是乃以通身內外之有餘地也葛根乃專湊其勢於項背故為項背強𠘧𠘧無汗惡風也是乃以項背之無餘地也於是乎須益明辨各自無有輕重之差別而惟是在於邪氣所就之異同已爾矣葛根麻黃之差其彰明如此矣且夫麻黃之於證也其變之之大小青龍不俟論矣而縱橫轉遷無所不至矣故中結之以四逆湯是乃示其轉變之極致也雖然以之序則於太陽則轉少陽者抑順也以是乎承桂枝麻黃而曰傷寒中風五六日以發小柴胡湯也而復柴胡之變之及大柴胡湯柴胡加芒硝湯柴胡加龍骨牡蠣湯調胃承氣湯者與血證火逆之出於桂枝麻黃柴胡之三變者錯綜聯舉以活其機變矣此之為中篇之概略也太陽病項背強𠘧𠘧無汗惡風者葛根湯主之標曰太陽病者名項背強以下之證言之也夫太陽之於位地也弘以肌肉間稱之則為其位地也泛然矣故別之兩途以示其異也如桂枝湯則在於肌肉間而其勢欲發於肌外者也各半二一越婢一同焉如葛根湯則在於肌肉間而其勢欲駸於肉裡者也麻黃湯大小青龍湯同焉此雖均其位地而問其邪之性則各其不均也如此矣是所以分其篇也項背強𠘧𠘧此邪勢欲駸於肉裡而主湊項背之所致也與彼麻黃湯之欲駸於肉裡之勢通身平等者殊異矣無汗出於邪勢之密也惡風出於精氣之屈覆也且夫葛根麻黃之於二湯也無固有輕重之差別矣葛根時而重於麻黃麻黃亦時而重於葛根輕重不同互相出入者也豈可概論其輕重哉又按今於此篇也先標以葛根湯而不以麻黃湯者此欲彰明乎葛根湯之不屬麻黃湯也若發端於麻黃湯而以葛根湯次之則嫌必使人謂如葛根湯則出於麻黃湯之變也是乃所以先以葛根湯也然則葛根自葛根麻黃自麻黃唯殊其勢者也奚可混論乎以是乎本篇次葛根湯以葛根黃芩黃連湯而示不之麻黃湯又次麻黃湯以大小青龍而亦示不之葛根湯也可見手段之活如此甚矣葛根湯方葛根四兩麻黃三兩桂枝二兩芍藥二兩甘草二兩生薑三兩大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌按如葛根湯及黃麻湯大小青龍湯則以不須啜粥為法者此事剛克於邪氣之略也何則以邪氣與精氣劃然為對應也與彼桂枝輩之傍啜粥以柔伸其精氣而漸發其邪者自別矣不可不辨也太陽與陽明合病必自下利葛根湯主之太陽者即上條所謂以葛根湯證言之也陽明者以分內有熱言之也合病者合發之謂也蓋表位有葛根證而以合於分內有熱則分內之熱果不能揚越內外而現其本證也其勢必內陷矣既如此則於其葛根之邪勢不得不亦一其機而為內陷也此所以為下利也故曰必自也必也者懸期之詞自也者自然之謂也今其療之也以葛根湯者固無他於治其太陽葛根之證也夫既治葛根之證則陽明分內之邪自無所壅塞其勢必衝於內外而現陽明本證必矣然則如其下利不待治而自愈亦復必矣此不治下利而下利自止之略也而後如其陽明本證則須隨其證而治之也此為之太陽陽明合病之正治例也太陽與陽明合病不下利但嘔者葛根加半夏湯主之按此例合病當作並病為説也蓋合之與並之於異別也於其證狀則固無別而於其治法亦無異也然則措而不論乎曰不然雖均其證狀同其冶法而以異其所病之始與其所轉之終則豈正無論焉哉夫合病者自初合發於各位而不更為轉變每一位為始終者也並病者自後相併而或遂歸一位或亦變合病者也其相併而稽留於此者此為之並病也故於其證狀與治法雖不違合病而異之始終如此則豈可不論之哉蓋不下利但嘔者太陽陽明之邪勢相與內陷之所致也亦猶如上章之所論而唯其內陷之勢有輕重多少之差而已夫蓋為太陽陽明之內陷也至為下利者其勢多而重矣止為嘔者其勢少而輕矣今曰不下利但嘔則此條之為並病也益以彰明乎哉葛根加半夏湯方於葛根湯方中加半夏半升太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之此其始也當以桂枝湯發汗之而醫者不察而誤下之者也故曰醫曰反凡曰醫日反之類皆咎之深辭也夫既誤而下之乎以固不的當里殞其機密表邪屈曲而其勢遂為下利者也今也雖下利遂不止其脈不至弱澀之比而尚於促脈則可知邪氣尚根抵於表也故曰脈促者表未解也促脈者謂數脈也取義於逐促而謂其勢鱗次也凡如數脈則亙於陰陽兩位而有之如促與疾則雖與謂數脈而偏在於陽位者也不可不辨矣夫蓋在於此也欲但治其表則奈既達里之勢何欲但治里則亦奈表之不解何此所以有是湯之略也葛根之於表不解乎黃芩黃連之於達里之勢乎合療而全其效者也喘以示邪勢奔於裡之機也汗出以示表邪尚不解之機也喘而汗出又猶云汗出而喘也而字有法葛根黃連黃芩湯方葛根半斤甘草二兩黃芩二兩黃連三兩上四味以水八升煮葛根減二升內諸藥煮取二升去滓分溫再服太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之標曰太陽病者其義二焉一則呼於頭痛以下之證言之也二則是之於證方也欲示固在太陽部位之本面而非變位變證也蓋麻黃之於證也固位於肌肉間而其勢壓於肉分之所致也頭痛發熱雖同桂枝湯之所言而彼則出於邪勢專於肌分與上部也故於汗出身不痛也此則出於邪勢專於肉分也故於身疼腰痛骨節疼痛無汗而喘也然則雖一乎頭痛發熱而自有淺深輕重之分不可不察也身疼腰痛骨節疼痛者非言使一病人而必具之諸證其要在令但即其一證而知麻黃之軌範也故如雲或身痛或腰痛或骨節疼痛也今不云或者以皆是麻黃之定證而不為兼證也此猶如桂枝湯之媲舉惡寒惡風之意然矣且也身疼腰痛骨節疼痛之於麻黃也以邪勢壓於肉分而氣液凝滯之所致也無汗而喘者出於邪勢專窺里而不主於揚越也蓋喘之為證不唯此而已里邪之勢達於表者亦為之矣陽明之於喘即是也不可混同矣麻黃湯方麻黃三兩桂枝二兩甘草一兩杏仁七十個上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之標曰太陽與陽明合病者又猶如葛根湯之於合病也惟是曰太陽病者以麻黃湯言之也此為之其別也夫陽明內分之邪以有麻黃證故其勢不能外透而盤回於胸中既如此則於麻黃證其勢亦不必得不為內陷也此所以為喘而胸滿也然則此於是喘也不可歸於表不可亦以歸於里乃是由於表裡兩端之勢也與上章所謂無汗而喘之喘果異矣於其胸滿亦二位之邪勢交鬱於胸中之所為也與彼少陽胸滿之既位胸中而並於往來寒熱之諸證者亦異矣不可不察也是故今療之也以麻黃湯先治太陽則陽明之邪自無所壅滯必達於內外既達於內外則現其本證亦必矣然則不治喘而胸滿而其證自止矣此猶如葛根湯之於制自下利之略也又按冠宜而後沓主之者是但即太陽之面目而謀之治方之謂也是故若太陽面目之於大小青龍則當以大小青龍耳故曰宜也宜也者言宜是證宜是時也今也以太陽之證候於麻黃湯故曰麻黃湯主之也主也者主一無適之謂也太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽病十日以麻黃湯言之也以去猶以後此於其一二日二三日之初也既現麻黃證者也今也十日以後脈浮細而嗜臥者言不拘既為之治者與不為治者而如其麻黃證則罷去者也故曰外已解也外與表頗同而少異矣但有廣狹與主客之分而已脈浮細前以顧浮大浮緊言之後以對浮緩沉細言之也嗜臥本於氣液虛損也蓋其在此乎其變之所之之道有三矣浮細之若比於浮緩則為之穀肉之所復也是其一也浮細之若比於沉細則不得不認為少陰病也是其二也若此而為胸滿脅痛則為之少陽病也即小柴胡湯之所任也是其三也設猶若也脈但浮者此承十日以去而弘論不惟於一二日二三日者而已也曰脈但浮則知浮在其本面而無餘證也所以與麻黃湯也又按是之二句為一結於麻黃湯發之也太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也標曰太陽中風者其義二焉一則以麻黃湯言之而示其證之轉於此也二則以大青龍湯言之而對後條之傷寒而以差其輕重也以是乎如太陽中風脈浮緊發熱惡寒身疼痛則大青龍湯證而即亦亙於麻黃湯證者也不可不明辨焉乃今論其證候也雖一其字面如此而即其病勢而按之則二證二方之分別斷然可察焉豈何眩曜之乎以是乎不曰無汗而曰汗不出也無汗與汗不出雖均其事體而今於屬文之間將欲眼其病勢之差別故曰汗不出也是故雖既與之以麻黃湯而不但不得汗出而加一煩躁者也然則太陽中風以下之諸證雖既在於麻黃之面目而亦病勢進於一等豈不彰明乎哉於是乎斷其證於大青龍湯以曰大青龍湯主之也煩躁邪勢壅鬱之所為也故於不汗出也煩心煩也躁手足躁擾之謂也脈浮緊發熱惡寒身疼痛解已見麻黃湯條下若脈微弱以下為服後之法式也既與大青龍湯而勿論其證之解與不解脈已至微弱則是精氣衰敗者也於是汗出惡風從焉出矣故以不可服大青龍湯為式法也若不察而服之則直見機變於厥陰必矣不可不慎也厥逆筋惕肉瞤皆是陰候而出於精氣衰敗之太甚也此為逆也者深戒不可用大青龍湯之辭也又按脈微弱對桂枝二越婢一湯之脈微弱而相共應陽浮陰弱之脈式也大青龍湯方麻黃六兩桂枝三兩甘草二兩杏仁四十個生薑三兩大棗十二枚石膏如雞子大上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉粉之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也雞子大當準八兩夫蓋大青龍湯之於方雖殊駿劇而其邪亦猛勢矣於是乎知駿劇之力足稍取微似汗也豈為患汗出多乎因是考之則溫粉方亦非醫聖之舊明矣當削汗出多者溫粉粉之二句及汗多亡陽以下三句以復其舊耳矣傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之標曰傷寒者其義有二焉一則明於承上條太陽中風而雖尚是在於大青龍湯而有至於其重如此者也二則明於今為其證也雖在於大青龍湯而以為其極地故至於難固察之而或將惑為機變於陰位者也脈浮緩是前條之浮緊一轉而至於此也蓋緊之為脈也出於邪勢縱橫於分內也緩之為脈也出於邪勢未及肉者與邪勢深潛於肉裡者也桂枝輩之於浮緩則邪勢未及肉之所使也此條之於浮緩則邪勢深潛於肉裡之所使也然則此於是浮緩非固邪氣減而出之者可知矣是故媲論於身不疼但重者也蓋身不疼但重者以肉裡既受其邪勢而無有精氣相競之動勢也以是乎邪勢旺而精氣罷憊也此所以身不疼但重也既如是則大易混於少陰也雖既易混於少陰而此仍在於大青龍湯之極地也故邪勢為時而翻於肉外此所以為乍有輕時也無少陰證者以似有少陰證言之以斷無有少陰證也此為之式之辭也發之者發汗之也言以太陽之機變極於此而其候法亦如此不常故或嫌雖今與大青龍湯而異其效用也是故曰發之以明一於其效用也按此聯舉於大青龍湯也浮緊之變至於浮緩浮緩之變至於微弱者順也故此條之變至於微弱者固不俟論也而今上條舉浮緊而直期其變於微弱者逆也此以逆示順文法也不可不熟慮矣傷寒表不解心下有水氣乾嘔發熱而咳或渴或微利或噎或小便不利少腹滿或喘者小青龍湯主之按此條麻黃湯之一變而發於心下有水氣之一岐流者也傷寒以麻黃湯言之此雖已與麻黃湯而其證仍不得解故曰表不解也夫蓋表證之不解其里聊失之機約於是乎心下畜成水氣也既而心下有水氣之不一旦而謝則遂至釀熱氣而與表熱互相親因則表裡之熱勢必效會於心中此所以為乾嘔也既乾嘔之發乎必壓表熱帥裡熱然則於其發熱也可知不但表不解之發熱而已以裡熱亦並之故益其劇於一等者也上文已曰表不解則發熱自備其中而今復舉發熱而咳者欲示是等之義也咳者以表裡之熱鬱於心胸而水液為之痰化此為之咳之由也而字可玩味矣或猶若也期兩端之辭也凡論中曰或或者皆為之兼證也是故其證之有無出入不宜必移其本劑不亦必須加減唯處其本劑而其用足者也是為之其式也渴出於胸中鬱熱也微利以心下水氣之故下焦不和調之所致也噎膈噎也表裡之熱勢鬱陶於胸中所令也小便不利少腹滿以水道效於心下之滯水不瀉也喘出於表熱壓於裡與裡熱排於表也小青龍湯方麻黃三兩芍藥三兩五味子半升生薑三兩甘草三兩桂枝三兩半夏半升細辛三兩上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升加減法若微利者去麻黃加蕘花如雞子若渴者去半夏加栝蔞根三兩若噎者去麻黃加附子一枚若小便不利少腹滿去麻黃加茯苓四兩若喘者去麻黃加杏仁半升後加減法後人之所録也論中設加減法者凡六方皆誤讀兼證而及之者也當效於茲削於他耳或曰凡疾病之活不可固期其轉變則如其兼證亦當每證有之乎而論中舉之者才止於六方大似有所遺也倘為以之準於他者乎不能無疑矣請聞其説曰兼證也者言其證不應有而有之者也蓋其證不應有而有之者因於病勢不於一途者也小青龍湯真武湯之及畜於水氣理中丸四逆散之交於虛實小柴胡湯之亙於表裡通脈四逆湯之至於虛極皆病勢之不於一途者也故取準據於此而名之於他則尚可矣通客證而混兼證則不可矣按論中凡以大小名方者小必轉大者也如大小柴胡及大小承氣即是也今青龍之於大小也少異其意矣小青龍湯雖不必之大青龍湯唯欲取其輕重之準據於麻黃湯耳如大青龍湯則在於麻黃部位而殊猛烈者也如小青龍湯均在於麻黃部位而據於一內證者也是為其別也故大青龍湯直承麻黃湯標之小青龍湯後於大青龍湯標之行文之法抑有味乎傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之此條論小青龍湯之一活法者也傷寒非以表邪言之但以始於心下水氣言之也蓋心下水氣之不一旦而謝必釀成熱氣而其熱遂及於心胸亦使水液擁滯也是所以咳而微喘也既至為咳而微喘則其勢足復現發熱也今雖現發熱而是水氣動勢之所令而不由於熱邪也故曰不渴以證之也於是乎與小青龍湯以誘之水氣於其有路而發解之者也豈不一活法乎服湯服小青龍湯之謂也寒者寒飲也謂心下之水氣也蓋小青龍湯之於發解心下水氣也津液亦不得不並耗也是故發解之之於一旦也必為引飲而自救也故雖渴不可固及於處治方者也滋潤厭足而其渴自止者也此所以曰寒去欲解也上條與曰或渴者大異矣不可混同矣太陽病外證未解脈浮弱者當以汗解宜桂枝湯外證與表證大同而少異矣表證者以發熱惡寒言之故其所指狹而期其情狀者也外證者統於因緣於外之諸證言之故其所指廣而不期其情狀者也是故如表證則雖狹而以其候之在於準證為之重辭也如外證則雖廣而以其候之不期準證為之輕辭也蓋此於是證也雖外證未解而已有內證欲發之機也雖然其脈未至沉弱而尚在浮弱則先當發之於表於汗之候也故曰當以汗解也而今於是證也雖不具桂枝之準證以桂枝湯發汗之則亦或足並內證欲發之機而制之者也故曰宜也太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之此其始也太陽之病勢已犯腹中而發一二之裡證者也是故既為與承氣輩而拔去裡實之勢也論曰太陽病二三日蒸蒸發熱者屬胃也調胃承氣湯主之正此等之比也今也雖裡實既拔去而於其表位也尚有餘邪之不去而卒乘於下後之虛聊窺其里者此所以出於微喘也故曰表不解故也方中所加之厚朴杏仁二品為驅既及喉嚨之勢也桂枝加厚朴杏仁湯方於桂枝湯方內加厚朴三兩杏仁五十個余依桂枝法太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯按二條雖如可論而文辭煩冗意義膚淺恐不正文者也太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之此舉麻黃證熱多之極而以一結於麻黃類者也脈浮緊無汗發熱身疼痛之雖在於麻黃位地而見之於無惡風寒且日數之至八九日則大異麻黃之常體以是乎或恐令人誤於裡證也故曰表證仍在以斷仍在於麻黃位地也此當發其汗對有彼八九日而不可發其汗者言之也服藥已以下言服麻黃湯之後也微除謂病證漸微除去也是為其通例也其人以下所謂瞑眩也故曰其人更端之也蓋暝眩之為發煩目瞑者邪氣稽留而既至八九日則不固易解者也雖然今與麻黃湯以得其肯綮乎邪氣何為得不解乎於是乎一時為發煩目暝而解化劇者言其瞑眩之劇者也蓋邪氣欲解之動勢氣血必逆頭腦此所以為衄血之由也所以然者以下二句蓋後人之注文耳太陽病脈浮緊發熱身無汗自衄者愈後人據衄乃解之義而亦論有麻黃證之得自衄而解者也豈足為式乎二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也此條後人謾論二陽並病之轉機者也亦不可從也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和使自汗出愈按此條據傷寒二三日心中悸而煩者而發之脈式者也當移彼條之次耳凡脈之於浮數也其病當解於表於汗之候也故曰脈浮數者法當汗出而愈也蓋雖汗出而愈之一而於其義則有二途也一則發汗而愈者也此即桂枝麻黃之所與也二則自汗出而愈者也此即建中輩之所與也若下之雖脈尚於浮數而身重心悸則已無表證者也故曰不可發汗當自汗出而解也夫既下之而身重心悸則其脈不應浮數而尚於浮數者何也曰此其病勢雖入於裡而未盡離表位此乃所以使脈浮數也身重心悸者出於里邪之勢達於心胸及表位也所以然者以下五句蓋後人之所附綴不可從矣脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也後人效前條之義而追論及於此者也豈本論之意乎哉脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯二條似論於太陽發首之條雖其言之如不背而抑亦後矣恐後人之語氣乎病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯此論後條之義也榮衛本論之所不言矣亦後人之攙入耳病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之冒首以病人者要使人知於其病位之難辨者也藏者腹內也言時發熱自汗出之外腹內無他病也蓋斥云他病者腹滿腹痛不大便及難硬之類是也今也病雖在桂枝之位地而見於時發熱自汗出且無惡風寒則殆類陽明之象狀者也故曰藏無他病以斷於不陽明也時發熱者言發熱以時發作也此乃桂枝熱多之極使之然也蓋桂枝之於熱多也病勢雖既沉淪而將駸於裡而以尚在於表位復不得不為時揚越也此乃所以時發熱自汗出而不愈也先其時發汗則愈者言先發熱之時而與桂枝湯也何則病勢之既沉淪乎發之之力易鈍矣病勢之已浮揚乎發之之力益利矣此所以先其時發汗也此衛氣不和也六字蓋後人之攙入耳傷寒脈浮緊不發汗因致衄者麻黃湯主之此與前之脈浮緊發熱身無汗自衄者愈者全同其口氣亦奚為據乎傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯此條論承氣湯之疑似於桂枝湯又桂枝湯之疑似於承氣湯者也傷寒通太陽陽明兩位而發之也蓋以承氣湯言之則主不大便而客頭痛承氣之波及於頭痛者以裡實之故表氣澀滯之所令也以桂枝湯言之則主頭痛而客不大便桂枝之波及於不大便者以表邪之故裡氣澀滯之所令也有熱者亦以二途言之一則以有發熱言之二則以有身熱言之與承氣湯對桂枝湯標之故曰與也然則表裡主客分別求之見證殊易混淆太甚矣於是乎復發其一式法而明核於表裡主客之部分也即其小便清者知不在裡仍在表也當鬚髮汗是也此文又猶云其小便濁者知不在表既在裡也當須下之是為之略文備得而盡焉讀人可熟慮矣若頭痛者必衄此牽來上文頭痛而以示主頭痛者之候法也今頭痛之於為衄則豈但表氣澀滯之克所為乎可知邪氣以主在於表位而氣血上騰之令然矣又按但曰承氣湯者通事於三承氣之義也玉函經作未可與承氣湯大非也傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之此條一結於發汗之諸類也而要欲復示於再感之治法者也夫再感之於治法也亦不固異於初邪之治法宜發汗而發汗宜吐而吐之宜下而下之循環無端應其機變猶如療初邪之方法也豈其別治之為乎傷寒發汗解者以麻黃湯言之也夫既發汗奏功後半日許復煩脈浮數者此為之再感之狀也是於其往時也既以麻黃湯發汗之則嫌於雖有今復再感之狀而亦不宜發汗也故曰可更發汗也煩者苦煩也由於邪勢但鬱於表位而未備證候也脈浮數明徵病位於表也於是乎以桂枝湯更發汗也抑桂枝湯之於方也為之發汗第一策故雖未備其準證而知病已位於表則當活施之者乎邪凡病若發汗若吐若下若亡津液陰陽自和者必自愈凡大凡也總稱之義也凡病籠罩汗吐下之三候言之也蓋汗吐下之於治法也無益於人之常也固矣雖然當有其病也非施之則邪氣不得除去矣是不得止而施之者也然則此於其汗吐下也皆得其處而邪氣已除去者也雖邪氣既除去而問之精氣則不得不虛耗矣雖精氣既虛耗而無固救之方法唯漸以飲食之養則虛耗自當復耳故曰若發汗若吐若下亡津液者必自愈也亡上衍若字陰陽自和四字亦後人之注文也大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈此條後人效上條之所言而發億見者也可削去耳下之後復發汗必振寒脈微細所以然者以內外俱虛故也此亦後人據後條述其管見者也又奚從焉哉下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之此於其始也下之後復發汗而及於此者也然則既見或陽明證或太陽證可得而知矣晝日煩躁不得眠夜而安靜者此邪氣雖尚在於陽位而於其勢則已欲張大於陰位之所令也是故其動勢為煩躁不得眠也雖然以邪氣未歸於陰位而在於陽位其勢時復翻於陽位此所以出於夜而安靜也蓋不可拘泥晝夜字唯是假以言其發作以時耳無大熱者大非大小之義言熱不備大綱也發熱惡寒往來寒熱身熱潮熱是為之大綱之熱也夫於是證也不能身全無熱而煩躁之以時發作乎不得不或誤認之往來寒熱之變態者又或誤認之潮熱之變態者也於是乎曰不嘔不渴以明非少陽又非陽明也脈沉微標是湯之脈位而期其證於陰位也茯苓四逆湯曰發汗若下之病仍不解煩躁者非大似之乎雖然彼則少陰之證而無岐路者也故服之之法亦以徐徐為式此則勢已及少陰而邪尚在陽位者也故今雖尚見熱狀亦如欲速走於陰位何以是欲一旦而救之於陰於初而使夫不至駿劇也故服之之法不以徐徐而以頓服為式彼湯之緩而重此湯之急而輕方證雖大不遠而不同其意不可不辨論也無表證三字恐無大熱者之旁注耳當削之乾薑附子湯方乾薑一兩附子一枚上二味以水三升煮取一升去滓頓服發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之以下五章共論桂枝之變而各差之者也此其始也以桂枝湯發汗之故其表殊虛而里亦不得不從而虛者也於是乎邪氣乘其釁隙而直侵入於腹中是故如其表證則已而無有才可見者但不和之狀而已脈沉遲此對前位之浮數而明於邪氣位於太陰者也夫雖既位於太陰而其邪氣之不劇乎未能縱橫其勢於腹中也於是乎其勢反走於表位而糅雜於彼不和之表氣此所以為身疼痛也雖疼痛之在於表而推究之因來則已在於里邪之未能振其劇勢也如此矣過此已往若邪氣益畜其勢則現其證候於腹中必矣即如建中湯理中丸是也可知此湯之雖位太陰乎較之於建中湯理中丸則抑緩而輕矣不可不辨焉桂枝新加湯方於桂枝湯方內加芍藥生薑各一兩人參三兩余依桂枝法按是方舊名桂枝新加湯者也後世謾旁書其增加者竟混於方名為蛇足耳發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之此亦承桂枝之變而差之之二也發汗後其義同前條之所言也夫蓋汗出而喘之於證也大似桂枝證尚不解者故曰發汗後且曰無大熱者以著明於其不太陽也既著明於不太陽則亦得無類於陽明乎若夫在於陽明之位地而為汗出而喘乎應媲於身熱或潮熱之比而今亦於無大熱則其不陽明亦可以察矣以是考之則是湯之位於太陽陽明間亦可準知矣故今試推索其脈則非浮緩之預於太陽者又非疾實之預於陽明者可見在其中間而未偏歸於其兩端者也而不標出其脈者是弘其機變者也豈不活手段乎冠可與者言可較於桂枝湯及桂枝加厚朴杏仁湯白虎湯及承氣湯之類也沓主之者言比較之畢而後歸於主一無適之場也此戒不可草忽而決定於是湯之義也無大熱者解已具於前條或曰孫思邈論麻黃之能曰止汗通內此言實得是湯之方意可據以從也曰不然蓋麻黃之於能也疏漏乎密閉之邪者也故立其功績也或得汗而解或發熱而解或得便利而解不可得而期矣蓋疏漏乎邪氣者本也發汗與止汗者末也孫氏之所論惟措其本而據其末者也可謂惑矣麻黃杏仁甘草石膏湯方麻黃四兩杏仁五十個甘草二兩石膏半斤上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之此亦承桂枝湯之變而差之之三也此以既用桂枝湯之過其度故其汗亦過多也論曰微似有汗者益佳不可令如水流漓病必不除是為之發汗之式也今也不得其式如此則曷為得全其治乎哉邪氣雖幸挫其勢而津液虛損精氣僕蹶卒為失其運行開闔不調上下不順也於是乎精氣輳心胸而不得瀉表裡上下也此所以為其人以下之諸證也曰其人以更端之者忒於前有熱邪者而明於今特本於精氣也夫精氣偏輳心胸則心胸不得必不騷動矣故叉手自冒心而自堪其騷動也叉手言兩手相錯也冒猶覆也心下悸亦按之則足才堪之也雖然身自既冒其心上則復如心下何此所以欲使人得按也蓋按之而足以堪之者可益以徵於此湯之不因於熱而本於氣矣是故以桂枝甘草湯貫道於彼鬱滿之精氣而導之表裡四末則精氣必舒暢津液必賑贍於是乎開闔必調上下必順深哉旨也桂枝甘草湯方桂枝四兩甘草二兩上二味以水三升煮取一升去滓頓服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之此亦承桂枝湯之變而差之之四也發汗後如上章之所言也此於是證也汗後之變下焦畜滯水而其勢發臍下悸者也故曰其人更端之而以忒於前證也夫下焦有滯水也或有與豬苓湯者或有與真武湯白通湯及四逆湯者而此獨不然矣何則水之勢激而為悸悸之勢逆而欲沖氣道者也故曰欲作奔豚以示有奔逆之勢也彼豬苓湯之水勢達於心胸及太大表者與真武湯白通湯及四逆湯之水氣內陷而為下利者自別矣不可混同矣且夫奔豚之為證也內外上下之機活懸隔而精氣衝於氣道而氣息頓絶矣無復活路者也是故論中雖標出奔豚而唯名而已未論其全證者以為其篤危之極也可見論中無救之之方法焉此條曰欲作奔豚桂枝加桂湯曰必發奔豚皆未備其全證者也金匱要略舉奔豚湯者其證方可疑恐後世之偽贋邪茯苓桂枝甘草大棗湯方茯苓半斤甘草三兩大棗十五枚桂枝四兩上四味以甘爛水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘爛水法取水二斗置大盆內以勺揚之水上有珠子五六千顆相逐取用之以甘爛水者豈本論之旨趣乎蓋投水以藥而煮之釜中其湯既成則畢是藥之氣味耳奚有拘水之性而異其效用之餘暇乎哉時珍論水品大備焉其他諸家本草亦各非無詳説雖然果其説之是乎吾未知焉發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之此亦承桂枝湯之變而差之之五也發汗後同上章之所言也此於是證也以汗之故心胃順接之氣卒失其宜胸中氣鬱閉腹中水液澀滯而為腹脹滿者也蓋腹中水液澀滯者本於胸中氣鬱閉也故今與此湯以治其胸中鬱閉則其化自及腹中而和其水液澀滯必矣是此湯之所以治腹脹滿也所謂欲求南風須開北牖是也是故於其腹脹滿也固無實候又無虛候可知矣與彼陽明太陰之為脹滿者大異矣不可不辨焉或問曰腹中水液澀滯而為腹脹滿已得其説果如其説則於其胸中亦胡得水液澀滯而不為胸滿乎如吾子説可謂隨意焉曰不然矣夫胸中氣鬱閉則腹中從而鬱閉既使腹中鬱閉則水液並之而澀滯也蓋水液之殊易澀滯於腹中者此因於腹中之阻遠心而其機用之不健於此也但於胸中則與之異矣胸即心之位地而最親近於心故心氣雖勞而尚克施其政令焉此所以水液之未易乘於此也子其思諸厚朴生薑甘草半夏人參湯方厚朴半斤生薑半斤半夏半斤人參一兩甘草二兩上五味以水一斗煮取三升去滓溫服一升日三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之按動經二字後人之所加也尚論篇補入若發汗三字者為是矣傷寒包裹汗吐下三證言之也後字不但於下後而已通汗吐而言之也蓋其在斯也以汗吐下之變畜水氣於心下者也夫心下停水之不一旦乎終釀成熱氣其勢卒激於胸故為逆滿也既水熱之激於胸乎通身之精氣無不必輻輳於此而抗其勢焉此所以氣上衝胸也且夫水勢並精氣而填於胸中則上盛下虛可知焉是故運動身則水熱精氣亦不得不搖動矣此所以起則頭眩也頭眩言頭目眩暈也脈沉緊此標是湯之變脈者也若夫論其正脈則於浮數浮緊之比必矣今標沉緊者弘是湯之活用而親近之於真武湯也此乃以其病道之出於一轍也是故系之於發汗之逆曰為身振振搖者也振振搖即真武湯所謂身瞤動振振是也茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩白朮二兩甘草二兩上四味以水六升煮取三升去滓分溫參服發汗病不解反惡寒者虛故也芍藥甘草附子湯主之此論發汗之變直轉於少陰者也病不解非言表證不解就大體言之也故不曰後是以其不解之候必在腹候及脈候者也而若其表證則或止去乎假令其不止去者亦無敢加其勢於表位矣反也者顧發汗言之也蓋於其初也以無惡寒者論之則今歷發汗而反出惡寒者也若以有惡寒者論之則今既至於此而必反加其劇一等也是之兩岐包以曰反也然則此於是惡寒也不出於邪實之域而出於精氣虛耗之境內豈不確明乎故曰虛故也醫宗金鑑不作已為説者牽強殊甚矣芍藥甘草附子湯方芍藥三兩甘草三兩附子一枚以上三味以水五升煮取一升五合去滓分溫服疑非仲景意疑非仲景意五字出於後人之為固不俟辨矣發汗若下之病仍不解煩躁者茯苓四逆湯主之此亦汗下之變直歸於少陰者也病仍不解與病不解大同其歸趣而少異其前蹤也仍者因也猶仍舊貫之仍也此言汗下之前蹤仍未解而發一煩躁者也此於是煩躁也邪氣遽位於陰位而欲益駸於重地乎其動勢通徹於心而為煩躁也非邪氣必位於心胸而使之然也是故邪氣若縱橫於陰位而遂使陰證繼踵蜂起則此是煩躁卻自止必矣夫煩躁之於證也陰陽虛實皆與焉現之陽位者殊在其極地如大青龍湯大陷胸湯大承氣湯是也現之陰位者預其始終也而始則可治終則不可治如乾薑附子湯及此湯在其始者也如於其終則以為篤危之極也故無固救之之方法論曰少陰病吐利煩躁四逆者死即是也四逆湯通脈四逆湯之類不論及煩躁者抑有深意哉又按此條及上條於共遽現少陰證則一也雖然以此湯比之於芍藥甘草附子湯則聊有緩急之別矣彼則其外殊虛邪亦專於外故惡寒所以為緩也此則內外均虛邪氣既在於重地故煩躁所以為急也茯苓四逆湯方茯苓六兩人參一兩甘草二兩乾薑一兩半附子一枚上五味以水五升煮取三升去滓溫服七合日三服發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯按此條對芍藥甘草附子湯而論精虛之亙於兩岐惡寒之預於二途者也夫既後則精虛之並於邪氣而惡寒者也故曰發汗病不解也此則精虛之於無病而惡寒者也故曰發汗後也然則此於其惡寒也但出於精氣之不舒暢者也故以穀肉果菜而鼓舞之於精氣則惡寒自止矣豈以草木蟲石攻之之為乎哉精虛之亙於兩岐惡寒之於於二途如此備矣於是乎復附論之以反對之實曰不惡寒但熱者實也實者邪實之謂也熱者主身熱而包裹諸熱之謂也蓋實之為實特在於陽明而太陽少陽屬焉故先期之於陽明曰當和胃氣與調胃承氣湯也與猶預也預及於太陽少陽之義也千金翼尚論篇熱上有惡字玉函宋板千金翼共作小承氣湯不皆必是矣太陽病發汗後大汗出胃中干煩躁不得眠欲得飲米者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之此條論太陽病發汗之變之於二岐者也發汗統桂枝麻黃言之也發汗後大汗出又猶云發汗大汗出後也後字有轉遷法勿忽視焉夫於發汗大汗出後也雖邪氣無既有而胃中之水液卒沽渴遂致腠理閉塞此所以出於煩躁不得眠也欲得飲水者其意役役於欲得水而自救其沽渴也既知此則少少與水使之以先導其水液則胃氣漸和腠理自調故曰令胃氣和則愈也今也雖不標其脈而對之於下文若脈浮則在微緩之比可推知焉若脈浮以下承不得眠以上論之也是乃於其發汗後大汗出者也此雖既無表證而邪氣尚在肌肉間而聚水氣焉者也是故為胃中乾燥不得眠也小便不利以有滯水也微熱者微少之熱也消渴者渴之甚也夫渴之尤甚大似在於陽明雖然此尚並於微熱而無彼所謂表裡俱熱之勢者也可知渴之不根柢於熱而並出於水液聚肌肉間之變也此為之五苓散之主治候也苟異同於此則可必預及豬苓白虎之類也故曰與也五苓散方豬苓十八銖澤瀉一兩六銖半茯苓十八銖桂半兩白朮十八銖上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈或曰服五苓散之法見之多飲暖水令汗出則湯服之亦可矣何拘散服之為乎曰否本論制其宜而設之方法奚混淆之哉凡湯服者頓其效用散服者漸其效用是為之其分也水熱之凝於肌肉間也殊非頓發頓利之所宜須以漸發漸利全之效用也且也於水逆之證水尚吐之況湯藥乎非散服之則無固制之之道也方法之密曷為強之乎哉發汗已脈浮數煩渴者五苓散主之已猶畢也以無論其病證差與不差而唯服畢一劑言之也此其始也雖隨太陽表證而發汗之而反加於脈浮數煩渴者也此於是浮數也非但表邪欲駸之所令職由於水液走於肌肉間之動勢也煩渴者渴之勢至為煩也是水液之不護胃內而並表熱之所致也於是乎無論於無表證者縱令表證尚未解而非發汗之所克可治矣故以五苓散發利其水熱也是為之五苓散之一活用也醫宗金鑑浮數下補入小便不利四字不必是矣傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之此章合論五苓散之在於太陽少陽間者與茯苓甘草湯之在於虛實間者也故標傷寒以包二方也蓋合論二方者以均本於水熱而候法亦互疑似也夫既以二湯之本於水熱乎於其候法亦互易疑似雖然固殊其位則於其治法亦已異矣於五苓散也水熱輻輳於肌肉間而其動勢致為渴也於茯苓甘草湯也水熱凝滯於心下而無有為渴之動勢也故曰不渴者也厥陰篇復舉茯苓甘草湯曰傷寒厥而心下悸者可以參考矣且夫茯苓甘草湯之以在虛實間乎或主親實則其候法疑似乎五苓散也如此矣或主親虛則其候法復疑似乎真武湯也如彼矣此乎彼乎相對以全其方意錯綜以辨其因來至矣哉仲景氏之微意為然也茯苓甘草湯方茯苓二兩桂枝二兩生薑三兩甘草一兩上四味以水四升煮取二升去滓分溫三服中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之中風發熱以桂枝湯言之對下文六七日不解而煩而論太陽之輕者也六七日不解而煩以麻黃湯青龍湯言之對上之中風發熱而論太陽傷寒者也表裡證非謂柴胡證謂有表證亦有里證也表乃斥上文中風與傷寒也里乃斥少陽陽明之二位也蓋少陽之雖為表裡間證而對之於太陽則呼為里證亦無害耳矣夫於少陽陽明之狀態也以何乎認焉乎曰以渴證陽明以嘔證少陽也今也雖不揭示嘔而已見為吐則嘔自具其中矣所以曰有表裡證也讀人須熟慮焉按此條之所謂既太陽而有中風傷寒之證而不唯是而止矣少陽陽明繼踵而蜂起者也然則其治之也似可取準據於三陽合病而特不然矣何則今於是證也以水逆之故水尚吐之況藥汁乎於是乎先與五苓散以發利其水熱之動勢則水藥當自得入於腹矣既水藥之入於腹乎必以治例先後之式而療之可矣今用五苓散者抑一時之權法耳此猶與脈浮數煩渴者與五苓散者同其活用也或曰水逆之不渴者亦當用茯苓甘草湯唉是牽強之甚矣不可從也未持脈時病人手叉自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此後人據桂枝甘草湯而發之論説者耳發汗後飲水多必喘以水灌之亦喘發汗後水藥不得入口為逆若更發汗必吐下不止以上二條共論五苓散者也亦後人之所記矣發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之此既表邪而發汗之若里邪而吐下之如其前證已罷去故曰後也今也鬱熱尚纏心使心恍惚此所以為虛煩不得眠也虛煩即心煩也對實煩而曰虛煩也蓋冠煩以虛者以心下濡言之也論曰下利後更煩按之心下濡者為虛煩也可以徵矣且夫大柴胡湯調胃承氣湯之於鬱郁微煩大陷胸湯之於短氣躁煩心中懊憹白虎湯之心煩微惡寒大承氣湯之心中懊憹而煩瓜蒂散之心中滿而煩是皆為之實煩也故於其心下則皆硬者也硬之於實煩濡之於虛煩不可不別論矣若劇者以下舉雖均在梔子豉湯而其候法大類於實煩者也是雖已類於實煩而心下則固濡矣此所以其治法之尚在於此湯也反覆顛倒躁之狀態也心中懊憹心中憂悶之謂也梔子豉湯方梔子十四枚香豉四合上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服張思聰刪得吐者止後服一句不必是矣然則以梔子豉湯為吐藥乎曰否夫蓋梔子豉湯之於證與方也邪在胸中而藥亦之於茲則欲其解之動勢或有為吐者故曰得吐者止後服也何必削之為乎麻黃湯所謂與其人發煩目瞑劇者必衄其意頗同焉若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之此承虛煩不得眠而並於若劇者必反覆顛倒心中懊憹而論其機變者也奚得為髮圈而別之乎少氣氣息衰少之謂也蓋使氣息衰少者以精氣不舒暢也故以甘草寬道之也嘔者胸中鬱熱之極或至於此乎故以生薑排達之也梔子甘草豉湯方放梔子豉湯方內加甘草二兩余依梔子豉湯法梔子生薑豉湯方於梔子豉湯方內加生薑五兩余依梔子豉湯法發汗若下之而煩熱胸中窒者梔子豉湯主之此蓋既有表證故發汗之若既有里證故下之然不歸會於制其表裡之邪而徒搖動於表裡而已是故表裡之邪卒湊於心胸是煩熱之所由而出也為熱苦煩此之為煩熱也夫既表裡之邪卒湊於心胸則氣液必不得不為擁滯於胸中也是乃胸中窒之所由而出也窒塞也或曰此其始也發汗下之之雖不歸會於制邪而邪氣已湊胸中則如其前證亦得幸而罷去乎曰不然是其轉機之殊駿速乎邪氣尚殘其影於表裡而於其形則已湊胸中者也故不曰後曰而也可知如其前證未全罷去也以是乎邪氣形影主客之分尤足可以推焉此乃所以於不處以製表里之方劑而執權於表裡間而處此方也是乃梔子豉湯之一權法也亦猶五苓散之論權法於脈浮數煩渴者也邪傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒五六日以陽明證言之也此既下之而不得其節所以曰大也雖既不得其節而於其外候亦已無舊日之狀故曰後也以是乎知今雖曰身熱不去而其狀不現見唯是以前位之尚未解言之也然則心中結痛之雖似更本於他因而猶出於身熱不去之變亦可知矣故曰未欲解而以繁之於前位也行文之活可稽知焉結者蘊結之意言痛深著於心也傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之此條承上傷寒五六日而亦差下後之變者也於彼條則以下之之過度乎邪氣尚未欲解於前位也於此條則以下之之頗得其處乎邪亦頗解而余勢才鬱於心胃間而犯上下者也心煩之出於犯上乎腹滿之出於犯下乎可益以徵邪氣之在於心胃間也是故今雖為心煩腹滿而不固備熱位及心腹之諸證者也與以少陽陽明呼之者大異矣豈可混乎哉臥起不安言起臥共不安穩也此文又猶云臥起不安心煩腹滿者也而今曰心煩腹滿臥起不安者此順文意而逆事態為之文法也得吐者止後服六字此條及下條當無有焉因梔子以名方復混出於此乎可削去耳梔子厚朴湯方梔子十四枚厚朴四兩枳實四枚已上三味以水三升半煮取一升半去滓分三服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之此條亦差傷寒五六日之變者也曰醫曰丸藥曰大者殊咎之重辭也此於是身熱不去也以誤治之甚故其狀尚現見者也故不曰後也與彼梔子豉湯身熱不去似而非者也夫既以下之之過度乎機活弛怠飲乘其隙而滯於心胃間所以為微煩也然則今於是證也有身熱不去之實與為微煩之虛也於是乎梔子以制身熱不去乾薑以制飲之為微煩者也惟是湯之方意為然矣以上五條為一聯也梔子乾薑湯方梔子十四枚乾薑三兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服凡用梔子豉湯病人舊微溏者不可與服之後人以梔子湯匹之瓜蒂散遂至見梔子湯猶瓜蒂散也謾發是例者也不可從焉太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之此條論桂枝麻黃之變直至於真武之地位而已畜虛水者也仍發熱雖固本於前位而今尚不得去者以虛水之動勢相應於茲也然則縱使之本於前位而猶如出於今之位然矣故冠曰其人也心下悸頭眩出於水勢搖動之變也身瞤動振振欲劈地者虛水動於上於表之所為也少陰篇復標是湯如曰四肢沉重疼痛者虛水陷於下於內之所為也故彼則為自下利此則為心下悸頭眩雖均在一方劑之所治而自有始末輕重之分也如此矣身瞤動振振言身目搖動也劈捶也欲劈地言將仆地捶心也尚論篇劈讀為闢者鑿甚矣按桂苓朮甘湯曰心下逆滿氣上衝胸起則頭眩脈沉緊是非大似於此湯之所論乎雖然彼則屬實水而正在心下故心下逆滿也此則在虛水而已及一身故身瞤動振振欲劈地也此為之其別也且也腹勢之強弱精神食㑊之不同最與矣當參考而決其候法耳矣咽喉乾燥者不可發汗淋家不可發汗發汗必便血瘡家雖身疼痛不可發汗發汗則痙衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠亡血家不可發汗發汗則寒栗而振汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸闕平素居其病指以曰家也而論之治例者皆非本論之辭氣豈其可從乎哉病人有寒復發汗胃中冷必吐蛔寒熱虛實之變皆有為吐蛔者豈如此拘之為乎本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆此條至若先發汗治不為逆猶是可矣如本先下之以下則不可也通篇更無是等之義也以上八條總是後人之攙入耳矣傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯傷寒以太陽之重者言之也夫既太陽之重乎或有象里證者於是乎一旦下之雖然非固下攻之所宜故不唯太陽之不解下利連續而不得止遂現清穀者也清圊通清穀言利完穀也身疼痛蓋有三道之別也一則出於邪氣實於表位也乃為之麻黃類之證也二則出於以邪氣故精氣虛於表裡也乃為之附子劑之所治也三則出於邪氣已謝而運用尚未復也乃為之桂枝湯之活用也疼痛之別雖如此而今以清穀之急於精虛乎無暇論所以其然直要以四逆湯救里也既以四逆救里之後若疼痛之與下利愈者固無論焉若其疼痛之並有表證者則所謂邪氣實於表位者也宜以麻黃之類者也今於是疼痛也在於清便自調而無有他證則所謂邪氣已謝而運用尚未復者也宜以桂枝湯通暢其內外上下使之復其運用耳與所謂吐利止而身痛不休者正同其義也病發熱頭痛脈反沉若不差身體疼痛當救其里宜四逆湯此條論太陽之變直之於陰位者也發熱頭痛雖固本於太陽而其脈不於浮而於沉則不可復名之以太陽者也然則以少陽為名之乎亦如何有發熱頭痛之本於太陽者於是乎單曰病以欲使讀人知此義也蓋今為發熱頭痛者是太陽之餘勢尚波及於此之所令也稽之於脈反沉以下之機變則可自辨知焉差者差錯之義若不差言脈沉不差錯也且也今加身體疼痛則其病既轉虛地明矣故曰當救其里也按此條主論陰陽虛實之機變者也故與正論一方劑之規則者自有詳略之異也抑於四逆湯也為之附子劑之宗家也今標宗家而曰宜則支屬之附子劑各自系其中故不標四逆湯之證而處以四逆湯者也可謂醫聖之活手段矣又按此條一結於葛根麻黃之變者也上篇與一結桂枝之變於四逆湯者正同其意也且夫於桂枝麻黃之變也縱橫錯綜尚且不盡於此是故下條復標出小柴胡湯而論究其變之變者也太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里和然後復下之按此條意義淺劣恐後人之論耳尚論篇作里未和得字無之太陽病未解陰陽脈俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之脈微者而下之亦是一種之口氣與本論不相協矣蓋後人之辭氣乎矣太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯此後人就桂枝之準證而為注解者誤出於此耳傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之中風當在五六日上也聯舉傷寒中風者喚上篇中篇而言之也五六日概舉少陽之日數也蓋其始一二日二三日之在於太陽也或非桂枝湯則在麻黃湯或非麻黃湯則在桂枝湯既在桂枝麻黃之場而尚不得解者遂至四五日五六日而不得必不為此位之轉機也於是乎先揭往來寒熱以示熱位之異於舊日也寒熱互來往謂之往來寒熱也蓋少陽之以心胸表裡間為其位也最親近於太表與胃腹也故其勢或不壓里則必激太表也既激於太表則太表必屈覆此所以來寒也或不激於表則必壓於其里也既壓於其里則胃腹必搖動此所以來熱也凡少陽之位心胸也其勢注走於表裡而發往來寒熱者此為之少陽正位也雖均位心胸而其勢不注走於表裡而於無大熱者此為之少陽變位也正變之分不可不辨焉胸脅苦滿言心胸脅肋都滿也蓋如胸脅滿則以肋骨之故難遽以辨之也是故令之語病者曰苦滿也苦者苦惱之義也默默沉鬱貌出於邪氣阻心之機用也不欲飲食與不能食自異矣不欲者自心之辭也不能者自胃之辭也是即別少陽陽明之辭氣也亦不可不辨焉心煩邪勢迫於心郭之所為也喜好也嘔之為證也發其自然固矣而嘔乃聊遣其鬱悶乎故或亦好為之也故曰喜嘔也蓋本劑之定證止於此焉如以下所舉之諸證皆為之兼證也兼證之治例已具小青龍湯條下矣胸中煩而不嘔者由於邪氣不主徹於心中也乃本劑之輕證或止之乎或渴出於熱鬱喉嚨也或腹中痛心氣不疏達於腹中之所令也或脅下痞硬出於心胸之邪勢專接於腹中也乃本劑之重者或及之乎或心下悸小便不利者心胸之機活已勞則心下必貯水故為心下悸也既而有心下貯水乎通身之水道或失分利故為小便不利也或不渴身有微熱是乃本劑之殊輕者亦或止之乎或咳者胸中畜飲之所為也曰與復曰主之者如麻黃杏仁甘草石膏湯之所謂耳小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩半夏半斤生薑三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服後加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫服取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩後加減法説已審小青龍湯條下也血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛必下邪高痛下故使嘔也小柴胡湯主之後人因上條議柴胡證者也豈正文之意乎服柴胡湯已渴者屬陽明也以法治之按渴有主客之分也小柴胡湯曰或渴者即客證也白虎加人參湯曰大渴者即主證也今服柴胡湯已渴更加甚者亦不得以不為主證也故曰屬陽明也雖然不可亦以概於茲須據通篇之式而弘治之耳矣故曰以法治之也得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦此蓋後人即次條發億見者也豈足據以論乎傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之此條論太陽之一變直馳於小柴胡之極地者也既在於小柴胡湯之極地而尚且有太陽之餘殘是故難遽以辨其所部位也故冒首以傷寒也身熱惡風蓋言往來寒熱之變態也若夫身熱之在於陽明乎以不惡風為法而今視繼論以惡風則可知尚在少陽往來寒熱之一變態而疑類於陽明之熱位也頸項強太陽之殘證也是以其轉機之駿速而尚及之也脅下滿以邪氣位於少陽之下抵也手足溫而渴者對手足熱而渴之在於陽明者而明論於少陽客位之渴者也與身熱惡風句意相照應矣傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之按此條論少陽太陰互疑似者也故曰傷寒以包兩岐也陽者以少陽言之陰者以太陰言之也法當二字當序先與小建中湯之上也蓋其在斯也以腹中急痛一證特立之論者也是故指曰陽者但於之矣指曰陰者亦但於之矣然則以何為辨別乎腹中急痛之陰陽而處之治方哉須以脈診審於陰陽之候法也雖然今陽脈之應弦而反澀陰脈之應澀而反弦則脈亦背其常式者也既如此則亦奚足明斷於其陰陽而處之治方哉於是乎亦擲棄脈之澀弦而殊發一活式曰法當先與小建中湯不差者與小柴胡湯主之也此既處其治也非固審辨於證與脈者而但就於其地位之在腹中而漸謀其治者也豈不活式乎若雖既與小建中湯而尚於不得差者縱令其脈澀亦復當宜小柴胡湯耳矣澀澀滯也弦取義於弓弦之急也腹中急痛言急迫而痛也又按少陽太陰之特在於腹中急痛之一證而不媲並於餘證者不可無辨焉蓋以少陽言之則邪氣雖尚位少陽而於其勢則既脫表裡注走之轍而為專屈於腹中也於是乎出於一個之急痛者也此乃所以不見柴胡本證而復使脈澀也以太陰言之則邪氣雖已位太陰而以為其初位乎未能安著於腹中而其勢暫致相競也於是乎亦出於一個之急痛者也此乃所以未具小建中之諸證而亦復使脈弦也小建中湯方桂枝三兩甘草二兩大棗十一枚芍藥六兩生薑三兩膠飴一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也嘔家以下十二字恐後人之所追論矣傷寒中風有柴胡證但見一證便是不必悉具此為小柴胡湯發之者也當序於彼條之次也傷寒中風以桂枝麻黃言之也蓋太陽之轉機乎少陽也縱令桂枝麻黃之證尚未解而已見於柴胡之一證則當與柴胡湯耳矣豈徯諸證之悉備焉乎是之為其式也三陽三陰轉變主客之修治及合併病先後之治方説精於傷寒奧旨凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解此例於柴胡之諸類也故曰凡按而下脫反字者乎不然則文義不穩當矣蓋柴胡之為證也其不可下固矣雖然以其既象里證乎反為下之也夫既下之之變勿論於不一端矣若於柴胡證不罷者乃復當與柴胡湯耳今也以邪報所劫於下攻之不常與復與柴胡湯之後於其期乎邪氣不易解而解者也是故其解也亦不通例必發瞑眩者也必蒸蒸而振卻發熱汗出而解此為之暝眩之狀也蒸蒸而振省言於蒸蒸發熱振振惡寒之義也蒸蒸熱氣薰蒸貌卻退也必卻解三字俱有轉遷法亦更如雲卻蒸蒸而振解必發熱汗出而解也然矣按此條當與上條移之於小柴胡湯之後耳矣傷寒二三日心中悸而煩者小建中湯主之傷寒並包於前在於太陽者與今位於太陰者言之也蓋建中之於證也病位於太陰者也故於其日數在於七八日八九日為常矣夫既日數之於常則脈證亦現其定候為法矣而今於是證也特不然矣算其日數則在二三日問其證候則為心中悸而煩此豈得以常論之矣哉蓋二三日之在今也病雖已位於太陰而其日數之尚淺乎其病之未篤乎其勢未能縱橫於腹中遂逆侵於心中此所以心中悸而煩也於是乎與建中湯以制其腹中則心中之勢自和矣當汗出而愈也論曰身重心悸者不可發汗當自汗出而愈此之謂也又按此於是證也以殊為太陰之初位未現其定證既如上之所言也雖然即之腹中須認為太陰之狀者蓋有之乎矣而今不標之者厭拘泥於一二之候法也讀人須致思焉太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為末解也與大柴胡下之則愈按此太陽病十餘日之變既在於柴胡之場稽之於下文仍在字則自明矣雖既在於柴胡之場而其候法之疑似於可下也故反二三下之也夫既下之變亦不一端而止矣若在其四五日也有於柴胡證仍在者則縱有它證之殘響當棄卻之而先與小柴胡湯耳矣例曰凡柴胡湯病證而反下之若柴胡證不罷者復與柴胡湯即是也然則其在於斯也勿論於柴胡證愈者或有之矣今論其不愈者而曰嘔不止也蓋嘔之於少陽也抑為要領也今舉其要領而曰不止則自知餘證亦從而加勢於此矣急急迫也心下急此胸脅之邪欲趣於胃腹之勢為之也鬱郁蘊滯貌鬱郁微煩承氣湯亦為之雖然彼則並內實之諸證此則並嘔不止心下急則可知非陽明矣故曰為末解也益以明確於在於少陽也與大柴胡下之則愈是對夫與承氣湯下之者也夫蓋下之之雖一其所為而於立其功績之位地則自不均矣承氣蕩滌於胃腹柴胡轉輸於胸脅為之其分別也豈可不辨乎哉過經二字蓋後人之所傍注也胡下疑脫湯字大柴胡湯方柴胡半斤黃芩三兩芍藥三兩半夏半斤生薑五兩枳實四枚大棗十二枚上七味以水一斗二升煮取六升去滓再煎服一升日三服一方用大黃二兩若不加大黃恐不為大柴胡湯也方中伍大黃二兩者為是若不伍大黃則本條顯曰下之則愈者豈其以何謂之哉不可不考焉七味當作八味煎下脫取三升三字一方以下其義雖不背而恐後人之所補添矣乎傷寒十三日不解胸脅滿而嘔日哺所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之此承前條而論大柴胡湯之極地者也夫既至於此也以其候法之不常乎難遽以辨其部位故曰傷寒也十三日猶有傳經之口氣當作十餘日也十餘日不解承所謂反二三下之後四五日而論有其變之亦出於此者也胸脅滿而嘔者是柴胡之定證也日哺所發潮熱者蓋往來寒熱之變態也若夫日哺所發潮熱之於陽明乎當與腹滿而渴而此則與胸脅滿而嘔當與不大便難硬之比而此則與微下利則可知在於往來寒熱之變而疑似於陽明之熱狀矣夫蓋往來寒熱之疑似於日晡所發潮熱於如此者何哉曰是即往來寒熱而惡寒已止者也何則心胸柴胡之於邪氣也當極重於此則其勢不衝於表而必壓里矣此所以惡寒止而但熱來去也已既往也已而微利者示於微利之出於日晡所發潮熱之前而及於今也此乃足益以推知於日晡所發潮熱之不於陽明本位也此本柴胡證以下至非其治也五句及先宜以下至後以十一字意致柔弱非正文之氣格矣蓋後人移上所謂反二三下之義於此而亦論之者也當削去之耳潮熱者實也此為式之辭也凡潮熱之於本位也以內實為之因也故縱令無不大便難硬之證亦奚可得微利哉然則雖均曰潮熱而以此而抗彼則有實與不實之分也不可不擇以別矣柴胡加芒硝湯方於大柴胡湯方內加芒硝二兩余依大柴胡湯法按柴胡加芒硝湯者即大柴胡湯方中加芒硝二兩者也宋板外臺作小柴胡加芒硝湯者恐非矣傷寒十三日不解過經讝語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之此條承大柴胡加芒硝湯論之者也當效作傷寒十餘日不解過經二字亦十餘日之傍注耳夫蓋與加芒硝湯而不得其治功遂轉屬於陽明也故今發讝語也既至發讝語則亦應發身熱潮熱而今否者以邪氣新位於陽明乎未暇備於身潮之勢也是其自然之理矣以有熱也此乃推之於外而求之於內之辭也以示於讝語之因緣於裡熱也當以湯下之以調胃承氣湯言之也若小便利以下至非其治也五句蓋後人亦牽及於反二三下之之義而為説者也乎豈正文之語氣乎若自下利者脈當微厥此亦為式之辭也句法典上條所謂潮熱者實也同一矣微言脈勢不滿也厥闕通言脈有闕也此對所謂以湯下之之利而以抗正於陰陽虛實之分界也於是乎以湯下之之利若歸於自下利之位則脈當微厥而今也不然其脈反和者此仍為在於內實之位也反和言不微厥也太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽病不解論前起也熱結膀胱論歸趣也抵當湯曰熱在下焦膀胱下焦互其辭者也其人如狂血自下是乃桃核承氣湯之證也下者愈式於方後之辭也蓋表熱之歸於膀胱也必先並血而凝結也故曰結也抵當湯曰在下焦日結曰在亦互其意也夫既凝結之在於膀胱乎其熱自及於通身之血道其血無不處而搖動矣必致侵於心郭而使之遂失其靈明也此所以出於其人如狂血自下之證焉於是與桃核承氣湯而拔其凝結則血歸乎其舊轍心復乎其靈明矣故曰下者愈也此言大便並瘀血而下愈者也與所謂血自下之利於血液者果有別矣豈可不辨乎且也縱見桃核承氣之證而若太陽外證尚不解者未可與桃核承氣湯宜以解外為式也奚漫攻之之為乎耶少腹急結對熱結膀胱標之也蓋熱結膀胱者本也少腹急結者末也本因於內而不得洞視之矣末顯於外而可得而候之矣本未末相得而瘀血之候全備矣故曰乃可攻之也急結者攣急結滯之義也亦復比之於抵當湯之少腹硬滿則各自足辨其方意也凡血熱俱凝滯總為之瘀血也雖然其血其熱互不能無主客之差等矣於是乎主熱而客血者乃為之桃核承氣湯也主血而客熱者乃為之抵當湯也此是二湯雖均在瘀血而果有其別也如此矣豈亦可不辨乎桃核承氣湯方桃仁五十個桂枝二兩大黃四兩芒硝二兩甘草二兩上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利按服藥拘於食之前後者恐非醫聖之舊矣蓋後人之所追加也乎溫服五合當作溫服八合傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八九日以太陽之並於里證者言之也夫雖既下之而里邪尚不解遂拿於表邪而輻湊於胸中其勢相與襲心未暇注走於表裡矣故今雖為胸滿而未備往來寒熱者也與彼漸位於胸中而其勢注走於表裡而發往來寒熱者少異其來蹤也雖既少異其來蹤而不得不同其歸矣此所以尚執治法於柴胡也煩出於邪氣壓心也驚出於心氣不疏達也小便不利以心胸邪實之故精氣失宜暢之所致也讝語以邪氣壓心與心氣不疏達之甚必致使心於暗晦也與彼胃實為讝語者亦大異矣一身盡重不可轉側者是乃精氣失宣暢之甚遂畜成水氣之所致也柴胡加龍骨牡蠣湯方半夏二合大棗六枚柴胡四兩生薑一兩人參一兩半龍骨一兩半鉛丹一兩半桂枝一兩半茯苓一兩大黃二兩牡蠣一兩半上十一味以水八升煮取四升內大黃切如棋子更煮一二沸去滓溫服一升按此方態度不備矣蓋後人偷竊之於他書而充之於此也乎本條顯曰柴胡加龍骨牡蠣湯則方之所隊伍既即方名足辨焉豈徯容於他按乎柴胡乃小柴胡湯也龍骨牡蠣今脫其斤兩雖然徵之於救逆湯則當龍膏四兩牡蠣五兩而如其煎煮及服法則當從小柴胡湯之法耳傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門論説皆背馳本論之意也蓋後世刺法家之所述矣奚足以徵乎太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發讝語十餘日振栗自下利下利成氏別本作汗者此為欲解也故其汗從腰以下不得汗欲小便不利反嘔欲失溲足下惡風大便硬小便當數而反不數及不多大便已頭卓然而痛其人足心必熱穀氣下流故也此條後人就桂枝甘草龍骨牡蠣湯而漫論之機變者也乎豈足以據乎太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陽虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸狀小便利者其人可治此條亦後人就救逆湯而漫論其機變者也乎字句拘泥殊甚也豈其然乎亦不可從矣傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脈浮以初位之在於太陽桂麻之場言之也既而不與桂枝麻黃反以火攻誤之也故曰醫也夫以火迫劫與用藥溫覆於其汗出則一也雖然以藥者專制邪於內而發其汗以火者徒激氣於外而發其汗藥乎尚且雖不得不激氣而其要在於制邪也火乎或間解邪者亦徒歸於激氣沽液也火攻之無益疾醫可得而知矣今也以火迫劫之而汗出乎雖邪亦非不減而逆氣奔騰而纏心郭此所以為驚狂也既逆氣奔騰之如此甚則上下不接內外阻隔精氣失其守此起臥不安之由也必字有意致須屬眼焉亡陽二字蓋後人旁注於驚狂也乎桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩甘草二兩生薑三兩牡蠣五兩龍骨四兩大棗十二枚蜀漆三兩上為末以水一斗三升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升形作傷寒其脈不弦緊而弱弱者必渴被火者必讝語弱者發熱脈浮解之當汗出愈脈以配證蓋後世脈家之所説也豈愜於本論之旨乎玉函經無形作二字醫宗金鑑弱皆作數太陽病以火熏之不得汗其人必躁到經不解必清血名曰火邪後人據救逆湯而論之者也條辨無經字到作倒脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也三條述火邪火逆之因於灸火也其説雖如可論而皆後人之識見耳欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也論曰脈浮數者法當汗出而愈恐後人據於此等之義而論之者也乎燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩此條承救逆湯之傷寒脈浮而論於燒針之機變卒致使表氣躊蹰者也蓋既使燒針汗也雖固不法而於其邪氣則幸而頗解矣雖然以其汗出之不少也表氣殊虛耗氣液不得活流矣於是乎針處盡腫起恰如被寒之狀也寒即斥飲言之也且夫表位之氣液躊蹰既如此則里亦何為得特不躊蹰乎哉可知表裡失其開合彌互躊蹰也於是乎恐內外上下懸隔而或發奔豚也故曰必發奔豚也氣從少腹以下四句後人拘述奔豚狀者也不可從也奔豚解已見茯苓桂枝甘草大棗湯條下焉桂枝加桂湯方於桂枝湯方內加桂枝二兩余依桂枝湯法火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之此亦承傷寒脈浮而論於火逆下之因燒針之變卒致使裡氣躊蹰者也夫雖既以火攻及下劑而邪氣尚不解其狀或似燒針之可治因復施燒針也此於是三治也雖亦固不法而亦幸而邪氣頗解矣雖然其汗下之不穩當乎氣液何為得不失和調哉於是乎使裡氣殊躊蹰而遂遮乎心之機用也此為之煩躁之由也然則是之煩躁不並於陽實陰虛之候法固可知矣奚混之於彼大青龍湯大陷胸湯及乾薑附子茯苓四逆之比之為乎哉不可不明辨焉又按桂枝加桂湯之表氣殊於躊蹰者與此湯之裡氣殊於躊蹰者媲標以縱橫於其變態矣是欲使讀人從事於活於此也桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩牡蠣一兩龍骨二兩上為末以水五升煮取二升半去滓溫服八合日三服太陽傷寒者加溫針必驚也此後人據驚狂而説其由者也太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也二條後人漫論吐之反逆者也皆非正文之意矣亦何從之乎病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也此頗配脈經之意者也陽氣乃陰陽二氣之謂也奚以本論之意説之為乎太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也此條論於調胃承氣湯之於陽明者與大柴胡湯之於少陽者其候法互混雜而殆難分辨也標曰太陽病十餘日者與大柴胡湯之冒首正同其義亦以其初位而言之也過經二字亦旁注耳今也心下溫溫欲吐之不於腹中痛而於胸中痛則如陽明而復似少陽者也胸中痛之不於心煩而嘔而於溫溫欲吐則如少陽而復似陽明者也然則各位二湯之互疑似不可概以期者也溏溏泄也夫大便之溏也歸之調胃承氣湯固反其本面復歸之大柴胡湯亦反其本面也故曰反欲以明於各位二湯之疑似如此者各皆不具其本面之所為也是故復舉腹微滿以顧陽明舉鬱郁微煩以顧少陽二微字相對以示難互歸於一位一湯也先此時以下論一時之權法也自字不可讀恐當不字誤矣夫既各位二湯之不可辨別也如上之所言將無奈之何爾於是乎暫措之證候而即其所從來而制之此豈非不得止之權法乎若乃先今時而不極吐下之治法者其腹脈必應有實候也有焉乃當與調胃承氣湯耳矣論曰不吐不下心煩者可與調胃承氣湯即是也若不爾者不可與此以極吐下者言之也故於其腹脈必應無有實候也無焉乃不可與承氣湯此當與大柴胡湯曉然明乎矣但以下二十二字蓋後人之所追論恐非正義豈足據乎又按此條當移之調胃承氣湯次而為一類耳矣太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之此條以病勢進轉之序而論之也蓋太陽病之於五六日也必知其脈浮而表證仍在是乃發汗之所宜也今也縱令表證仍在而其脈已至微而沉則可知病勢之專於裡矣微者謂脈勢不滿也微而沉此血氣壅滯之所使也與彼沉而微之本於精虛者自有別矣夫既病勢之專於裡也不結胸脅而在下焦故曰不結胸而以明無結胸證也發狂較之於桃核承氣湯之如狂則瘀血多少之分自備矣下焦膀胱皆斥少腹言之唯有廣狹之別而已少腹硬滿亦熱在下焦之標也比之於少腹急結則為稍重矣小便自利明於硬滿之不由於水氣而本於瘀血也自利即不滯之義也下血則愈此述方後之式也而今標之於方前者將欲先處方而期其方隅也所以然者以下三句蓋後人之所旁書矣乎抵當湯方水蛭三十個虻蟲三十個桃仁二十個大黃三兩上四味為末以水五升煮取三升去滓溫服一升不下再服太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之此條例於太陽之變或歸於瘀熱或歸於瘀血者也蓋熱之並液者乃為之瘀熱熱之並血者乃為之瘀血也夫血也者即液之所化而液中生血血中容液雖然血液自不能無其分也填於藏肉之間而波及於肌肉間是為之血之性也填於肌肉間而波及於藏肉間是為之液之性也是故熱之或並血或並液其候法亦不能無異別矣今也脈沉結少腹硬之雖亙於兩歧而媲於身黃與小便不利則瘀熱可知矣故曰為無血也此乃茵陳蒿湯所之也小便自利其人如狂者此滯於脈沉結少腹硬言之也諦審也抵當湯主之五字不穩當矣桃核承氣湯亦尤與於此焉何必於抵當湯耳矣哉後人謾補添之可察知焉傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸抵當丸方水蛭二十個虻蟲二十五個桃仁二十個大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服此條雖意義不背而既備於上條則本論之旨豈敢如此疊重哉且也抵當之於丸猶且可矣既丸而復煎煮之冗亦甚矣未知其可矣太陽病小便利者以飲水多必心下悸小便少者必苦裡急也此亦論於裡急之由於水氣者而對血證者也雖然此等之義既備於抵當湯條及身黃脈沉結之例則亦何贅旒之為哉
