body:
  text: 卷一辨太陽病脈證並治法上第一按陽也者取義於顯著也以象病勢之顯著於外也蓋病勢之顯著於外者乃是以精氣勝於邪氣故也夫精氣之勝於邪氣乎不固一其態不能必無多少之異別也此即所以有三陽之設也太陽病也者以邪氣位於肌肉間而假名之也是故有病而後呼曰太陽者也豈敢為稱之於常於經絡乎哉夫太陽之位於肌肉間也頭項胸腹及四肢皆不能無肌肉間之位地故於其候法亦不必一而止矣觀於其有汗出者有無汗者有身痛者有身不痛者則雖如異其位地而均是在一太陽而已既在太陽而有殊別如此者以其位地之泛然也以是乎分為之三篇也上篇主論桂枝湯而及其比類中篇主論麻黃湯而及其比類是乃明於桂枝麻黃各自太陽之正脈證者也如下篇則論上中二篇之變而旁弘柴胡之變者也所以呼為太陽下篇也脈證相屬言之者是欲定其部位於茲也何則唯以脈而不對證則脈奚辨其部位其要在於對證矣唯以證而不對脈則證奚辨其部位其要在於對脈矣然則脈必俟證而辨其位證必俟脈而辨其位脈證既辨而病位定病位既定而治法自隨焉此即所以脈證相屬言之也豈可忽諸乎辨也者辨識辨別之義也太陽之為病脈浮頭項強痛而惡寒此條為太陽之太綱領也夫太陽之於脈證也劇易輕重雖固夥而無不皆出於此條之變也此乃所以為綱領也蓋以脈浮以下之候名之太陽病者固肇於是書故曰太陽之為病也為字可眼矣浮也者浮揚之謂也凡脈浮者精氣勝於邪氣之所令然也是故不但於太陽如少陽陽明亦皆不得不浮雖然浮之為浮者獨在於太陽而不專於少陽陽明也故標曰脈浮也頭項強痛猶曰或頭痛或項強也蓋太陽之於邪也無固有定處唯是鬱陶於肌肉間者也以是其勢必湊上部所以為或頭痛或項強也今不曰頭痛項強而合之曰頭項強痛者是唯欲示邪勢之異同而不可容輕重之差別也而者斷續之辭也蓋惡寒之於證也有陰陽二途之分而其分別之也必在於顧餘證候也是故並脈浮以下之候則為之太陽之標準也若其為少陽為陽明或為三陰者皆並其證候而辨別之不可不準知矣且夫惡寒之亙於三陽三陰也亦不可無說焉蓋邪氣之在軀殼乎必為敵於精氣也其敵之淺而未深乎精氣必為之屈覆不能必得常之調度矣惡寒本於此而出焉為之陽位惡寒也其敵於精氣之深而不淺乎精氣必為之耗損必失其常之調度矣亦不能無惡寒矣為之陰位惡寒也惡寒之雖一其形狀而有其分別也如此矣豈其可忽視焉哉太陽病發熱汗出惡風脈緩者名為中風此條弘發首一條而論有太陽病之一輕證如此者也蓋邪氣位於肌肉間而專汲汲乎肌分者發是脈證也發熱汗出者精邪擾越於肌分之所為也惡風即惡寒中之一輕證也故身觸於風則覺寒耳是乃以精氣屈撓之最微也脈緩對脈緊共以脈勢言之非以一脈狀言之也緩者言脈勢之平易也緊者言脈勢之駿劇也蓋緩勢之於平易與緊勢之於駿劇可相對以知邪氣之輕重矣此為之緩緊之脈意也是故往往所論之諸凡之脈不可不必顧其勢於茲矣後世不辨此義論緩於脈之情狀論緊亦於脈之情狀遂至失古脈之本旨豈其可不嗟乎哉蓋曰脈緩者即牽引上條所謂脈浮來而言其脈浮而無劇勢也故知或有浮數而緩勢者或有浮大而緩勢者也中風即傷寒中之一輕狀也取義於中風為惡風而名之者也為者假為之謂也太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒此條亦弘發首一條而論有太陽病之重證於如此者也或者亙兩岐之辭也已者既往也必者懸期之辭也蓋邪氣位於肌肉間而專駸駸乎肉邊者發此脈證也夫發熱之亙兩岐者惟是邪勢之異而不可必容輕重之論矣雖然無論於已發熱者之易認於太陽於其未發熱者則或不能無疑若為里屬也故揭舉惡寒以示其尚在於表位也體痛嘔逆因邪勢密而不輸泄並精氣壓滯也是乃以無汗故也陰陽言三陽三陰也緊對緩言其勢之駿劇也蓋以脈緊為傷寒者豈唯三陽已哉三陰亦然矣故曰脈陰陽俱緊者名曰傷寒也夫既緊之為傷寒也貫之三陽三陰則知緩之為中風亦復貫之三陽三陰也後世論陰陽者或以營衛左右或以指之舉按議論紛冗皆鑿矣傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒二三日陽明少陽證不見者為不傳也以上二條皆傳經家之所論而大違本論之旨矣豈何暇論之乎哉太陽病發熱而渴而不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期按此條蓋出後世病名多岐之杜撰遂為古道之荊棘也吳又可輩之所祖述蓋在於斯邪病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也此條應發首揭惡寒而復論其惡寒之標式也病也者包裹陰陽輕重之稱也夫疾病者精氣之賊也是故病雖異於陰陽輕重而於失其常則一也所以曰病也惡寒者出於精氣有隙也而有隙之於實者有隙之於虛者不期以辨之則治亦不可從焉於是乎以熱之有無而候其虛實陰陽也故曰有發熱惡寒者發於陽也以斷有其實隙而惡寒者曰無熱惡寒者發於陰也以斷有其虛隙而惡寒者也陽耆主太陽而旁包少陽陽明陰者主少陰而包太陰厥陰蓋陽位之有熱陰位之無熱是為通篇之標式也發於陽者以下蓋後人之所附録也乎千金翼熱字下皆有而字太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈太陽病欲解時從巳至未上風家表解而不了了者十二日愈以上三條皆無正文之氣格矣蓋傳經家之論矣乎病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也此條雖能模寫本論而熟推之則寒熱既失其位置豈敢愜其式例乎哉太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之此條始則標太陽中風之脈例而論預察陰陽轉變之機兆於斯而終則具列桂枝之證候者也太陽中風應發首第二章言之也陽浮而陰弱以脈之奇正言之也陽者主太陽而通二陽陰者通稱三陰也乃今以正言之則陽脈浮而或緩或緊者有其熱自然而揚發之勢也雖然今不發其熱則邪氣何為得去乎故曰陽浮者熱自發也此蓋欲示其發表之有規也以奇言之則陽脈浮而弱者遂有欲歸陰脈沉弱之機也故有其汗自然而出之勢也雖然今不發其汗則邪氣何為得去乎故曰陰弱者汗自出也此蓋亦欲示其發汗之有規也然則如弱脈亙於浮沉陰陽而言之可察知焉大凡脈之偏於陽與陰者皆有其匹耦而存焉如浮之於沉大之於細洪之於微滑之於澀是也論中言弱脈而無強脈故知弱之亙陰陽浮沉也弱者邪氣壓精氣之脈也與微之出於精虛者自殊矣嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者是述桂枝之軌範也故非言使一病人而必具之諸證者要在於即其一證而知桂枝之軌範也乃今並舉惡寒惡風者欲示是等之義也嗇嗇縮身貌淅淅灌水貌翕翕如翕如之翕言通身肌分之熱勢相齊也鼻鳴以熱氣上熏鼻中畜飲之所為也乾嘔以邪密肌分氣鬱集於心之所為也主也者主一無適之意而謂此證之前後左右亦當有處此湯之境內也桂枝湯方桂枝二兩芍藥二兩甘草二兩生薑二兩大棗十二枚上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物按桂枝湯之於方也本論處方之始也故服之法丁寧精密無所不盡矣是不啻盡之於此而已幾於發汗方皆當取法於此而慎其服法矣故下文往往有如桂枝法將息及禁忌等之語可以照應耳啜熱稀粥一升余以助藥力是大似言稀粥以益桂枝之力雖然若桂枝湯而其力不足則有各半二一越婢一之設豈假稀粥之力為乎以是考之則桂枝稀粥固兩其任而於相與供去邪之用則一也桂枝則發解邪也稀粥則鼓舞精氣也夫桂枝湯之於邪氣也精邪結滯於肌分也故精若不伸則邪不去邪若不去則精不伸於是乎桂枝稀粥兩其任而相與供去邪之用者也麻黃湯葛根湯之與精邪為對應者固有別矣不可混同也漐漐滋潤貌微似有汗者益佳不可令如水流漓病必不除此述發汗之準據也夫蓋汗即津液也固畏脫之雖然非發之則邪氣不解故取微似有汗者為益佳若使之流漓則縱令病差亦奈亡津液何故曰病必不除戒其不可漫之也後服小促役其間一本作後服當促其間為是矣半日許令三服盡者即促其間之意也若病重者謂桂枝湯而其病重者也若其病輕乎當一服而病差或二服而病差耳今也三服而病尚不差則周時觀之若其病證依然者當服藥無度連用二三劑也周時觀之言比觀之於前日也一日一夜服即周時注意耳黏滑油膩也五辛謂大蒜小蒜韭蕓薹胡荽也酪以牛馬乳造之蓋禁口之法非久要禁之唯禁邂逅於服藥而已矣太陽病頭痛發熱汗出惡風者桂枝湯主之此條本於上條而具桂枝湯之一病狀者也標曰太陽病者以頭痛以下之候言之也此於是證也邪氣位於肌肉間而其勢走於上部及肌分之所令也頭痛出於精邪擾動於上部也發熱汗出亦出於精邪擾動於肌分也惡風者精氣屈撓之所出也今也雖不言脈之如何而徵之於發首第二條則其脈當緩自明矣且於其脈式則亦須求之於陽浮陰弱之例乎爾太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之此條直對上章而代頭痛以項背強別其證方者也項背強𠘧𠘧推之葛根湯則當無汗而今否故曰反也汗出惡風尚以桂枝湯言之也蓋葛根之為任能緩項背強也夫邪氣之湊項背乎不能必無淺深之分於是乎有桂枝加葛根湯葛根湯之設也於此湯則肌分汲汲之邪專湊於項背故汗出惡風也於彼湯則肉分駸駸之邪專湊於項背故無汗惡風也可知項背亦自有淺深之異也𠘧居履切𠘧𠘧言項背不柔順如憑几案然也素問𠘧𠘧然目䀮䀮亦是之謂也桂枝加葛根湯方於桂枝湯方內加葛根四兩以水一斗先煮葛根減二升去上沫內諸藥煮取三升去滓溫服一升余依桂枝湯法按本作不須啜粥者非也故今改之太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之此其始也太陽病而勢及於里者也於是以承氣輩下之而其勢既拔矣然則表裡更無所病矣但所存者氣液之不和而已故曰後也後者解後之辭也其者更端之辭也蓋氣也者斥所以生之一氣也而其源起於臍中浩然遍軀殼者也津液者氣之車也故津液不和則氣必失所御矣氣既失所御則其勢上奔必矣此乃所以出上沖也以是欲治其上衝則以先和津液為務也蓋津液之不和今猶因於表裡開合之不順也是故以桂枝湯先導其開合則活氣自運行津液自順流氣液既復其常度則上衝亦自止矣是乃不治上衝而上衝自治之略也且夫桂枝湯而療上衝者殊為一活用也故不曰主而曰可與也與者與謀之義也方用前法言藥方據用前法而已不以發汗法也論曰吐利止而身痛不休者宜桂枝湯與之正同矣皆不用發汗法者也若不上衝者不可與之此尚丁寧上之所言也縱令津液不和而若未及見病證者則非固桂枝湯之所與也當以穀肉果菜之養而復之者也胡其混同之乎哉太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之按三日當作二三日蓋傳寫之誤也夫日數之於一二日及二三日也為之太陽之概法也故今標二三日以含畜於桂枝之場也此既發汗之之不得其折中乎其勢尚或象可吐下可溫針者也於是乎雖或吐下之或溫針之而非固吐下溫針之所宜治則其證犯亂而不得解此為之壞病也是故雖令日數尚在於桂枝之場而桂枝輩不中與也壞病者言證候犯亂而以反對為參伍者也觀其脈證知犯何逆隨證治之是乃言治壞病之式例者也夫蓋雖證候犯亂而以反對為參伍而比觀其脈證則果足辨其犯證之出於何逆治也既已辨之則為棄其犯證而隨其定證則處方之意可以得初而一耳矣脈證之證包定證與犯證言之隨證之證但斥定證言之也桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也此條論桂枝之方意而旁及麻黃證者也是蓋要於使桂枝麻黃各勿混淆也桂枝本為解肌不是唯於桂枝湯泛及桂枝之諸類也故不曰桂枝湯而曰桂枝也本者本根之義也解肌者言解散於肌分之邪也是為之桂枝之方意也若其人以下麻黃湯之准證也脈浮緊對浮緩示其勢不平易也蓋麻黃湯之為證也雖固位於肌肉間而其勢之所競專在於肉邊以是乎雖發熱之如不異於桂枝湯而度量之以媲於汗不出則自知發熱亦加根力於桂枝湯也不可與也者不可與桂枝湯而可與麻黃湯之謂也常平常也言未臨其場而須常哲識彼此之差別使病者勿令誤其生命也又按此條桂枝麻黃位地轉旋之文法備矣故今又讀轉旋之則猶如雲麻黃本為解肉若其人脈浮緩發熱汗出者不可與也爾矣若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也喘家作桂枝湯加厚朴杏子佳凡服桂枝湯吐者其後必吐膿血也以上三條皆無所稽耳蓋後人所漫論矣乎太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之太陽病發汗以桂枝湯言之也遂者兩事之辭漏漏出也今也雖不用發汗法而汗漏出不止者是不唯由表邪之不解已頗由於精氣不整也故及惡風以下之證繼踵蜂起也惡風小便難四支微急皆本於精液虛滯也是故曰其人以更端於桂枝之場也四支微急言四支拘急之微也難以屈伸者以兼痛也若夫於四支拘急尚且無勞屈伸者以無痛也然則拘急而無痛微急而反有痛是豈非似證與痛互失其所置耶不可不精論焉蓋如四逆湯之於四支拘急及通脈四逆加豬膽汁湯之於四肢拘急不解則皆偏於精液枯竭而精邪無分爭之勢者也是乃所以無痛也今也若微急則雖固本於虛滯而其勢尚與表邪不解者為相激者也是乃所以有痛也以是欲眼難以屈伸者一句使讀人知治方之在於此也若夫論之位地則有出太陽而欲入少陰之機者也故為之太陽少陰間之一證也桂枝加附子湯方於桂枝湯方內加附子一枚水煮升合依桂枝湯法不須啜粥太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之此條對其氣上衝之桂枝湯而論之異同者也是於其二者雖均下之而彼則得其肯綮而既無所病矣此則以不得其肯綮表邪未得盡去雖然於其下證則幸愈故亦曰後也夫既表邪尚未盡去之勢卒屈鬱於胸中而使裡氣不振焉是乃所以脈促胸滿也此於是胸滿也雖如少陽與彼已根柢於胸脅而並於脈弦等者旨趣大異矣須明辨矣凡促之為脈言催促而其勢迫於表也與疾脈反對而為之表位之脈式也如葛根黃芩黃連湯之於脈促亦是矣可知胸滿之本於表位餘邪也故今制之也運用和調乎表裡則餘邪自可得解散也是為之桂枝去芍藥湯之任也若微惡寒者言胸滿而微惡寒者也此於其微惡寒也即裡氣不振之漸深終現虛態者也所謂發於陰者是也夫既有胸滿之本於表而又有微惡寒之發於陰故今設表裡兼治之略以與桂枝去芍藥加附子湯者也至矣哉旨也桂枝去芍藥湯方於桂枝湯方內去芍藥水煮升合從桂枝湯法不須啜粥桂枝去芍藥加附子湯方於去芍藥湯方內加附子一枚煎煮服法亦效去芍藥湯法太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯凡標八九日者病位於里之概也而今尚以留連桂枝之變冒曰太陽病也夫既雖尚在於太陽而其候法亦不常體矣故曰如瘧狀以示異之像狀而寒熱有發作也熱多寒少言發熱多惡寒少也其人不嘔清便欲自可二句為式之辭也故更端曰其人也蓋各半湯之於證也雖尚留連於桂枝之變而數其日數則既歷八九日視其證候則致如瘧狀一日二三度發於是乎或恐誤認在於彼少陽部位而發往來寒熱者也故曰不嘔以斷其不預於少陽也蓋嘔者為少陽之要領故及之也既已知不預於少陽則亦或奈何似在於陽明部位而發潮熱者乎耶於是乎復亦曰清便欲自可以斷其不預於陽明內實也清與圊通清便言大便也欲自可言通利將依常也蓋陽明內實之徵必斷之於便狀故亦及之也一日二三度發以應如瘧狀言寒熱發作有時也脈微緩者以下謂服各半湯之後也微緩之微猶如瓜蒂散所謂微浮之微言其脈帶緩也夫既服各半湯而後其脈如此則知欲愈也故曰為欲愈也脈微而惡寒者此以微細微弱言之也陰陽猶內外虛者精氣虛也若乃服各半湯而後脈微而惡寒則是乃其內外精氣已虛者也亦奚行汗吐下法之為乎是故曰不可更發汗更下更吐也蓋其至於此乎有兩岐之別一則有以穀肉果菜漸復者也二則有求治於少陰者也可期以察之耳矣面色以下四句恐後人之所攙入豈為強說之哉又按各半湯之於證也致發作如瘧狀者何哉曰桂枝之於邪縱使之最重而終同之車轍則胡其為發作乎哉當以徵之於桂枝二越婢一湯耳然故致發作如瘧狀者是乃出於桂枝之邪勢沉墜而時襲麻黃之位地之變者也豈同之於終始同轍者之比乎耶譬之猶如以一升水盛之於容二升器乎其水必潛而不滿矣邪氣沉墜而時襲他轍則其勢必潛而不發矣此其自然之勢也可知發作之出於茲焉桂枝麻黃各半湯方折半桂枝湯及麻黃湯而各合之半水煮服法總依桂枝湯太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈太陽病以桂枝湯言之此其始也與服桂枝湯雖既與服桂枝湯而以其用之之於不及乎邪氣但動搖而不得瘥矣是乃所以反煩而不解也夫既雖反煩而如其前證則亦尚依舊而已故處其方也固無他還與桂枝湯如前法發汗中其規則邪何得不瘥乎矣蓋用藥之於過與不及也病於不解則均一也其要在於折中之耳矣故桂枝湯之服後既說之詳悉焉可即以尋究其式例矣卻猶還先刺風池風府六字蓋針法家之所旁書誤混正文耳服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發暑汗出必解宜桂枝二麻黃一湯此承上章太陽病而論有發汗過不及之變亦及於此者也服桂枝湯以固有桂枝證言之也大汗出脈洪大者邪氣雖為浮揚而尚未解之所致也洪如洪水之洪洪大者邪勢滔於表位之所為也此蓋用藥過多使之然矣雖然如其餘證則尚在其舊而已於是乎更與桂枝湯當要發汗中其式矣若形如瘧日再發者此亦承服桂枝湯而論邪氣沉潛而不解其勢遂襲麻黃位地者也此蓋用藥不及使之然矣所以有桂枝二麻黃一湯之略也汗出則解為式之辭也此於是證也與各半湯大同而少異輕重也是故彼則熱多寒少而已在八九日也此則必在於發熱惡寒尚未至熱多寒少不亦必期八九日者也其病勢之輕重自可較而知焉可謂纖悉於邪氣之區別矣或曰若發汗不及則邪氣不必得解者頗得其意矣至若其大過者亦不得解則未能無疑矣請聽其說曰大過猶不及也於其不解則同一矣豈拘過與不及之善否之為乎夫藥不及則邪氣專沉淪而其勢反填精氣矣若藥大過則邪氣專浮揚而其勢反驅精氣矣譬之如錘釘乎錘猶藥乎矣釘則如邪氣乎矣錘有輕重釘有大小釘與錘得其宜則釘陷而其用成矣若乃以輕錘處大釘乎雖勞數錘而釘何為得陷乎哉為之不及之弊也若乃處小釘以重錘乎不唯不陷而已釘或顛侄矣此豈非大過之害哉然則釘與錘尚且不得其大小輕重之分則其用不成矣況藥之於邪氣也不論其權衡不慎其過不及則病不但不解已奇正百端繼踵而蟊湧必矣桂枝二麻黃一湯方三分桂枝湯及麻黃湯而合桂枝湯二分麻黃湯一分水煮服法總依桂枝湯法服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之此條亦承太陽病而且對上之所謂大汗出脈洪大者論其似而非者也此其始也固有桂枝之脈證以是與桂枝湯而使大汗出故如其表證則罷所以曰後也今也雖其表證罷而邪氣遂致轉於陽明而胃中液澤為之驅馳矣所以大煩渴不解也大煩渴言渴之珠太甚也不解示渴之不於一時也脈洪大與上條所言同矣雖然彼則因邪氣唯滔於表位而已故於其洪大必無根力者也此則邪氣既蔓延於表裡故於其洪大必有根力者也此為之其別也不可不明辨焉又按人參以通暢和逐加之方中者也後人以養氣補血充之者恐可謂冤矣乎白虎加人參湯方知母六兩石膏一斤甘草二兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯此條論桂枝部位之極地者也發熱惡寒即桂枝湯之准證也熱多寒少即發熱多而惡寒少也此乃邪氣將駸於肉裡之機也發熱惡寒以綱言之熱多寒少以目言之夫蓋綱之於發熱惡寒乎固為桂枝湯之正鵠也雖然其目之於熱多寒少則知既在於桂枝部位之極地而直接於裡證者也此豈桂枝湯之所能敵耶故今設桂枝二越婢一湯之略而制其猛勢者也脈微弱者以下論服後之式也此於其服後之式也舉奇而略正者也何謂奇曰是湯之不歸陽而轉陰不常而變也故言之奇也何謂正曰此湯之不轉陰而歸陽不變而常也故謂之正也因是觀之則當其已處是湯之時也顧之於彼陽浮陰弱之式例則其脈亦必當有奇正之分矣試繫於奇以浮弱繫於正以浮緊則浮弱之歸於微弱浮緊之歸於浮滑亦可自以鑑焉然則奇正來往之機亦備於茲而無所殘焉此蓋醫聖之微意也乎微弱者徵精氣衰敗之脈也此無陽也者言無太陽證而包二陽也不可發汗全書作不可更汗亦通又按發熱惡寒熱多寒少太混各半湯所言也然於各半則寒熱發作徒至再三耳與此湯之欲駸駸乎直為機變者大異其緩急矣豈其可不鑑識乎耶桂枝二越婢一湯方三分桂枝湯及越婢湯而合桂枝湯二分與越婢湯一分水煮服法總依桂枝湯法也本方以下二十六字蓋後人之所録也乎服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微湧小便不利者桂枝去桂加茯苓白朮湯主之按此條當敘桂枝二越婢一湯之上均承太陽病初服桂枝湯條而論之者也此雖既服桂枝湯而不唯不解已或見裡實之勢者也於是乎或下之如其裡實之勢則已拔矣雖然如其表證尚不解已而變葛根湯證也故曰仍也仍者言因仍於表位也頭項強痛翕翕發熱此乃葛根湯證而尚帶前位桂枝湯之餘響者也無汗對前之有汗而證於在葛根之場也心下滿微痛此以其或下之之變其里澀滯有水氣之所致也故標小便不利而證於不預表熱而據里水也夫既表熱里水現之候法如此則並以治之乎曰不然矣若其表熱則經日因仍不解者也若其里水則今新見其端者也於是乎欲先於未互響應而制於其易制里水於微而後制其表熱也是乃所以有桂枝去桂加苓茯白朮湯之略也桂枝去桂加茯苓白朮湯方於桂枝湯方內去桂枝加茯苓白朮各三兩水煮依桂枝湯法不須啜粥傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之此條論桂枝之變及陰陽兩端者而一結於陽浮陰弱之義者也傷寒脈浮自汗出此本於桂枝湯之脈浮緩自汗出者而且亙於白虎加人參湯之脈浮緊自汗出者與桂枝加附子湯之脈浮弱自汗出者而論之也故曰傷寒以籠罩之三道也夫蓋於小便數心煩微惡寒腳攣急也一則繫於浮以緊而乃為之白虎加人參湯也一則繫於浮以弱而乃為之桂枝加附子湯也今試以歸於浮緊論之則所謂陽浮之邪遂以轉肉裡乎津液為之奔命故使自汗出小便數也心煩微惡寒出於邪勢聳於上與表也腳攣急氣凝滯於下部之所為也此為之白虎加人參湯也又試以歸於浮弱論之則所謂陰弱之邪遂以乘精虛乎津液為之下密故使自汗出小便數也心煩以邪迫於里也微惡寒為裡虛已侵表也腳攣急由於津液凝滯也此為之桂枝加附子湯也是故今雖尚像桂枝湯而非皆既桂枝湯之所宜也故曰反與桂枝湯欲攻其表此誤也以斷既非桂枝湯之所任也若不辨其意趣漫與桂枝湯而發汗之則不啻無益於制邪已反使心氣搖動四表之機活卒爾澀滯是乃所以見厥也咽中干煩躁吐逆皆出於精氣之郁集於心郭也故今先與甘草乾薑湯以鎮之動勢耳此豈為療本證之設乎可知動勢既鎮而後亦復有治二岐之本證以前之方法者也作假作之義也以復其陽四字後人誤解甘草乾薑湯方意者也若厥愈足溫者更作芍藥甘草湯與之此乃承即上兩岐之本證而各既與其本方之後而言之也然則白虎而與白虎加附子而與加附子各如其脈證已瘥矣雖然是唯於其血液運用未復則亦為腳攣急者必當有之矣是為之芍藥甘草湯之任也此於其腳攣急也唯其一證而無據陰陽之候法者也是故曰厥愈以示無據寒候曰足溫以示無據熱候也論文妙境可玩味矣不然則曰厥愈足溫者恐屬疊語矣非耶更字自有承兩岐之意益可以稽焉其腳即伸亦後人說芍藥甘草湯方意者也若胃氣不和讝語者此論承白虎之證而其後之機變有出於斯者也胃氣不和與胃中不和大同而少異其由矣胃中不和自外之辭也胃氣不和自內之辭也故今曰胃氣不和以明於邪氣既位於胃內也讝語言語不倫之謂也是乃胃熱之勢篡奪於心之機用所致也故今與調胃承氣湯為制其胃熱者也蓋調胃之於證也雖固位於陽明而證已備於陽明則熱否熱已備於陽明則證否者也此豈為與彼大小承氣湯之熱與證已備於陽明者敢混同之乎耶若重發汗復加燒針者此承桂枝加附子湯證而復對反與桂枝湯而論之也重發汗言發汗過多也燒針亦攻汗之具也夫既反與桂枝湯尚如彼況重發汗復加燒針則無益於制邪而徒耗損津液而已以是邪氣不遂為陰轉而何哉是乃所以標出四逆湯也或曰今標出四逆湯者此以方而挈證之意也故手足厥逆自備其中也果其說是耶曰否重發汗復加燒針之變雖已轉於陰位而觀之於不論其證候則豈限之四逆湯乎哉蓋四逆之為劑也為之附劑之大綱也其餘數類附子劑皆屬其小目也是故標四逆湯以要使人知從其證之輕重出入而如之比類亦皆可撰而索之也可謂大綱舉而小目從焉豈敢拘泥於四逆之一方之為乎哉又按此篇起論於桂枝湯而歸其變於四逆湯以為篇結者也不是但結此篇而已虛實陰陽循環無端錯綜縱橫至矣盡矣本論一卷之大旨既已著明於茲矣學士其勿忽之矣甘草乾薑湯方甘草四兩乾薑二兩上二味以水三升煮取一升五合去滓分溫再服芍藥甘草湯方芍藥四兩甘草四兩上二味以水三升煮取一升五合去滓分溫再服調胃承氣湯方大黃四兩甘草二兩芒硝半斤上三味以水三升煮取一升去滓內芒硝更上火微煮令沸少少溫服之四逆湯方甘草二兩乾薑一兩半附子一枚上三味以水三升煮取一升二合去滓分溫再服強人可大子一枚乾薑三兩問曰證象陽且按方治之而增劇厥逆咽中干兩脛拘急而讝語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結讝語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈此蓋後人據前條漫議其轉變者也豈得以本論之式例而釋之乎哉
