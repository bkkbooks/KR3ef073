body:
  text: 卷八辨厥陰病脈證並治第八厥陰也者陰之終而亦以胃之下柢為其位也乃三陽三陰之所歸而亦治法之所極也死活之機必劃於此位焉是故以津液漏脫精氣耗虛為其候也四逆湯通脈四逆湯之所論即是也按本篇之證方蓋止於此而已其他所載如烏梅圓白虎湯當歸四逆湯茯苓甘草湯乾薑黃連黃芩人參湯白頭翁湯梔子豉湯吳茱萸湯小柴胡湯者皆非本篇之證方但假本篇以論其機活者也不可不精究矣厥陰之為病消渴氣上撞心心中疼熱飢而不飲食食則吐蛔下之利不止厥陰之為證也篤危之極矣病至斯而無所復之矣死活之機無不必現之於津液耗損精氣衰弱之多寡矣須慎而致思焉消渴出於津液枯竭也五苓散亦曰消渴此雖一其所言而大異其由者也彼則水液為表熱被誘肌肉間而一時使胃中枯竭之所為也此則津液耗損而闕其守無敢制水之機活之所令也消渴之亙於彼此推之內則有其別也如此矣不可不審辨也氣上撞心者出於精氣偏湊於心也夫精氣之在軀殼也克使少活動心亦使精氣順流者也是故心之將謝精之將盡尚且必相親於是乎氣上撞心也撞者如撞鐘之撞言築動之甚也心中疼熱本於心氣衰弱也蓋心氣之衰弱乎其機用不能分配於體中才殘其舍而欲復並衰精而振焉於是乎心中疼熱者疼者痛之深也屬心中而言之者可玩味焉飢以食少言之非言病者之意矣不欲食者由於心精既虛而不能運化於飲食也食則以下二句蓋後人謾述之機變者也不可從矣又按此條主論心精虛脫之候而不及處之治方者何哉曰四逆通脈之有及於茲者固不俟論焉若夫於真武附子之證亦心精虛脫既至於茲則不得不直為之厥陰病豈俟下利厥逆之比而更認之厥陰已乎哉然則此條所論彰明哉亦與真武湯附子湯也是乃所以不處方之意也不可不熟慮矣厥陰中風脈微浮為欲愈不浮為未愈太陰篇所謂與太陰中風條語氣相均矣厥陰病欲解時從醜至卯上説既見於前厥陰病渴欲飲水者少少與之愈此蓋後人誤解厥陰之消渴者也消渴之出於液奪豈有與水愈之理哉可謂妄矣諸四逆厥者不可下之虛家亦然四逆厥者即四肢厥逆而為之厥陰定候也雖熱之變亦有見厥者而及於四肢厥逆者恐無之乎矣而今例不可下者豈敢有詮哉虛家言精脫之人也下攻之不與於此也固矣奚足以論焉哉傷寒先厥後發熱而利者必自止見厥復利此後人論寒之化熱者與熱之歸寒者而牽強之於利止與不止者也厥者以寒候言之乎矣傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之且日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日為九日與厥相應故期之且日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也厥熱相對期之日數厥有餘者歸之於除中熱有餘者歸之於發癰膿其説雖非不詳悉而是後人之所撰也乎傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死脈遲亙於陰陽寒熱尤有之矣豈得概之於陰於寒哉此深泥脈遲為寒以立之論者也亦非正義矣胡其據之乎醫宗金鑑六七日下當有厥而下利四字云云必不是矣蓋除中者言食藥除去於腹中而不化為津液也傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈以上三條亦以厥與熱立論或概其轉變或期其日數以量厥熱之多少輕重或論厥熱相應者之自愈皆是非正論之氣格矣出於後人之撰明矣凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也此條例厥者似則似矣雖然所謂陰陽氣觀之於曰不相順接則彰明哉亦以氣血營衛言之也豈其醫聖之旨然乎哉傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非為蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅圓主之又主久利方此條先論藏厥之不可治者次以蛔厥之可治者也厥寒之既透於裡者是為藏厥也為死證可知矣脈微而厥以下五句即藏厥之候也千金翼代非為蛔厥也五字以死一字亦可參考焉夫蓋蛔厥之於證也必吐蛔雖為煩躁必有間斷者也故曰其人當吐蛔令病者靜而復時煩也此其煩之有間斷也從蛔之動止故曰此為藏寒蛔上入膈故煩須臾復止也得食而嘔以下三句説蛔之所以動止之由者也玉函經無又主久利方五字又按此條證無規矩方無定操意趣亦晚近之所旨皆非醫聖之舊矣夫蛔蟲之生於藏也以寒熱虛實之故其藏不理之所生也然則當隨寒熱虛實之候而施之治方耳藏中既理則蛔何為得稽留哉於是乎知制蟲之劑之不出於古也雖然治療之於道也不可固膠柱矣若於其變之變者則宜先制蛔者或有之乎矣有則雖此條之不古而亦暫存之俟其變之變者亦無大害乎矣且也制蟲之在於變之變乎豈唯止是證方乎若蛔之於熱位者鷓鴣菜輩之所與亦可知矣烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩蜀椒四兩桂枝六兩人參六兩黃蘗六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等傷寒熱少厥微指頭寒默默不飲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血發論於熱少厥微而期其機變者雖似可論而皆無定準恐非正文之體裁矣豈其可據而論哉病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也此條為四逆湯例之也手足厥寒狀乎表氣虛冷也少腹滿按之痛者狀乎裡氣結滯也夫既雖為裡氣結滯而非陽實之比為之者素本於陰虛者也於是乎標其因曰此冷結在膀胱也是乃非言膀胱府有冷結也但以冷結之在膀胱邊言之也言我不結胸一句意義與上下句不比倫疑後人發所窺者誤傳於今乎矣關元二字亦後之所加矣傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也二條亦據厥熱之多少而論病之進退者也豈可容機活耶亦皆與上之厥熱立論者一口氣而已傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也按以上四條後人據四逆湯而述之管見者矣乎凡斥曰死者非決乎不違者不能也少陰篇曰吐利躁煩四逆者死即是也四條之所論有未可知果死否者也但如厥不還與躁不得臥則其死尤然矣雖然其義既備於吐利躁煩四逆者死則亦得不蛇足乎耶傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死此條錯雜旁出文意不貫矣疑後人為四逆湯發之者乎發熱而厥七日下利者為難治期七日而難治者蓋據前後經之口氣抑與本論不相愜矣胡其徵之哉傷寒脈促手足厥逆者可灸之按促脈既論之於桂枝去芍藥湯及葛根黃芩黃連湯詳焉而今媲之於手足厥逆而亦論促脈者自知義與彼異矣此蓋取義於停促之謂乎然則其不通例者也且也此條舉手足厥逆而不以四逆湯唯止之於灸法亦復不通例者也傷寒脈滑而厥者里有熱也白虎湯主之手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之標曰傷寒者以外表無熱而象本位言之也此於是白虎湯以變面目論之者也蓋以其本面言之則如腹滿讝語身熱自汗口燥渴是也今也所論大異其趣旨須明辨焉夫蓋邪氣雖尚在於白虎之場而據精虛之不輕乎邪勢不得不輻湊於其深地矣於是乎臨之外候則不見熱而見厥雖然厥亦非固出其本位者故其脈不於澀而於滑也滑者令知雖病既亙於精虛而尚在於實地之脈也里有熱也是對表無熱而推求之於內之辭也句法與表有熱里有寒同矣須探尋焉手足厥寒脈細欲絶者亦承傷寒而論之也然則外表無熱而象本位亦可察焉夫蓋當歸四逆湯之於證也寒飲滯在於心胃間而閉塞於上下內外之機活者也可見手足厥寒之出於閉塞於外脈細欲絶之出於閉塞於內也故今雖見手足厥寒脈細欲絶而問之精神飲食則頗自若矣與彼四逆湯之精神衰弱飲食微乏者不可同日而語焉是乃所以修治之在此湯也此湯之於位也為之虛實間者也故問病之所存則心胃中間而未互主於胸腹焉問其證狀則外寒候而內否未互主虛實焉此湯之位於虛實間也豈不明確乎非耶若其人內有久寒者是亦備手足厥寒脈細欲絶而言之也久寒者舊寒飲也今於此湯顯曰久寒則亦自知當歸四逆湯之於新寒也夫舊寒之久不瀉乎心胃間也心機或為之被奪舊寒彌乘焉其勢必奔騰可知矣是乃所以以加吳茱萸生薑湯也證曰久寒方加吳茱萸生薑證方照應其義可曉然而察矣以上舊圈別為三條者意趣殊不備矣恐後人撰次之誤耳今連讀之則次序得順而意趣初全矣所以合為一條也當歸四逆湯方當歸三兩桂枝三兩芍藥三兩細辛二兩大棗二十五個甘草二兩通草二兩上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯方於當歸四逆湯方內加吳茱萸二升生薑半斤以水六升清酒六升和煮取五升去滓溫分五服大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之此承太陽陽明之變而論出乎四逆湯者也夫蓋汗之出也為邪氣實被驅役而出為之陽位之汗也陽主陽明而太陽屬焉為精氣虛肌肉不約而出為之陰位之汗也陰主厥陰而少陰與焉故知今使大汗出者乃初萌於陽而歸入於陰者也熱不去者言或太陽或陽明之餘熱尚未去也是蓋其轉機迅速者或及之乎矣拘急四肢疼者津液因虛凝滯也夫既津液凝滯之至於此乎豈其得止之哉又不可不必漏脫也是即所以續舉下利厥逆也夫蓋內拘急四肢疼者四逆湯之初也下利厥逆而惡寒者四逆湯之終也初以顧陽位終以接通脈四逆湯也若茲而不惡寒則直為之通脈四逆湯也故舉惡寒於章末以明徵於尚在四逆湯之極地也深乎哉旨也大汗若大下利而厥冷者四逆湯主之按此條意義不異於上條疑後之追論乎病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散瓜蒂散之於部位也為之少陽變位也而今以手足厥冷之疑似於本位篇之於此者也故曰病人以殊之也夫蓋手足厥冷之象本位也其脈不於沉微沉細而於時或緊則本於胸中結實者當有之矣是故期之方隅曰邪結在胸中也既期之方隅而熟求之其它證則如心中滿而煩飢不能食者亦當有之矣於是再期其方隅曰病在胸中也此條主論手足厥冷脈乍緊者而客論心中滿而煩飢不能食者也是故不必俟主客之證全備者即以手足厥冷脈乍緊者直為之瓜蒂散者不能固無之矣然故斷之於前曰邪結在胸中也然則當須吐之宜瓜蒂散八字亦必所直系於茲者自可察知焉乃今重襲邪結在胸中病在胸中二句者將欲示此等之義也惟是屬文之活處為然矣傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也此條以虛實間之象乎本位曰傷寒也蓋茯苓甘草湯之位乎虛實間也既論之於太陽中篇而以摹寫之於五苓散也如彼矣今亦論其匹偶而以摹寫之於真武湯也如此矣彼此可相對以全虛實間之意爾矣夫然故今為厥而心下悸者皆本於心胃間有水熱之變也蓋水熱之凝心胃間乎心胃之氣必為之激焉所以出心下悸也且夫水熱之益凝而不瀉乎遂致使心胃之氣阻隔則上下內外之機不得不亦從而失其序也是所以出厥也然則當云心下悸而厥而今曰厥而心下悸者欲專摹寫其狀於真武湯也是故雖為厥而於其脈腹則固無虛候亦可知焉矣先治以下五字及卻治以下十四字恐後人之所旁書謬傳於今者矣乎傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之麻黃升麻湯方麻黃二兩半升麻一兩一分當歸一兩一分知母黃芩萎蕤各十八銖石膏白朮乾薑芍藥天門冬桂枝茯苓甘草各六銖上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈按是證大率存於四逆湯之域者也而今曰為難治者未可知善否者也且也麻黃升麻湯之於方雖固不得式例而概陽位之方也證方齟齬之甚亦已如此矣豈其謂之正論乎哉傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也此條論腹痛之在於虛地者而對其在於實地者也故曰傷寒四五日以顧陽位也若轉氣下趣少腹者言通氣唯促少腹也與夫腹中轉失氣之燥屎轉旋於腹中者自異矣故曰此欲自利也以別夫不大便難硬之比者也然則此條雖非不與本篇之旨而序之於陽明篇大承氣湯之次而以對實之可攻者而明論虛之不可攻者則亦更有埤益已爾傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之傷寒以虛實間之象於本位言之也本自寒下非謂下利之本於虛寒者唯以其狀之在於洞泄呼曰寒下也此知是寒下之唯以洞泄言之者推之於白頭翁湯所謂熱利下重則當足探尋其義矣夫蓋下利之出於實位乎不可利而下利故以後重為之狀也下利之出於虛位乎可利而自利故以洞泄為之狀也雖然至量其虛實則必當並他證而後決之矣豈為但以下利之狀態已期之虛實乎哉是故今曰寒下者無素有虛實之定候者也是乃所以取其部位於虛實間也抑虛實間之為部位也其淺者自接實地其深者自接虛地今也舉其接虛地者於此而曰寒下處以乾薑黃連黃芩人參湯以對彼接實地者而曰熱利處以白頭翁湯者也然則寒下熱利雖異其所呼而共於在虛實間則一也宜精論諸按此條述寒下之三級階而弘其所之者也是故本自寒下而未及下文之變者乃此湯之的證也而醫復吐下之更逆吐下者亦此湯之所治也若食入口即吐者是雖大象本篇所謂食不下自利益甚而尚在寒下之極致而為之者也故亦復此湯之所制也又按寒格二字雖如可論而恐後之注文耳若食入口即吐下疑脫者字乎乾薑黃連黃芩人參湯方乾薑三兩黃連三兩黃芩三兩人參三兩上四味以水六升煮取二升水滓分溫再服下利有微熱而渴脈弱者令自愈下利脈數有微熱汗出令自愈設復緊為未解二條皆論下利之化熱者也乃是極陰轉陽之口氣耳豈足據焉哉下利手足厥冷無脈者灸之不溫若脈不還反微喘者死按下利手足厥冷無脈者即通脈四逆湯之證也而今但期之於灸法者亦一種之識見耳曷其牽強之於本論之為哉且也脈之出與不出死生之機既曉然於茲矣豈待反微喘者斷其死乎亦已後矣少陰負趺陽者為順也少陰趺陽經各異其纏縈故脈亦就而暫為異也雖然問其本源則皆一脈一動而無別起於某某之經脈矣唯有纏縈之異耳且也論徵順逆於少陰趺陽而不論氣口之如何者亦似精而粗矣不可不思諸下利寸脈反浮數尺中自澀者必清膿血蓋後人論下利之變為清膿血之脈例者耳下利清穀不可攻表汗出必脹滿此蓋論陰陽先後之式例者也今篇之此者尤無照應更對之於太陽中篇所謂傷寒醫下之續得下利清穀不止身疼痛者急當救里之條則意義得互全備乎耶當移之於彼條之次爾下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死因脈而産證者蓋叔和之家言矣乎下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也此蓋陰中有陽之説固非本論之辭氣亦後人之杜撰耳下利脈數而渴者令自愈設不差必清膿血以有熱也後人亦論下利之變為清膿血者也與所謂下利寸脈反浮數尺中自澀者一口氣耳下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死按下利後現脈絶手足厥冷者必有死生之別須明辨焉蓋以為卒襲下利故使表裡之氣相共躊蹰者一時現脈絶手足厥冷者必有之矣既如此者晬時脈還手足溫必矣故曰生也若夫以為下利精氣虛奪表裡之機活絶者亦當現脈絶手足厥冷也既已如此者縱歷晬時不脈但不還而已手足亦何得溫乎哉故曰死也傷寒下利日十餘行脈反實者死按下利日十餘行脈反實則是脈證相背者也故為之凶徵矣所以曰死也雖然下利日十餘行於陽位亦不得無之矣若取之於陽位則其脈實者尤為吉徵矣因之觀之則如此條之可論而亦非正文之氣格可得而知焉下利清穀裡寒外熱汗出而厥者通脈四逆湯主之此條當聯之小承氣湯標之而對論於乾薑黃連黃芩人參湯之曰寒下者也而今序之於此者謬撰次也夫蓋上條既曰寒下以處乾薑黃連黃芩人參湯則嫌於彼湯之弘療寒下也是故今舉寒下本面之者於此以及是湯者也於是乎知如乾薑黃連黃芩人參湯之於寒下則但以下利溏泄之位於虛實間言之如通脈四逆湯之於下利清穀則以弘位於虛寒之地言之也下利清穀裡寒外熱解已具於前汗出而厥者津液耗奪活氣衰敗之候也按通脈四逆湯之於四逆湯也一其品味而特異其量數耳故於其證狀無更有大異矣才就病勢之緩急而左右之者也以是乎於四逆湯則或標厥則不標脈欲絶或標脈欲絶則不標厥是乃欲示氣與液之虛耗尚有互未普也如通脈四逆湯特不然矣必聯舉厥及脈欲絶是乃欲示氣與液之虛耗既已相普也此之為本論之式例也而今此條不論及脈欲絶者何哉曰是乃對後條標小承氣湯曰有燥屎也以互示其機活者也何則此期其方於後而舉通脈四逆湯以鑑前之在於四逆湯者也彼期其方於前而舉小承氣湯以鑑後之在於大承氣湯者也以是即各位前後之間而錯綜之藥方者庶幾乎使人得其妙用也乎熱利下重者白頭翁湯主之此條隸屬乾薑黃芩黃連人參湯而發之也而今標之於此者蓋撰次之誤也熱利下重對本自寒下以均在於虛實間而言之也是故雖曰熱利下重而非固本於實熱之謂也唯斥其狀之在下重而言之也下重即後重也若夫並之以二三之實候則既已不與此湯固矣夫蓋此湯之於熱利乾薑黃芩黃連人參湯之於寒下皆以下利之一狀候而建之論者也故此於是寒熱也猶如結胸之稱熱實寒實發黃之稱瘀熱寒濕之比也若夫於寒下之並虛候者與熱利之並實候者則通脈四逆湯及小承氣湯之所論是也白頭翁湯方白頭翁二兩黃連三兩黃蘗三兩秦皮三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升按白頭翁二兩宋板作三兩為是矣下利復脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯下利腹脹滿於陽位亦有之而決之於四逆湯者不能無疑矣比之於太陽篇所謂傷寒醫下之續得下利清穀不止身疼痛者則辭氣太劣矣恐後人據彼而論之者矣乎下利欲飲水者以有熱故也白頭翁湯主之此蓋後人誤解白頭翁湯之熱利而及之者也夫下利之欲飲水者即是熱利之本面目耳豈白頭翁湯之所與乎哉下利讝語者有燥屎也宜小承氣湯此條當聯之通脈四逆湯而對論於白頭翁湯之曰熱利下重者也而今序之於此者亦撰次之誤也夫蓋上條既曰熱利下重者白頭翁湯主之則嫌彼湯之弘療熱利也故今舉熱利本面之者於此以及此湯者也於是益知如白頭翁湯之於熱利則以但下利後重之位於虛實間言之也如此湯之於下利讝語者則弘位於實熱之地者也夫蓋下利讝語者較之於讝語之於不大便或於難硬者則有本末正變之別也本乎現其正證末乎現其變證是其式也今也既在其末而不在其本故不見其正證而必見其變證如此矣其既於此也或有難遽斷其虛實者也是故式之曰有燥屎也然是唯期其方隅已爾故不但斷於陽明而已弘通於熱位言之也以是雖顯曰有燥屎而不處以大承氣湯而曰宜小承氣湯是即期方於前而以鑑於後者也豈但是而已哉破裂其所前後則亦當足指數於諸凡之熱證矣可見於證方之不切當反生余意之如此活矣下利後更煩按之心下濡者為虛煩也宜梔子豉湯此條承上諸凡之下利而論之也蓋諸凡之於下利也以各施之治方故下利已止者也故曰後也雖然鬱熱尚未解乘裡氣運用之未復遂輻湊心邊且纏且壓是乃煩之所出也心下濡以別心下硬之實煩言心下濡弱而氣缺其護也所以呼曰虛煩也此雖既曰虛煩而非敢本精虛者惟是心胸之鬱熱帥活氣而使心下濡弱者也是故與梔子豉湯以制鬱熱則活氣復自振必矣此即所以此湯之療虛煩也嘔家有癰膿者不可治嘔膿儘自愈凡處修治也證有主客正變之略治有標本先後之序不可概以限矣此條之所論如拘束然矣豈足以式例論之哉蓋後之撰入耳矣嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之此其證方殊不從矣且也是證而曰難治者亦不穩矣若其言之是乎於厥陰本證亦謂之何乎可知非正論之辭氣成後人之撰矣乾嘔吐涎沫頭痛者吳茱萸湯主之此條及下條當隸屬梔子豉湯條而論均承下利後而差之機變者也夫雖既下利之異諸類乎以各處之治方而下利全差矣雖然以既為下利故活氣失宣暢而鬱集於心胃間而遂致使上下阻隔也夫既如此則鬱氣必當釀成痰飲而其勢必犯上部也此乃乾嘔吐涎沫頭痛之因也故今以是湯瀉之鬱氣則其本復而末自從矣治法之活豈其可不服膺乎哉嘔而發熱者小柴胡湯主之此條亦承下利後如上之所言也然則雖下利既止而邪氣尚未解復備熱候者也故出若嘔而發熱也論曰嘔而發熱者柴胡湯證具即是也當就於彼條而求其義爾矣傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱後與之水以發其汗因得噦所以然者胃中寒冷故也傷寒噦而腹滿視其前後知何部不利利之則愈二條皆無意義之可據以推矣蓋後人之論説耳辨霍亂病脈證並治按霍亂之為篇也蓋後世不辨傷寒之意義之徒謾以為遣霍亂遂剽竊專吐利者於厥陰篇中而強為之篇而以慣病名多端之俗習者也與以痙濕暍及陰陽易差後勞復為篇者正同其義皆非醫聖之舊也當削之篇目而一連於厥陰篇耳矣問曰病有霍亂者何答曰嘔吐而利名曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也按二條背後人強説霍亂者也嘔吐而利或發熱頭痛身疼惡寒皆是傷寒之候法也而今域歸之霍亂者不知何之所推矣豈其可審辨乎哉傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必硬十三日愈所以然者經盡故也下利後當便硬硬則能食者愈今反不能食到後經中頗能食後過一經能食過之一日當愈不愈者不屬陽明也二條皆轉經之辭氣拘縛殊甚矣豈容論可否哉惡寒脈微而復利利止亡血也四逆加人參湯主之此條亦承下利後論之也當列小柴胡湯之次也是於其始也雖下利異其諸類而今差止矣雖然其虛尚不復遂致以虛益虛也所以見惡寒脈微也夫既惡寒脈微之本乎精氣虛損至如此則其里不可必不急迫也急迫之已甚其勢下陷亦其必然也此所以為復利也復字對前位有利也利止亡血也五字蓋後人之旁注耳且夫此湯之於白通湯雖大同其趣而有就精虛與下利之分而聊以標本之別者也於白通湯則本利而標虛故以止利需要也於此湯則本虛而標利故以療裡急為要也是之為二湯之分也可知就精虛與下利之分而聊以標本之別也又按此湯之於四逆湯如無區別然矣雖然已異人參之去加則亦不可不分別也蓋於四逆湯則以其虛至通身相等乎虛候亦必衆多於內外也故於其轉機則反自不急矣於此湯則以其虛至殊甚於里乎虛候必純一於裡也故於其轉機則反自不緩矣於是乎知人參療裡急之選品也此所以去加人參也四逆加人參湯方於四逆湯方內加人參一兩余依四逆湯法霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之按揭出霍亂者固非舊文矣後人為慣俗習之徒剽竊於論中以吐利為冒首者來而歸之於霍亂之吐利遂致代吐利以霍亂者也是故今除去霍亂二字而以吐利二字則庶乎見其舊面乎夫蓋吐利頭痛發熱身疼痛之於證也以寒熱虛實之二途論之者也以是乎以熱之實論之則為本乎肌肉間也故曰熱多欲飲水者五苓散主之也亦以寒之虛論之則為本乎胃上也故曰寒多不用水者理中丸主之也熱多對寒少寒少對熱多以含畜虛實陰陽也故今雖曰寒多而觀乎不標惡寒及厥寒則知寒之以虛寒言之也既知寒之以虛寒言之則亦足以知曰熱多者不唯發熱多而已以實熱言之也以是乎以熱多寒多之二岐而溯回乎上之所論則當以足辨之差別矣若夫以熱多之在於五苓散而論之則水熱在肌肉間之動勢出若頭痛發熱身疼痛者也且也其水熱之不謝乎肌肉間遂致壅塞乎里之運用也此為之吐利之因也於是乎知頭痛發熱身疼痛之在主位而吐利之在客位也若夫以寒多之在於理中丸而論之則胃上寒邪聳上下出若吐利者也且也其吐利之振動勢乎其表亦不得必不且激且鈍矣此為之頭痛發熱身疼痛之因也於是乎亦知吐利之在主位而頭痛發熱身疼痛之在客位也然則是之四個之證自有轉換主客之義而存學士不可不必致思焉矣理中丸方人參甘草白朮乾薑各三兩上四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日二服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服加減法臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被加減法出於後人之為固矣應削去焉服湯以下四句當屬之溫服一升日三服下而以供理中湯方後耳按理中之於湯也與丸無有大異矣然觀之於曰腹中未熱益至三四丸然不及湯則服三四丸尚不知者即湯之所宜耶故今其湯法如此矣吐利止而身痛不休者當消息和解其外宜桂枝湯小和之此蓋承上之二岐而發之者也當去圈而連讀之耳夫既五苓理中之奏功乎不唯吐利止而已於其餘證亦應從而愈故曰吐利止者以包餘證愈言之也是故今雖無既有寒熱而開合不調氣液不復此所以為身痛也然則雖異身痛之因如此而以一連及於今來曰身痛不止也於是乎以桂枝湯導其開合則氣液必宣布身痛當自愈矣蓋亦桂枝湯之一活法也論曰太陽病下之後其氣上衝者可與桂枝湯義正與之同矣按當消息和解其外及小和之皆後人之旁注耳吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之蓋四逆湯之為證也雖固在厥陰而不能無輕重緩急之分矣於是乎標其輕而不急者於此以對後條所論之重而不緩者也夫既此條之輕而不急乎或誤其診候於他位者有之乎故今媲次此條於五苓理中之後以示其異別以縱橫其機變者也吐利汗出雖固本乎虛耗而以其輕而不急乎未備虛脫之候法者尤有之矣須辨別之於五苓理中之所論矣發熱惡寒此以其本面論之則外熱惡寒也雖然亦其輕而不急乎以摸寫於發熱惡寒作文如此矣而今歸之外熱惡寒者須據下之所論而得認之也四肢拘急以示氣液之凝滯也手足厥冷以示氣液既衰弱也然則吐利汗出發熱惡寒之雖如不似於厥陰而徵之於此則其詳可得而探尋矣是乃所以決其治於四逆湯也既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之此條前以承上條而標其重而不緩者後以接下條而論四逆湯之於極地者也蓋今其為吐利也連及於前位來者也故曰既曰且也然則吐利之不一且終至使津液失機約也於是乎為小便復利而大汗出者也下利清穀內寒外熱脈微欲絶者解已具於前內寒與裡寒無異矣聊有廣狹之差已矣吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之此條承上二條之變而結之於此也夫蓋通脈四逆加豬膽汁湯之於方也為之治法之極也以是乎不唯結於二條之變而已亦結於三陰之變者也而亦觀之於熱之歸於寒陽之轉於陰則不唯結於三陰之變而已亦復結三陽之變者也此乃所以舉此湯干茲以結是篇也吐已下斷者以裡虛之益深致精液乏少無給吐下之液故也方中加豬膽汁者可以徵矣夫既裡虛雖殊甚乎而今反吐已下斷則難更認得於其裡虛之由者也於是乎敘裡虛之外候與脈候曰汗出而厥四肢拘急不解脈微欲絶也是之脈與證以推之裡則裡虛豈莫酌量乎耶不解字顧已斷字作文有意致不可忽諸又按脈微欲絶於四逆湯亦言之雖然此湯之於四逆湯也裡虛果有級階何為得脈特無差等乎可知雖一於脈微欲絶之辭而於其形勢亦自有差等矣吐利發汗脈平小煩者以新虛不勝穀氣故也按利當作下吐下發汗是以施其治法言之也夫既其治法之折中乎病何得不愈乎哉即所以使脈平常也然則今雖小煩而自知非病之所令而以胃氣未復水穀易滯故也其要但在於節飲食而漸調養胃氣也豈其藥之所與也哉又按此條雖特以吐下發汗標之而觀於舉之於茲以為此篇之結尾則豈唯吐下發汗後之於此者已哉於施諸凡之治法之後者亦復不得不與此條之所論自可鑑識耳矣辨陰陽易差後勞復病證並治按以陰陽易差後勞復起篇者亦猶與以霍亂起篇者正同矣蓋皆出後人之撰者也夫疾病之在軀殼乎雖不一其所受而無不畢於血液神氣之失常也脈證據於茲死生繫於茲是故血液神氣之失常者疾病之原也失常有大小異同雖有大小異同而均於血液神氣之執虛則一也而執虛之多少及死生之機必於脈證乎見之矣脈證之區區百出亦不能出於三陽三陰及虛實間之外也是故以一傷寒而帥於諸凡疾病則莫更所遺漏爾矣豈敢為設多端之病名乎哉矣傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之證候如此者以其式例則當處真武湯輩耳而今以燒裩散者未知其可否矣蓋是後人補入之於他書者耶大病差後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子大五六枚以差後勞碌為病者其脈證固不可一矣修治亦何為期之於一方哉枳實梔子湯之於方雖如可供施用而證不以其準據則亦無如之何而已若有宿食者加大黃是唯適一隅之意而未知宿食之涉於陰陽者也蓋皆後人之所追撰耳枳實梔子湯方枳實三枚梔子十四枚豉一升上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之傷寒亙於三陽三陰言之也夫蓋三陽三陰之於差已後也各自隨機而至於此發更發熱者也雖然顧之表裡不見更所病矣且也徵之脈浮者以下四句則其脈不浮不沉亦可以推知焉然則是之發熱不可以歸於表亦不可以歸於里故歸之於表裡間以小柴胡湯主治之也脈浮者是乃言更發熱而脈浮者也故取之於太陽以發汗解之也脈沉實者是乃言更發熱而脈沉實者也故取之於陽明以下之解之也醫宗金鑑以脈浮者以下四句屬之枳實梔子湯膚淺殊甚矣豈足論乎大病差後從腰以下有水氣者牡蠣澤瀉散主之按從腰以下有水氣者當固有虛實陰陽之分須以其脈證辨之而後處置之方劑已爾豈得但拘水之所存而決之治法乎哉此條不論脈證之如何而唯曰從腰以下有水氣者處以牡蠣澤瀉散者非本論之式例矣大似千金方外臺祕要等之所旨也胡其從之乎哉牡蠣澤瀉散方牡蠣澤瀉栝蔞根蜀漆葶藶商陸根海藻已上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三服大病差後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸大病差後言陰證之差後而亦通陽證之差後也夫大病之於差後也精氣津液之未復乎運用流注之未健乎遂致胃口畜寒飲也既而寒飲之不謝益令精氣不瀉益令水飲不化可知喜唾之於水飲不化焉久不了了之於精氣不瀉焉喜讀如喜嘔之喜也不了了言不聰慧也宋板胃上作胸上者非矣傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒解後言陽證之解後而亦通陰證之解後也虛羸者言精虛羸瘦也少氣者言氣息細少也氣逆欲吐者精氣奔逆之所令也夫蓋於竹葉石膏湯也以餘熱與精虛而為之證者也是故論其部位則為虛實間也以是乎其餘熱之已不甚乎未能釀成痰飲矣其精虛之尚不多乎亦未能為痰飲矣惟是餘熱待精虛而益加之勢精虛乘餘熱而益鈍其機互相據以釀成痰飲也夫痰飲之黏於要路乎氣息必為之被壓精氣亦必輻湊於茲所以為少氣氣逆也既知少氣氣逆之本於痰飲痰飲之因餘熱與精虛則證方之在於虛實間豈不明確乎不可不稽矣竹葉石膏湯方竹葉二把石膏一斤半夏半升人參三兩甘草二兩粳米半斤麥門冬一升上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服竹葉二把條辨作三兩石膏一斤千金作一升傷寒之於撰也初起之以桂枝湯麻黃湯中分之以承氣湯附子湯終結之以四逆湯通脈四逆湯以正證督其法以變證弘其活陰陽虛實輕重緩急縱橫錯綜其機百出無有所遺漏矣式例可求焉修治可托焉且也今補添若小柴胡湯若理中丸若竹葉石膏湯於終結之後而曰傷寒差已後曰大病差後曰傷寒解後以大結於初中終之變之變者也是之正變標本輕重終始如循環之無端然矣嗟嘆其孰能窮之哉嗟嘆其孰能窮之哉病人脈已解而日暮微煩以病新差人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈此蓋後人因吐下發汗脈平條釋其意義者也奚其齒之正論乎耶跋家君之少也學傷寒論於中西深齋翁蓋十有餘年矣既而熟考其説覺於本論頗有徑庭於是勵志覃思精練研究之十年如一日矣遂至以窺其淵奧矣爾來講授之後更自就文而指示之使有邦從録焉雖每不過二三條其稿之所積周編悉已具乃校而第之總八卷名曰傷寒脈證式則本論脈證之式例較然甚明四方從遊之徒皆莫不競求轉寫也唯恐致亥豕魯魚之誤今因與同志謀刻藏諸家乃爾男有邦謹書
