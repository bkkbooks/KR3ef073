body:
  text: 卷四辨陽明病脈證並治法第四陽明病也者陽證之極而乃以邪氣位於胃腹及肉中言之也是故為其證也如腹滿讝語煩渴自汗熱之於身潮及大便之於難硬不大便是也須即白虎湯三承氣湯而求之情狀已矣其他篇中所論之證方皆非本位者也如梔子豉湯豬苓湯小柴胡湯蜜煎導者唯以其證狀之類於本位而標之者也如茵陳蒿湯梔子蘗皮湯麻黃連軺赤小豆湯則皆出於本位之變者也如吳茱萸湯唯假本位而標之者也夫蓋陽明之於位也前顧於太陽少陽後對於太陰少陰厥陰也然則當篇之於少陽之後而今篇之於此者何哉曰太陽之於轉機也不留連於少陽表裡間而直歸於此位者亦尤有之矣故今以篇列明其義者也若夫太陽之歸於少陽者不啻使篇之名義知之而已既見之於太陽中篇標小柴胡湯而曰傷寒中風五六日則桂枝麻黃之變直歸於少陽者可亦即以求矣然則今雖逆其篇列而其轉變之順者自偶其中矣可見手段之活矣問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中躁煩實大便難是也按太陽陽明少陽陽明歸之於合併病則可矣而今歸之於陽明一位而論之者殊背馳乎式例矣且也答問以為體已是後人之手痕明矣乎陽明之為病胃家實也此條肇論陽明之候法者也故曰陽明之為病也夫陽明之於證也輕重劇易雖固夥而推究其本源則無不盡於胃實也故今略其脈證而曰胃家實也是挈其因而籠罩其脈證之謂也實也者邪實也解見於藥品體用矣且也今措陽明之諸證而約之於胃家實之一言者其義可論者亦復有之矣蓋醫之療疾病也欲必速治之者也是故動則易失其治於過當也為之疾醫之弊也夫然故縱令其病位尚在於太陽而見於其病勢之劇者則誤投乎陽明之治者亦或有之乎是故先建極於胃家實而不眩之外證候並察其因來則表裡淺深之分劃然而明矣豈眩惑乎外證候之劇易之為乎哉此乃所以措陽明之諸證而約之於胃家實之一言也又按系胃以家者為重胃之辭也夫人之有身體臟腑而各異其活用猶如家有君臣婢奴各異其任用然矣雖然繹其活源則盡出於胃一腑則亦猶如以胃為一家然矣此豈不重胃之辭也乎矣問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難著此名陽明也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也以上四條語意相承恐成一人之撰者也乎而如其識見則淺劣尤甚矣豈可據以論焉哉本太陽病初得病時發其汗汗先出不徹因轉屬陽明也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也以上二條論太陽之轉屬於陽明者也字句雖頗像正文而意趣未全蓋後人之所偽撰矣乎傷寒三日陽明脈大此當有脫柬今所存之語意應適傳經之意者耳然則其散失亦何足惜焉哉傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也此條後人論發黃之由者而其意在於以麻黃連軺赤小豆湯歸之於太陰以茵陳蒿湯歸之於陽明者耳未知發黃之不與太陰陽明而在於虛實間與麻黃連軺赤小豆湯及茵陳蒿湯之亦不在於太陰陽明而在於虛實間者也豈其從之乎哉傷寒轉系陽明者其人濈然微汗出也此亦後人對大承氣湯所謂手足濈然汗出者而說之者也雖其義如通而亦不全論者矣乎陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也此條論陽明輕證者也故曰陽明中風也蓋陽明之雖位於胃腹而其初位之於輕證也未必備陽明之模範或類似於少陽又或類似於太陽者尤有之矣是乃所以舉於口苦咽乾及發熱惡寒也論曰少陽之為病口苦咽乾目眩也此以其在於少陽本位而言之也而今亦標曰口苦咽乾者雖一於其所言而冒陽明中風而言之則知是乃出於口舌乾燥之初地而非素髮於少陽之地位者也且夫發熱惡寒之為證以其常論之則為太陽之准證也雖然亦冒陽明中風而舉之則知是乃出於身熱微惡寒之初地而非素髮於太陽之地位者也是故舉腹滿微喘以標其本位而更挾掖於口苦咽乾發熱惡寒之二句以欲率之於陽明之位地也此為作文活意之妙處也不可不稽矣脈浮而緊言浮之有劇勢也蓋脈之於浮緊也三陽之位地皆與者也而今舉之於此者示脈亦未備陽明之模範而以答於舉口苦咽乾及發熱惡寒之意也若下之則腹滿小便難也此言不可與承氣湯也夫既陽明病而戒與承氣湯則知治之方在於白虎湯不俟論矣可謂略文法備得妙矣陽明病若能食名中風不能食名中寒按中寒當作傷寒蓋陽明之於中風傷寒也辨之於脈證者固矣雖然於不具其正鵠者則不可以脈證而辨之者亦復有焉於是乎以能食與不能食而推求之於內則胃中已實與未實之分可判然察焉論曰陽明病讝語發潮熱脈滑而疾者小承氣湯主之此即雖與大承氣湯均其候法而以能食取之於小承氣湯者也又曰讝語有潮熱反不能食者胃中必有燥屎五六枚也此亦雖與小承氣湯均其候法而以不能食取之於大承氣湯者也又按此條當序陽明病胃家實也之次耳陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈以上二條後人據於能食與不能食而論之歸趣者也語意都無活色何其從焉哉陽明病欲解時從申至戌上與太陽篇所謂從巳至未上同轍者爾陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸難下之腹滿如故所以然者脈遲故也二條亦後人據中寒論其機變者也豈足論乎哉陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也久虛謂精虛經日也蓋精虛之於經日乎當為轉機於陰位必矣豈其尚有稽留於陽明之理焉乎哉可知此條出於後人之撰也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛二條皆亦據於中寒中風而為之說者也語氣不肖正文遠矣陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出小便不利者必發黃二條亦後人據於茵陳蒿湯及麻黃連軺赤小豆湯論之者也陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出此條議論陽明之外候者而未知盜汗之不在於陽明而在於少陽者也後人之手痕可察焉陽明病口燥但欲漱水不欲咽者此必衄按是熱專於上部而胃中不然之候也與冒首陽明病意義相背矣奚可取以論焉乎哉陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也按醫更重發汗病已差呼嘆是何言也陽明之邪奚以發汗而得差乎本論之旨豈其如此無特操乎當問以下文義殊疊重軟弱固不足辨矣傷寒嘔多雖有陽明證不可攻之此於是證也亙於少陽陽明者也故冒傷寒而以包之也蓋少陽陽明之相併也其治必在於少陽也雖然若陽明之專重而少陽之殊輕則其治適在於陽明也雖既在於陽明而必在於白虎湯而不在於承氣湯也此為之式例也可以三陽合病之於白虎湯徵之矣今也曰嘔多則少陽之勢殊勝於陽明證可知矣以是乎曰不可攻之以示修治之在於少陽柴胡湯者也陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈按心下硬滿邪勢輻湊之所為也蓋心下者胸與腹之分界也以是胸脅實滿之勢或易為心下硬滿也胃實之勢雖亦與心下而不必至為硬滿也何則以所其競必在於腹裡也是故縱有陽明之候而心下硬滿未去則邪勢為尚盛於少陽也是乃柴胡湯或陷胸湯輩之所與也故亦曰不可攻之也攻之以下後人謾談其變者也陽明病面合赤色不可攻之必發熱色黃小便不利也赤色有熱色之謂也面合赤色者言熱已在表而覆在里其勢合著於顏面也此蓋論發汗之候者也而其義狹曲不固足據論矣恐後人之所偽撰矣乎陽明病不吐不下心煩者可與調胃承氣湯呼不吐不下心煩者曰陽明病也蓋心煩之為證弘與六位者也而今敢取之於陽明者不可無辨矣夫煩之於虛也厥陰為其極而少陰太陰屬焉於其實也陽明為其極而少陽太陽屬焉此是虛實皆以其形勢辨之者也故今曰不吐不下以示於雖有可吐之形勢而不吐雖有可下之形勢而不下者也蓋如其形勢則當即腹脈而求之耳今也不期其腹脈之狀者要使診候之間求之於活於弘也學士不可不致思焉心煩之弘與六位也不固於調胃承氣湯本任乃候所以其然之形勢而稍歸之於調胃承氣湯者也故今不曰主之而曰可與也陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下此條以太陽之直歸於陽明者論之也脈遲對太陽之脈數而明邪氣已駸於裡也雖汗出不惡寒者對前位汗出發熱惡寒而示邪氣已離於表位也蓋邪氣已離表位則更實於肉中腹裡亦可知矣是即所以為其身必重短氣腹滿而喘也既如此則須有潮熱也已有潮熱則縱令太陽之殘證尚在而復為之外已欲解也故曰有潮熱者此外欲解可攻裡也手足濈然而汗出者是乃對上文所謂雖汗出而言汗出之狀象異於太陽而以斷之於陽明也此大便已硬也承手足濈然汗出而言津液涸竭邪氣實胃中而使大便已硬也是之諸證為之陽明之准證而大承氣湯之正鵠也故曰大承氣湯主之也若汗多微發熱惡寒者此顧手足濈然而汗出而論治法之尚在於太陽者也故曰外未解也其熱不潮亦顧有潮熱者以戒不可與承氣湯也雖既戒不可與承氣湯而今曰未可則知雖熱未潮而如其他證則已備上之所序列矣然則其在於此也可以調胃及白虎輩亦足准知矣若腹大滿不通者此對腹滿而喘而補添於小承氣湯之一活用者也腹大滿邪勢主著於皮肉之候而與邪勢內結而為燥屎者有別也不可混矣不通言兩便不通利也是即皮肉之邪勢迫於竅口之所為也故不但於大便不通而已亦並小便不通也與不大便之於燥屎者自有別也亦不可混矣雖然此於是證也充之於小承氣湯之活用者也故不曰主之而曰可與也微和已下九字後人謾議小承氣湯之方意者也不可從矣夫蓋三承氣之於方用也後世混淆而無定論今試論其別用則熱與證已備於陽明而有燥屎者為之大承氣湯也熱與證雖既備於陽明而未及有燥屎者為之小承氣湯也熱已備於陽明則證否證已備於陽明則熱否者為之調胃承氣湯也是之別用以督論中則無一所凝滯矣蓋醫聖之本旨其在茲矣乎大承氣湯方大黃四兩厚朴半斤枳實五枚芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下余勿服小承氣湯方大黃四兩厚朴二兩枳實三枚已上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮熱大便微硬者可與大承氣湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者心大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也此條承前條曰大便已硬而弘之變者也蓋熱與證已備於陽明者為之大承氣湯也今也雖有潮熱而大便之於微硬尚為之大承氣湯者豈不弘其變乎故不曰主之而曰可與也然則於其大便也嫌於如不拘硬與不硬故亦曰不硬者不與之也微硬者可與與不硬者不與之反對以示法文勢自可抑揚可玩味矣若不大便六七日以下更承陽明病而論燥屎之一候法者也夫蓋大便之微硬尚且為之大承氣湯而況於不大便六七日乎雖然非其旁見於一二之實候者則不遽與之為法也故少與小承氣湯以伺候於轉屎氣與否也失當作矢矢屎以音假借也轉矢氣者徒轉旋燥屎而未得通耳於是乎知是元有燥屎而小承氣湯之力不固能通之也故曰此有燥屎乃可攻之也若不轉矢氣已下即承上所謂少與小承氣湯而戒不可與大承氣湯也故曰初頭硬後必溏不可攻之也攻之已下九句蓋後人之所附錄矣夫實則讝語虛則鄭聲鄭聲重語也此條應發首曰胃家實也以明其候法而且並論以虛而盡實之變化者也蓋實也者謂邪實也虛也者謂精虛也夫雖虛實既異其分如此而邪實克令精氣虛精虛彌令邪氣實則實中有虛虛中有實虛實互相待也亦如此矣雖然虛實不各歸之於一隅則修治無所從矣於是乎雖有虛而專於實則單呼曰實雖有實而專於虛則單呼曰虛是為之虛實之通義也宜參考藥品體用矣讝語者譫忘之謂也鄭聲者鄭重之謂也而於其言語無態度則同一也惟以其狀象別之名者也蓋實之主於邪勢乎語言必致譫忘虛之主於精脫乎語言必致鄭重是其自然之勢也故曰實則讝語虛則鄭聲也且也虛實之定證尤眾多矣而今約之於讝語鄭聲者何哉曰此欲使讀人知心胃互相待而全其機用共其榮枯也是故胃之實乎心必不得不蔽其機用所以為讝語也胃之已虛乎心必不得不亦亡其機用所以為鄭聲也然則取準據於讝語則自知包陽實之他證也又取準據於鄭聲則亦自知包陰虛之他證也蓋陽實之極為之陽明如少陽太陽屬其初焉陰虛之極為之厥陰如少陰太陰亦屬其初焉虛實陰陽淺深輕重之別豈其可不思哉既已卷舒此條則是等之義著然而分明矣千鈞之筆力至矣盡矣嗟嘆鄭聲重語也五字恐後人之註文耳直視讝語喘滿者死下利者亦死發汗多若重發汗者亡其陽讝語脈短者死脈自和者不死以上二條因前條亦謾論死候者也蓋皆後人之辭氣豈足據乎傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱讝語者大承氣湯主之此欲狀其初位之不一端故曰傷寒也夫既傷寒之不一端乎或吐之或下之後不解遂致不大便五六日也蓋今算之日數則既至十餘日而亦致日晡所發潮熱也潮熱之期日晡所者蓋以其極地言之也何則但曰潮熱則其發也不期度數時而發時而休者也如日晡所發潮熱者其發也必於日晡所而盛於夜半休於天明者也是故彼則雖其熱之在於分肉乎未到其極地所以其勢數聳於外也此則既到分肉之極地故其勢專壓於內而非里既盈滿則不得亦達之於外其既達也亦不遽易休矣必亙一夜而休者也此所以更冠日晡所也夫既不大便之五六日與日晡所發潮熱皆為之大承氣湯也雖然不亦當遽斷之須認不惡寒與獨語如見鬼狀以決之於大承氣湯也若此而惡寒則為邪勢尚未專壓於內也然則未可與大承氣湯而應與白虎加人參湯者也此之為其式也白虎加人參湯所謂時時惡風背微惡寒等可以為符契矣獨語者無對而如對語故以如見鬼狀解之也是乃讝語中之一狀象也蓋至於此八句以為大承氣湯正中也若以下即陽明之地位而論劇微之分與死生之式者也乃於其劇者則必致以下四句之變也循衣摸床即煩躁之太甚也惕怵惕也微喘直視出於邪勢旺於體中也是之劇證並見如此則為固篤危也雖然其在此也必有辨可治與不可治之機矣雖然今無由於問之證候是故斷之於脈法以曰脈弦者生澀者死也夫蓋不曰滑者生而曰弦者生者何哉曰其在此也未暇問精之虛不虛唯要認其邪勢故曰弦者生也弦者弦緊之謂而邪實之候也澀者死澀者澀澀之謂而精虛之候也蓋脈已至此則亦無暇問邪勢之劇易必斷之死候故曰澀者死也微者但發熱讝語者此以調胃承氣湯言之也按此條論陽明之正中及劇證而皆供之於大承氣湯者也故亦補添陽明之微者於章末而以及調胃承氣湯者也然則正中劇微論得而不殘焉是乃蔽陽明之一位之意也乎矣陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語小承氣湯主之若一服讝語止更莫復服夫陽明之於病也以邪實為本任也然今雖在於陽明而以殊在小承氣湯之初地或無足察邪實之形勢者於是乎但主津液外出屬文故曰其人先更端之以示其義也津液外出即多汗之由也胃中燥不啻因津液外出而已里邪職之由矣故不曰干而曰燥也夫既里邪之燥津液也大便當必硬也已大便之硬乎邪氣注胃中之所令也邪氣之注胃中其勢當必薰於心而使心憒憒然也所以為讝語也故曰硬則讝語也且夫不標其熱狀而但以大便硬與讝語斷之小承氣湯者豈非論其初地耶是故若一服而讝語止則為之裡邪已解之候也於其津液枯竭則當以漸自復焉何為盡劑乎故曰更莫復服陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治也不可更與承氣湯也讝語發潮熱脈滑而疾者元亙大小承氣之候也雖然今欲專弘小承氣湯之效用故標小承氣湯以示對上條而有首尾輕重之狀態如此異者也夫蓋於是證也歸之於小承氣湯則以為其極地也復歸之於大承氣湯則以為其初地也極地之於小承氣湯與初地之於大承氣湯須並燥屎有無之候法而辨之已矣發潮熱之發以小承氣湯言之則新發之義也以大承氣湯言之則時發之義也脈滑而疾者對脈反微澀而明專邪實而勿論精虛也因者因緣也因緣於與小承氣湯而腹中轉失氣與否而與大承氣湯一升既至此也亦復候轉矢氣與否更亦服一升故曰若不轉矢氣勿更與之也明日以下承大小承氣湯二端而論難治之候者也夫既與大小承氣湯而明日不大便則似尚可攻之者雖然其脈不在滑疾而在微澀則知邪實未謝而專於精虛矣此之為脈證相背也所以曰為難治不可更與承氣湯也陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯主之此對前條而論之者也有也者一有一無之意也可知潮熱之未顯著矣然則當能食而此不能食故曰反也夫蓋讝語有潮熱之雖如不重而於不能食之亦不輕則豈亦得謂無燥屎乎故曰胃中必有燥屎五六枚也今期之概而曰五六枚者欲對讝語潮熱之尤顯著而必當有燥屎七八枚者使人知雖均在於大承氣湯而輕重之異如此也若能食者但硬爾復承讝語有潮熱而論未畜燥屎但在大便硬者也是乃小承氣湯之證也今不舉方者蓋略之也此條主大承氣湯起文余意及於小承氣湯者也雖既主大承氣湯而殊在其初位而未備其全故曰宜復曰主之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈陽明病非以本位言之以讝語及熱狀之象於陽明言之也蓋讝語之並下血也可知邪氣存於血道然則既畜成瘀血乎曰否若畜成瘀血則必當有少腹急結或硬滿證今也無之矣以是乎不歸之於瘀血而歸之於熱入血室也既名之以熱入血室則歸之於柴胡之治亦復可知焉但頭汗出者駁於陽明之一身濈然汗出者而益明徵於邪氣在於表裡間也於是乎今與柴胡湯則必得血熱分別而血和熱散矣乎濈然汗出此不易解而解之所為而所謂瞑眩也故曰濈然汗出則愈也刺期門隨其實而瀉之之九字蓋後人之所加也乎汗出讝語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯按此條當合於前條也豈為圈以別之哉汗出讝語者即對讝語頭汗出者以論陽明本位之狀態者也故曰以有燥屎在胃中也須下之也此乃對彼熱入血室之不可下者異之也此之於承氣彼之於柴胡大異其方法而求之於外候則才在頭汗與自汗之間耳雖然豈不但是而已乎須索問之於腹候脈診及精神口舌之比則足復益知於此之在承氣與彼之在柴胡也此為風三字及過經以下二十五字皆後人之所補入矣乎傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則讝語此條說裡實之由者也而是但知大便難之成於津液越出而未知由於邪勢之注者也恐是後人之語氣矣乎三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗出者白虎湯主之三陽之證各割據者名之三陽合病也而三陽合病之於治例也有正變之二岐不可不論也蓋三陽之證互相匹敵則其制之也必先少陽而太陽次之如陽明則亦其次也此之為三陽合病之正治例也若夫劇於陽明而微於少陽太陽則其制之也必先陽明而少陽次之太陽又次之此之為三陽合病之變治例也此雖既先陽明而尚顧於少陽太陽之固不可下也是故制之也必在於白虎湯而未在於大小承氣湯也亦之為其式也蓋三陽合病之於治例也若措變治例之白虎湯而但舉正治例之柴胡湯則以其事之順而義亦一定矣義已一定則其事必自拘泥焉故今措正治例之柴胡湯而但舉變治例之白虎湯者也既如此則以其事之逆而義亦自不一定矣義已不一定則其事必自活動焉是乃所以舉變治例而略正治例也讀人熟思焉腹滿身重難以轉側者以熱實之故內外氣壅不瀉之所令也連之下文讝語遺尿皆為陽明之現證也遺尿即出於氣壅不瀉之極也口不仁而面垢之一句茫乎論於少陽之狀者也口不仁者以口苦之初地而口中無機活言之也面垢者頭面有汗而觸臥褥之所為也乃是匿頭面汗出之語意也此欲殊使少陽斷於微之辭也若顯曰口苦頭汗出則其勢猶如匹敵於陽明然矣然則於其治例也奚得執之於變治例之陽明哉是故曰口不仁而面垢以眼於少陽之殊微而不匹敵於陽明也三陽合病之於治例也或先陽明或先少陽唯如太陽則不更與其治例也故今標出陽明與少陽而略太陽之證者也以既略之故例之下文曰發汗則讝語也此戒不可執其治於太陽也玉函經作讝語甚可從矣三陽合病之於變治例也制之在於白虎湯而大小承氣湯不與矣故復例之於下文曰下之則額上生汗手足逆冷也額上生汗手足逆冷即精氣耗損而邪氣歸於厥陰之象也此亦戒不可與承氣湯也若自汗出者一句承上證而示不可以遽斷之而須認自汗出而知益偏於陽明也此乃深嫌疑於少陽之意也是故若自汗出者自虎湯主之之辭句自似暗出於若嘔者柴胡湯主之之意也讀人復熟思焉二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈宜大承氣湯並猶行肩而不並之並也一位既病而復加他位者是之曰並病也是故並病之為狀與合病無異也故於其治例亦效合病者也雖然異其來蹤復異其歸趣則不可不別論矣夫蓋於合病則病割據於各位故非處置之治法則終始不替其操者也如並病則唯是在於一時也以在於一時故藉使治法無處置之而或歸於一位於重者有之矣又或遂歸於合病者亦復有之矣以是乎有二陽並病而無三陽並病可見並病之在於一時也若夫太陽之病證至於此而尚不罷則治法之在於太陽不固俟論焉今也太陽證罷而其勢盡湊於陽明此乃所以以大承氣湯也夫合併之於熱狀也以無大熱為法也是故熱苟備其綱則藉使證候發於各位而不名以合併但就其熱綱之所在而直名之某病也而於其治法固從之而已是故二陽並病之於往時乎熱不必備其綱者也今也欲明並病之歸趣故曰發潮熱也發者以新發言之也曰漐漐汗出而不曰濈然汗出者尚帶太陽之餘響言之也雖然熱既備潮熱則汗亦至於此而加多可知矣大便難而讝語者是里已實之候也以是二陽並病之於往時蓋亦當有之矣乎而今標之於章末者欲明貫於往今而有之也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之此承陽明中風條而論有其機變之至於此者也咽燥口苦腹滿而喘對彼口苦咽乾腹滿微喘而示其一步之重者也蓋其證之駸既如此則彼所謂於發熱惡寒亦將歸於重地也於是乎發熱自汗出惡寒止而惡熱也蓋惡熱也者與身熱之在於大綱者尤異矣唯以熱勢盛大而欲去衣被開戶牖言之也故惡猶惡寒之惡也反也者反於惡寒止言之也身重者以熱滿於內外氣壅不瀉之所為也此於是脈證也尚為之白虎湯也今不標其方者蓋准之於陽明中風條也若發汗則云云及若下之則云云互之於陽明中風條所謂若下之則腹滿小便難也言之也胃中空虛客氣動膈心中懊憹此乃熱未盡歸於胃者而下之之所為也可知白虎承氣之分界其異也如此矣舌上以下十字恐後人之所旁書誤混正文耳按白虎加人參湯之於證也卻承至於身重之證而曰若也豈髮圈而別之乎蓋白虎加人參湯之於白虎湯也才以煩別之者也而如其他證則盡通之耳而今此條之所論不舉煩者蓋略之也是故見之於寫貪飲之情狀而曰欲飲水且曰口乾舌燥則足自知以為渴故有苦煩也可謂作文有機活矣又按豬苓湯之於證也承白虎加人參湯發之也豈可亦圈別乎蓋豬苓湯之於位地也為之虛實間則其證候亦不一而止矣或有象實候者或有象虛候者以是乎今舉象實候之一隅於此以對之白虎加人參湯而示其差者也夫既脈浮發熱渴欲飲水之象實候乎或誤認以為白虎加人參湯者不得謂無之矣雖然此於是脈浮發熱也唯出於水氣之動勢者也是故脈浮無跟腳發熱亦無根柢可知焉且也渴欲飲水之雖頗類於加人參湯而此則渴之本乎水氣者而與彼本乎熱者果異矣故舉小便不利證之也熱水之分繫於小便之自利與不利也不可不論究矣或曰五苓散之於脈浮小便不利微熱消渴也大似此條之所論矣子其有說乎曰有如五苓散則水與熱留連於肌肉間者也故脈浮取其準據於熱位者也豈於無跟腳乎如微熱則對白虎湯之熱位而言之也豈亦無根柢之謂乎如豬苓湯則腸外有滯水而其動假見於脈浮發熱者也故無跟腳亦無根柢也雖辭氣頗相均而以其因來推之則曷其眩曜焉哉客唯唯退豬苓湯方豬苓茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內下阿膠烊消溫服七合日三服陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利其小便故也此條承上條而復斷於豬苓湯之易疑類於白虎加人參湯也夫蓋小便不利而渴者水氣並液而走於腸外之候也此之為豬苓湯也今也汗出多而渴者裡熱壓於表之候而即白虎湯之所宜也故曰不可與豬苓湯也然則白虎豬苓之於分也取其標式必於汗出多與小便不利彰然明哉以汗多以下十六字後人謾說豬苓湯之方意者也豈其可從乎矣脈浮而遲表熱裡寒下利清穀者四逆湯主之此條對大承氣湯曰陽明病脈遲云云論虛實之異別者也夫既於彼則太陽表熱之變已在於裡實之地位故以大承氣湯下之於此則太陽表熱之變直歸於裡虛之地位故以四逆湯溫之此豈非對決於虛實之異別乎表熱者謂表位余殘之熱也與外熱之出於精氣耗散之動勢者自異也不可混同矣裡寒者謂腹中虛寒也蓋腹中之虛寒不可得洞視矣而今言之者以清穀證之也夫精氣疲勞則運用之機活必衰弱矣此所以清穀之由而來也若胃中虛冷不能食者飲水則噦脈浮發熱口乾鼻燥能食者則衄按二條後人據五苓散等發之例者謬混焉耳矣陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之此其始也見陽明本證者也於是乎以承氣湯下之也是雖既下之而其肌外尚有熱則大似其腹內之熱未除者雖然今徵之其手足乎不於熱而於溫則知於腹內熱已除而惟是餘熱在胸中之所令也是故曰不結胸以明胸中不無事也且也心中懊憹以下所論皆是餘熱在胸中之徵也是所以以梔子豉湯制之也陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之標曰陽明病者非以本位言之也唯顧認於發潮熱言之也若夫潮熱之出於本位乎必於不大便或難硬者也今也無之矣反於大便溏也於是乎知此尚在於往來寒熱之變態而惡寒已止而但熱來去也夫既但熱來去而無有惡寒則其狀全象於潮熱矣故曰發潮熱也與柴胡加芒硝湯之曰日晡所發潮熱大等其意趣而少有深淺輕重之別耳須參考之於彼而究其精義矣且夫柴胡之於往來寒熱也最為之正中也是故雖均在於柴胡而若未及其正中者與已過其正中者則或不備往來寒熱者亦有之矣論曰嘔而發熱者柴胡湯證具此以未及其正中言之也又曰身熱惡風頸項強脅下滿手足溫而渴者此以已過其正中言之也然則於此條亦以已過其正中論之自可知矣小便自可明於大便溏之不與腸道狹水氣也胸脅滿而添不去二字者此示柴胡之病勢過其中正之妙處亦自可察知焉陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也此條亦以不大便之象於陽明而標曰陽明病也此於是不大便也非固胃實之所令矣惟以胸下硬滿之故胸腹之氣不順接之所令然也故雖不大便而不並渴而並嘔也舌上白胎對於陽明之舌上黃胎或黑胎者而明少陽之舌胎者也且夫此條之所論非大似大柴胡湯乎雖然於大柴胡湯則以心下急心下痞硬為其面目也今也脅下硬滿此邪氣結絕於胸脅之所令而與彼心下急及心下痞硬之直迫於胃腹者果異矣此所以與小柴胡湯也不曰主之而曰可與者欲示其不常式也上焦以下四句雖意義如不背而蓋後人之註文耳矣陽明中風脈弦浮大而短氣腹都滿脅下及心痛又按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治按此條病證錯雜而無定準處方隨意而亦失常度豈本論之辭氣乎哉恐後世之杜撰耳矣陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導按蜜煎導之於方也但因大便硬行之者也蓋大便之於硬也以其常論之則胃中熱實之由矣今也蜜煎導之於大便硬也不可以常論之惟是津液外出而腸內枯竭之所為也故曰此為津液內竭雖硬不可攻之也然則蜜煎導之於方也不唯於陽明之變而已弘行之於六位之變可知也而今舉之於此篇而標陽明病者尚顧於大便硬之類於陽明言之也又按土瓜根及大豬膽汁之二方雖如可試用而恐是後人旁書以供其比類者遂謬傳於今者乎矣蜜煎導方蜜七合一味內銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸並手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯按汗出多之雖在於陽明而尚微惡寒則治之在於太陽而不在於陽明也故曰表未解也可發汗以對彼所謂可攻之者而言之也此蓋對大承氣湯之脈遲雖汗出不惡寒云云而論治法之在於太陽者也然則當移之於彼條之次耳矣陽明病脈浮無汗而喘者發汗則愈宜麻黃湯後人效論前條及之也雖如可議而比之前條之意趣為對應者則抑劣矣且也此於是脈證也既已備麻黃湯之本條則亦屬贅瘤者矣乎陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之熱與水壅鬱乎虛實間者此之為發黃之由也此條至不能發黃之所論皆是陽明本證而雖固不與發黃而舉以駁於發黃之為熱氣鬱壅者也夫蓋於陽明也論其本證則當曰身熱或潮熱而但曰發熱者何哉曰此唯主熱氣揚越以作文也是故雖曰發熱而是發身熱若潮熱之義自可知焉但頭汗出身無汗小便不利是皆熱水壅鬱之候而即發黃之由也故曰身必發黃也頭汗解已具柴胡桂枝幹薑湯條腳劑頸而還即說頭汗者也蓋後人之旁註耳渴引水漿者此為瘀熱在裡二句句法為斜插以論於發黃之在於瘀熱也引飲通取義於渴之無間斷也夫蓋熱水壅鬱之為發黃也有瘀熱寒濕之二岐也瘀熱則此湯之所治也寒濕則麻黃連軺赤小豆湯之所治也是故斜插於渴引水漿者此為瘀熱在裡二句以歸之此湯者也且夫於瘀熱寒濕之分與結胸之分於熱實寒實者其義大相同矣熱多水少單呼曰瘀熱水多熱少單呼曰寒濕然則瘀熱寒濕與於有水熱則一也惟是以多少主客別之於二岐者爾茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煎茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也按發黃之於證也未待處方而尿色黃赤者尤多矣且也黃色之解去豈但小便利已哉必當得大便通利解去以是考之則小便當利以下二十三字恐後人之所加矣乎陽明證其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之陽明證後條辨贊論共作陽明病可從矣抑畜血之於外候也或象胃實之候者亦有之矣故冒曰陽明病也雖然此本在於畜血而不在於陽明是故更端曰其人也喜忘者精血壅滯裹心之所為也蓋精血失其常度如此者以下焦有畜血而其勢犯血道也故曰必有畜血也且夫畜血之於候也縱令屎堅硬而其通也反容易者也何則是以便中交畜血也故曰其色必黑也所以然者以下三句蓋後人之註文耳按此條惟例畜血之似胃實者而未及處方者也蓋是為桃核承氣湯設之者也乎後人不辨焉謾補宜抵當湯下之六字者耶不必是矣宜尋究於桃核抵當之方意爾二湯之差別各備其本條腳下焉陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯此條對舉於梔子豉湯所謂陽明病下之之條而以論梔子豉湯大承氣湯之互易疑似者也蓋陽明病而下之心中懊憹而煩則如梔子豉湯然矣雖然若並之以胃中有燥屎之候則尚取之於大承氣湯之任也故曰胃中有燥屎者可攻也蓋燥屎之為候也不固一而止而照之下文腹微滿則自知見腹滿不大便之比也若夫使腹止微滿未至腹滿則亦自知不可有燥屎之候也故曰初頭硬後必溏不可攻之也此為之梔子豉湯之任也雖然此條之立論也主在大承氣湯故亦復統之於後曰若有燥屎者宜大承氣湯也是乃欲示於勿論腹滿不大便之有燥屎者藉令腹微滿者亦或並一二之實候則不得不復歸之大承氣湯之任也病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也此條欲示難遽斷於陰陽虛實也故冒曰病人也此於是證也病已位於陽明之重地而殆接虛地以是乎雖為不大便而闕熱之揚達且也腹痛之於繞臍可見邪氣之彌幽深矣以是乎其勢自窺陰位此所以出煩躁也雖既出煩躁而精氣尚克攘之此所以致發作有時也既而如此則雖可與承氣湯而如不可索之於其證候然矣是故髮式辭曰此有燥屎也凡論中如曰有燥屎曰為內實曰此為實曰實也之類皆是要於雖未悉備燥屎之候法而不可敢無燥屎者當有之之式例也夫然故此條及以下三條皆論在於燥屎之變候法而不在於正候法者也若其正候法之於讝語身熱潮熱者則不與於此矣夫蓋雖均在陽明內實之地位而有正變之別如此者何哉曰若其內實之在於正中者必當備正證候矣若其過正中而既及極地者與其未及正中而尚在初地者則必當預有變候矣此之為正變之辨也或曰既眼於煩躁發作有時以歸之燥屎之候已而明確矣雖然於乾薑附子湯亦期煩躁之有發作而以歸之少陰然則不異於煩躁有發作而異陰陽虛實者不能無疑矣子其有說乎敢問焉曰有蓋於此湯則邪氣在實地幽深之處而其餘勢自窺於陰位雖既窺陰位而有精氣尚克攘之動此乃煩躁發作有時之所出也是故如繞臍痛則不拘煩躁之發作而自若矣於彼湯則病勢頗及於陰位而有欲益張大之動此乃煩躁發作有時之所出也是故其勢時翻於陽位則忽安靜者也可見於病勢去住之間更關於陰陽虛實之淺深多寡矣故今以大承氣湯之煩躁比之於乾薑附子湯之煩躁則抑位於一等之淺者也不可不精究矣子其思諸又按故使不大便五字蓋後人之所補矣病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯此條論於太陽之象於陽明者與陽明之象於太陽者更不易辨識也所以標曰病人也蓋二部位之互相象也以各在其變證候而不備其正證候故也煩熱者言為熱苦煩也是故三陽之位地當皆有之雖然以陽明為熱位之極則煩熱之屬於陽明者當十而居其七八也而今髮式之辭曰汗出則解以指煩熱之在於太陽者也是乃措其七八而執二三以喻變機者也此豈非太陽之象於陽明乎又也者更有之詞也明次上之所論而又更有如此者也發熱者言熱勢發揚也是故三陽之位地亦皆與矣雖然以太陽為熱位之初則發熱之在於太陽者亦當十而居其七八也而今期之於日晡所且曰屬陽明也以指發熱之在於陽明者也是亦措其七八而執二三以喻變機者也此豈非陽明之象於太陽乎且也煩熱之於太陽與發熱之於陽明當須並脈候而決之耳矣故曰脈實者宜下之脈浮虛者宜發汗也故知實之於發熱浮虛之於煩熱也若夫煩熱之於實發熱之於浮虛者共是其正候法而非此條之所論也不可不審辨焉大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯此於其初也有裡實之候故大下之也夫既下之之不得其節而過之於大乎裡實尚未悉解必存之餘殘者也今也余殘之乘於下後之新虛乎其勢不得必不埋伏矣而求之外面則如愈者然故曰後也六七日不大便者是埋伏之邪復養其勢於裡之所為也煩不解此乃埋伏之邪養其勢於裡之候也故曰不解以明煩之不於一時亙六七日也夫既邪氣養成其勢也以上之序而且加腹滿痛則可知復遂成燥屎也故曰有燥屎也腹滿痛與腹滿而痛少異矣滿當連讀於痛則自知滿痛言無處而不痛也所以然者本有宿食故也二句後人謾發旁註者混出正文也乎病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯標曰病人者亦與繞臍痛條曰病人者正同其義也小便不利大便乍難乍易者此乃出於精氣為邪實所屈弱而不能制於下焦也夫蓋病位於陽明之重地而殆接虛地乎精氣既已不能護於通身而僅爭衡於裡熱而已是故於其外候也才止時有微熱也喘冒不能臥者邪氣欲殪精氣之所為也喘冒者謂喘急冒昧也喘冒之劇起居而徐堪之故曰不能臥也按以上四條之所論皆燥屎之變權法而據機制之者也豈為混同之於彼正證之備首尾面目者乎哉須對較而辨焉矣食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也按吳茱萸湯之於證也氣鬱在於心胃之間而卒致胃中不和也此即所以食谷欲嘔也夫蓋欲嘔之但在於食谷則可知其根柢不在胸中而在腹中也故曰屬陽明也雖既曰屬陽明而非是以固有陽明裡實之候者言之矣惟是欲別之於嘔之在於少陽者耳矣是故以下文曰屬上焦而對之於曰屬陽明則自知所謂陽明者以中焦言之也既知陽明之以中焦言之則足復亦知所謂上焦之以少陽言之也可謂互文體裁備矣得湯即服吳茱萸湯之言也於是病勢加劇者以屬胸中也此豈吳茱萸湯之任乎哉可知柴胡湯之任也蓋吳茱萸湯之於證也雖位於心胃間而無固寒熱之候者也雖既無寒熱之候而尤親近於虛實是故或接胸中而象實候或接腹中而象虛候猶如豬苓湯之方意然矣乃今舉象實候之一隅於此而以對彼少陰篇所論之於象虛候者以全之機用者也蓋為之醫聖之微意也乎吳茱萸湯方吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散此條所論雖似述機變而辭氣紛冗而意旨不貫矣且也脈論三部不同者皆失本論之式矣豈足據哉脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絕於里亡津液大便因硬也脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絕以上三條所謂陽太過陰不及之論爾何以徵哉趺陽脈浮而澀浮則胃氣強澀則小便數澀相搏大便則難其脾為約麻仁丸主之麻仁丸方麻子仁二升芍藥半斤大黃一斤厚朴一尺枳實半斤杏仁一升上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以知為度趺陽脾約之謂亦皆濫於本論之式例矣豈可據論乎可知後人之辭氣矣按如麻仁丸方須別有所置存腸道殊燥實而胃中不然者蓋此方之所之也乎太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之按此篇以太陽病為冒首者殊為無謂也今考之元在於太陽篇中可察知矣三日當補填二字作二三日也夫蓋太陽病之於二三日也既有桂枝麻黃證故據其法而發汗之也而今不論其解者而論其不解者也此於其不解之狀也不見之於太陽之諸證而唯見其熱勢之不如舊日也故曰蒸蒸發熱以對前之翕翕發熱也夫既熱勢之於蒸蒸則雖未至身潮而尚在發熱而已為之陽明之始萌於此者也是其始萌之如此乎豈其易斷之於陽明乎是故曰屬胃也欲以使讀人眼治法之在於陽明而歸之於調胃承氣湯也是其調胃之於使用也但以其熱勢行之者也所謂熱備於陽明則證否者即是也傷寒吐後腹脹滿者與調胃承氣湯此於其初也病在胸中故吐之今也歸腹中故腹脹滿是之兩位通以曰傷寒也蓋其於腹脹滿也大小承氣湯亦皆與矣雖然在彼則或媲身潮之熱或並燥屎之候者也此特不然矣但以在於腹脹滿一候而論之已是乃亦陽明之始萌於此者也故亦為之調胃承氣湯也是其調胃之於使用也但以其證行之者也所謂證已備於陽明則熱否者即是也太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈此條處小承氣湯者殊可疑矣觀之其候法之於微煩小便數大便因硬與其治法之於曰和之愈則當調胃承氣湯斷然明哉蓋轉寫之誤乎矣以太陽病為冒首者亦非此篇之所關也應移於太陽中篇大柴胡湯之下而對論彼所謂鬱郁微煩者為未解也與大柴胡湯下之則愈耳蓋今雖微煩之一於其狀而彼則出焉於少陽也故媲於嘔不止心下急也此則出焉於陽明也故媲於小便數大便因硬也且夫彼此兩端之異也先宜推之於其餘證而知之概略而亦即其腹脈而益明辨焉耳矣若吐若下若發汗是乃含畜於所謂十餘日而言之也宋板發汗下有後字可從矣微煩雖邪既入於胃中以為其初位故其勢尚窺於心之所為也小便數大便因硬此即胃中不和之所令也可知邪既入於胃中也於是乎與調胃承氣湯以制胃中之邪則胃氣自調胃氣既調則邪豈得特稽留乎不必期下利而愈矣故曰和之愈也得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未完成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯按疊用二三日四五日六日而論之轉變且處以小承氣湯者皆背馳乎式例豈足據乎若不大便六七日以下論承氣湯之消息者也謹考之文意當移續之於上調胃承氣湯條而並作一條論之者也小便少熱在腸外而胃中未然之候也以忒於小便數之胃中有熱者也是故雖不能食之如可攻而攻之則但初頭硬後必溏矣須不大便不就食之於小便數利而乃知屎定硬也故曰乃可攻之宜大承氣湯也未定成硬攻之必溏二句恐註文乎耳傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯此於是證也雖尚在大承氣湯之場而以專預於精虛乎不備其正證候而殊發於變機者也以是乎不易遽以得認之於陽明才知日數之於陽明之概法耳故標曰傷寒六七日也目中不了了精不知者謂眼目不鮮明眸子不活動也夫眼目者機活之所會而思意情欲之端及進退動止之兆必先著顯其機於茲故為里之應也今也邪勢既內攻而不備其正證候則更無由於求其裡實也以是乎才徵之於眼目而漸知裡實之機也故曰目中不了了睛不和也無表裡證者謂無表證又無里證也大便難反之於不大便之專於裡實者而以答曰無里證也身微熱反之於身大熱之專於表證者而以答曰無表證也夫既大便難身微熱之雖未足徵於內實而目中不了了睛不和則知裡實之勢已欲害胃之機用矣於是乎曰此為實也是即式乎雖不備可攻之候法而不可敢不攻者有之之辭也而今攻之也亦異於尋常之略若夫遲滯於此則果至不可攻之場必矣故曰急下之也陽明發熱汗多者急下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯按上條陽明二字次條發汗不解四字恐後人之所追加乎矣二條當承傷寒六七日目中不了了睛不和而論之者也豈髮圈而為之別條乎夫蓋發熱汗多之雖類於太陽而據於目中不了了睛不和則知非邪氣在於表位之所令而惟是以氣液為驅役於裡實之所為也豈得無燥屎在胃中哉故亦曰急下之也夫蓋腹脹滿之為證也雖亦如未必有燥屎而亦據於目中不了了睛不和則知邪氣內攻而迫於重地之所為也豈亦得無燥屎在胃中哉故亦復曰急下之也又按上以論津液外奔之可畏之機次以論津液內竭之亦可畏之變也此豈非自傷寒六七日條拆來而復區別於燥屎之變候法以示之機發者乎耶所以合為一條也條辨陽明下補病字強為之說者未必是矣腹滿不減減不足言當下之宜大承氣湯腹滿不減蓋以與調胃承氣湯或小承氣湯之輩言之乎夫既與之而其腹滿之不減也直取之大承氣湯者固不足為準據矣可謂暴也奚得愜於醫聖之意趣乎恐是後人疑膺耳陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明少陽合病之於治法也必先少陽者也而今歸之於大承氣湯者殊為無謂也蓋出於後人之杜撰必矣乎病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱而便膿血也此條後人承上傷寒六七日條而述之轉變者也故標曰七八日欲以示一步之變也蓋七八日之於脈浮數也謾斷之下證以曰可下之也而亦議下之之變也或於瘀血或於便膿血者雖如可論而意義膠柱辭氣亦淺劣無正文之氣格矣且也傷寒六七日之所論病已迫篤危者也豈得其變之有餘裕於如此者乎哉傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之此蓋於其始也有太陽證故發汗之也已者畢也言服一劑畢也夫既服一劑畢而無論於太陽之解與不解遂使身目發黃也此條為寒濕發黃例焉故曰以寒濕在裡不解故也以為不可下也是乃言不可與茵陳蒿湯也故期其治方之所存而曰於寒濕中求之也夫發黃之於由也總出於水熱壅鬱乎虛實間也而為其證也有瘀熱寒濕之分也瘀熱則茵陳蒿湯所主也寒濕則麻黃連軺赤小豆湯所主也此於是二岐也以何別之乎曰瘀熱之主熱乎應有熱氣浮揚之候及如脈浮口渴之類或有之矣寒濕之主水乎應有水氣沉滯之候及如脈沉口滑之類或有之矣豈唯是而已乎亦有以發黃之來蹤與黃色之濃淺而辨之略也身體已黃而後及眼目而其色不淺而濃者以主於熱也此之為茵陳蒿湯也眼目已黃而後及身體而其色不濃而淺者以主於水也此之為麻黃連軺赤小豆湯也是之來蹤之不同與濃淺之有分以參考之於彼所謂發熱汗出此為熱越則彌不眩惑於瘀熱寒濕之易疑似乎耶傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之標曰傷寒者暗斥虛實間位也蓋雖七八日之於本位日數而為其證也不為熱越而遂致令津液瘀滯於虛實間也此所以發身黃也夫身黃之本瘀熱也其色不淡而濃矣故曰橘子色也小便不利可知以津液瘀滯之故水道亦不利也腹微滿已承小便不利舉之則亦自知不唯於熱而已並於水液留滯之所為也蓋如小便不利腹微滿則於寒濕亦不能無之矣雖然媲論之於身黃如橘子色則直為之瘀熱之候也故曰茵陳蒿湯主之也按上既標茵陳蒿湯者主論發黃之來由者也故曰身必發黃也此條主論發黃之證狀者也故曰如橘子色也於是乎既知彼所來由以推此證狀則發黃之首尾輕重無有所殘矣須熟慮焉矣傷寒身黃發熱者梔子蘗皮湯主之標曰傷寒者暗斥少陽變位也此於是身黃也熱潛於表裡間而其勢鬱於肌膚之所為也故雖為身黃而未可以瘀熱寒濕名之者也於是乎連舉身黃與發熱以異之於瘀熱寒濕之不為熱越者也然則雖均曰身黃而此湯之不過微黃亦自彰明哉而今不曰微黃而弘曰身黃者惟厭其易拘泥焉宜明論解此條云頭汗出小便利而發黃者也可謂得其意矣梔子蘗皮湯方梔子十五個甘草一兩黃蘗二兩上三味以水四升煮取一升半去滓分溫再服傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之按瘀熱在裡身必發黃則直為茵陳蒿湯證候也豈俟麻黃連軺赤小豆湯乎哉然則欲尚歸之茵陳蒿湯則如何既已備上之所論乎可謂屬重複矣夫蓋麻黃連軺赤小豆湯之於方意也專制濕之劑也豈施之瘀熱為哉於是乎知此條之有錯誤矣故今推之上所謂發汗已身目為黃所以然者以寒濕在裡不解故也以不可下也之例而削瘀熱作寒濕去必字代目字以供之於麻黃連軺赤小豆湯之證候則瘀熱寒濕之分足劃然而可論則庶幾乎不大誣耶此乃所以敢改作寒濕在裡身目發黃也今也不具列發黃之諸證而但曰傷寒寒濕在裡身目發黃者此特欲岐修治之大本耳是故所謂不熱越及頭汗出身無汗小便不利之比必當有之矣而今不舉之者蓋讓之菌陳蒿湯之所論也麻黃連軺赤小豆湯方麻黃二兩赤小豆一升連軺二兩連翹根也杏仁四十個大棗十二枚甘草一兩生梓白皮一升生薑二兩已上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日服盡按醫宗金鑑代生梓白皮以茵陳蒿者未辨寒濕發黃之旨趣者也金鑑之妄誕每如此不可信者尤居多矣潦水淹留水也亦拘泥水性者之所加矣豈足據乎說已具甘爛水之腳註也
